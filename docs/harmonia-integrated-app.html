<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Harmonia — Integrated App (Phase 2)</title>
<style>
  :root {
    --paper: #f7f3e9;
    --card: #fffdf6;
    --ink: #1c1c1c;
    --rule: #b9b09a;
    --faint: #8a8371;
    --accent: #8a2b2b;
    --line: #e5dcc6;
    --deep: #2a2622;
    --green: #1f8a5b;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; }
  body { background: var(--paper); }

  /* Screen layout */
  .screen { display: none; min-height: 100vh; width: 100%; overflow-y: auto; }
  .screen.active { display: flex; flex-direction: column; }

  /* Launcher */
  #screen-launcher { background: radial-gradient(120% 90% at 50% 0%, #f4ecdb 0%, #efe7d6 55%, #e7dcc6 100%); justify-content: center; align-items: center; }
  #launcher-root { width: 100%; }

  /* Chart Viewer */
  #screen-chart { background: var(--paper); flex-direction: column; }
  .chart-header { padding: 12px 16px; border-bottom: 1px solid var(--rule); display: flex; align-items: center; justify-content: space-between; }
  .chart-header h2 { margin: 0; font-size: 18px; }
  .chart-header button { padding: 8px 12px; background: var(--accent); color: white; border: none; border-radius: 6px; cursor: pointer; }
  #chart-container { flex: 1; overflow: auto; }

  /* Chord Editor (modal) */
  .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 100; align-items: flex-end; }
  .modal.active { display: flex; }
  .modal-panel { background: white; width: 100%; max-height: 80vh; overflow-y: auto; border-radius: 16px 16px 0 0; padding: 16px; }
  .modal-close { position: absolute; top: 16px; right: 16px; background: none; border: none; font-size: 24px; cursor: pointer; }

  /* Import */
  #screen-import { background: var(--paper); flex-direction: column; padding: 16px; }
  .import-card { background: var(--card); padding: 20px; border-radius: 12px; margin-bottom: 16px; }
  .import-field { width: 100%; padding: 12px; border: 1px solid var(--line); border-radius: 8px; font-size: 14px; margin-bottom: 12px; }
  .import-button { width: 100%; padding: 12px; background: var(--accent); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; }

  /* Re-infer */
  #screen-reinfer { background: var(--paper); flex-direction: column; }
  .reinfer-controls { padding: 16px; background: var(--card); border-bottom: 1px solid var(--line); }
  .reinfer-button { padding: 12px 24px; background: var(--green); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; }

  /* Navigation */
  .nav-bar { position: fixed; bottom: 0; left: 0; right: 0; background: var(--card); border-top: 1px solid var(--line); display: flex; gap: 0; padding: 8px 0; }
  .nav-btn { flex: 1; padding: 12px; text-align: center; background: none; border: none; cursor: pointer; font-size: 12px; color: var(--faint); transition: all 0.3s; }
  .nav-btn.active { color: var(--accent); font-weight: 600; }

  /* Status message */
  .status { padding: 16px; background: #fffdf6; border: 1px solid #e5dcc6; border-radius: 8px; margin-bottom: 16px; color: #5d5747; font-size: 14px; }

  @media (max-width: 390px) {
    html { font-size: 14px; }
  }
</style>
</head>
<body>

<!-- Launcher Screen -->
<div id="screen-launcher" class="screen active">
  <div id="launcher-root"></div>
</div>

<!-- Chart Viewer Screen -->
<div id="screen-chart" class="screen">
  <div class="chart-header">
    <h2>Autumn Leaves</h2>
    <button onclick="HarmApp.showScreen('launcher')">← Back</button>
  </div>
  <div id="chart-container"></div>
</div>

<!-- Chord Editor Modal (overlay) -->
<div id="chord-modal" class="modal">
  <div class="modal-panel">
    <button class="modal-close" onclick="document.getElementById('chord-modal').classList.remove('active')">×</button>
    <h3>Edit Chord</h3>
    <div id="chord-editor-content"></div>
  </div>
</div>

<!-- Import Screen -->
<div id="screen-import" class="screen">
  <h2 style="margin: 16px 0;">Search for a Song</h2>
  <div class="import-card">
    <input class="import-field" type="text" placeholder="YouTube URL or search..." id="import-search">
    <button class="import-button" onclick="HarmApp.importSong()">Analyse</button>
  </div>
  <div id="import-progress"></div>
  <div id="recent-charts" style="margin-top: 24px;"></div>
</div>

<!-- Re-infer Screen -->
<div id="screen-reinfer" class="screen">
  <div class="reinfer-controls">
    <h2 style="margin: 0 0 12px;">Edit & Re-infer</h2>
    <button class="reinfer-button" onclick="HarmApp.runReinfer()">Re-infer with Fixes</button>
  </div>
  <div id="reinfer-container"></div>
</div>

<!-- Navigation Bar -->
<div class="nav-bar">
  <button class="nav-btn" onclick="HarmApp.showScreen('launcher')">Launcher</button>
  <button class="nav-btn" onclick="HarmApp.showScreen('chart')">Chart</button>
  <button class="nav-btn" onclick="HarmApp.showScreen('chord-editor')">Edit</button>
  <button class="nav-btn" onclick="HarmApp.showScreen('reinfer')">Re-infer</button>
  <button class="nav-btn" onclick="HarmApp.showScreen('import')">Import</button>
</div>

<script>
// ============================================================================
// HARMONIA INTEGRATED APP — Phase 2
// ============================================================================

// Global app state
window.HarmApp = (function() {
  const app = {};
  let currentScreen = 'launcher';
  let currentChart = null;
  let P = null; // Global payload from chart

  // Screen navigation
  app.showScreen = function(name) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    const screen = document.getElementById('screen-' + name);
    if (screen) {
      screen.classList.add('active');
      currentScreen = name;
      document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
      document.querySelector(`[onclick="HarmApp.showScreen('${name}')"]`)?.classList.add('active');

      // Initialize screen if needed
      if (name === 'chart') app.initChart();
      else if (name === 'import') app.initImport();
    }
  };

  // ── Launcher (embedded inline from Phase 1) ──
  app.initLauncher = function() {
    const HLAUNCH = window.HLAUNCH;
    if (HLAUNCH && document.getElementById('launcher-root')) {
      HLAUNCH.build(document.getElementById('launcher-root'));
    }
  };

  // ── Chart Viewer (using handoff engine HZC) ──
  app.initChart = function() {
    const container = document.getElementById('chart-container');
    if (!container) return;

    // Mount the HZC engine if available
    if (window.HZC) {
      container.innerHTML = '';
      const mount = document.createElement('div');
      mount.setAttribute('data-hzc', 'C:desktop');
      mount.style.width = '100%';
      mount.style.maxHeight = '70vh';
      mount.style.overflow = 'auto';
      container.appendChild(mount);

      // HZC auto-initializes, but we need to wire real data
      // This would require HZC to be modified to accept external data
      app.showStatus('Chart Viewer: Wire real data from P.chords', 'info');
    }
  };

  // ── Import Screen ──
  app.initImport = function() {
    const recentDiv = document.getElementById('recent-charts');
    if (recentDiv) {
      recentDiv.innerHTML = '<div class="status">Recent charts will appear here</div>';
    }
  };

  app.importSong = function() {
    const searchVal = document.getElementById('import-search').value;
    if (!searchVal) {
      app.showStatus('Enter a YouTube URL or song name', 'error');
      return;
    }

    const progressDiv = document.getElementById('import-progress');
    progressDiv.innerHTML = '<div class="status">Analysing... (This would POST to /api/analyze)</div>';

    // Would POST to /api/analyze endpoint
    console.log('Importing:', searchVal);
  };

  // ── Re-infer ──
  app.runReinfer = function() {
    if (!P) {
      app.showStatus('No chart loaded. Open Chart Viewer first.', 'error');
      return;
    }

    // Would POST to /api/reinfer/<chart> with {confirms, merges}
    const payload = {
      confirms: [], // User's chord corrections
      merges: []    // Section merges
    };

    app.showStatus('Re-infer: Would POST to /api/reinfer (not implemented yet)', 'info');
    console.log('Re-infer payload:', payload);
  };

  // ── Utilities ──
  app.showStatus = function(msg, type = 'info') {
    console.log(`[${type}]`, msg);
  };

  // ── Data Adapters ──
  // Convert P.chords to handoff engine format
  app.adaptChords = function(chords, depth = 'seventh') {
    if (!chords || !Array.isArray(chords)) return [];

    const byBar = {};
    chords.forEach(c => {
      const bar = c.bar || 0;
      if (!byBar[bar]) byBar[bar] = [];
      byBar[bar].push(c);
    });

    // Group by bar for HZC format
    const bars = [];
    Object.keys(byBar).sort((a, b) => a - b).forEach(bar => {
      const barChords = byBar[bar].sort((a, b) => (a.beat || 0) - (b.beat || 0));
      if (barChords.length > 0) {
        const first = barChords[0];
        const bar_obj = {
          sec: 'A', // Would need P.sections[bar]
          ch: {
            root: first.root,
            q: first.lv?.[depth]?.q || '',
            c: first.lv?.[depth]?.c || 0
          }
        };

        if (barChords.length > 1) {
          const second = barChords[1];
          bar_obj.ch2 = {
            root: second.root,
            q: second.lv?.[depth]?.q || '',
            c: second.lv?.[depth]?.c || 0
          };
        }

        bars.push(bar_obj);
      }
    });

    return bars;
  };

  return app;
})();

// ============================================================================
// LAUNCHER (embedded from Phase 1)
// ============================================================================

window.HLAUNCH = (function(){
  "use strict";
  const UI = "-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif";
  const SERIF = "Georgia,'Times New Roman',serif";
  const MONO = "'SF Mono','Fira Code',ui-monospace,Menlo,monospace";
  const T = { paper:"#f7f3e9", card:"#fffdf6", ink:"#1c1c1c", rule:"#b9b09a", faint:"#8a8371", accent:"#8a2b2b", line:"#e5dcc6", deep:"#2a2622", green:"#1f8a5b", amber:"#c58a2e" };
  const PORT = 7771, SRV = "http://localhost:" + PORT;
  const CMD = ".venv/bin/python scripts/harmonia_server.py";
  function el(tag,css,txt){ const e=document.createElement(tag); if(css)e.style.cssText=css; if(txt!=null)e.textContent=txt; return e; }

  const API = {};
  API.build = function(host){
    host.innerHTML = "";
    host.style.cssText = "min-height:100vh;display:flex;align-items:center;justify-content:center;padding:32px;background:inherit;font-family:"+UI+";";

    let phase = "checking", pollTimer = null;

    const card = el("div", `position:relative;width:100%;max-width:430px;background:${T.card};border:1px solid ${T.line};border-radius:22px;padding:38px 34px 30px;box-shadow:0 30px 70px -30px rgba(60,42,22,.5), 0 2px 0 rgba(255,255,255,.6) inset;text-align:center;`);
    const brand = el("div", "margin-bottom:24px;");
    const logo = el("div", `font:italic 500 44px Georgia,serif;color:${T.ink};letter-spacing:0;line-height:1;`);
    logo.innerHTML = 'harmon<span style="color:'+T.accent+'">ia</span>';
    brand.appendChild(logo);
    brand.appendChild(el("div", `font:500 12.5px ${UI};color:${T.faint};margin-top:9px;`, "chord charts from any recording"));
    card.appendChild(brand);

    const pill = el("div", `display:inline-flex;align-items:center;gap:9px;background:${T.paper};border:1px solid ${T.line};border-radius:999px;padding:8px 15px 8px 13px;margin-bottom:22px;`);
    const dotWrap = el("span", "position:relative;display:inline-flex;width:11px;height:11px;");
    const dot = el("span", `width:11px;height:11px;border-radius:50%;background:${T.rule};position:relative;z-index:1;`);
    dotWrap.appendChild(dot);
    const statusTx = el("span", `font:600 13px ${UI};color:${T.ink};`);
    pill.appendChild(dotWrap); pill.appendChild(statusTx);
    card.appendChild(pill);

    const body = el("div", "");
    card.appendChild(body);
    host.appendChild(card);

    function setDot(color, breathe, ring){
      dot.style.background = color;
      dot.style.animation = breathe ? "hl-breathe 1.4s ease-in-out infinite" : "none";
      [...dotWrap.querySelectorAll(".hl-ring")].forEach(r=>r.remove());
      if(ring){ const r=el("span", `position:absolute;inset:0;border-radius:50%;background:${color};z-index:0;`); r.className="hl-ring"; r.style.animation="hl-ring 1.6s ease-out infinite"; dotWrap.appendChild(r); }
    }

    function render(p){
      phase = p; body.innerHTML = "";
      if(p==="checking"){
        setDot(T.amber, true, false);
        statusTx.textContent = "Looking for Harmonia…";
        const bars = el("div", `display:flex;align-items:flex-end;justify-content:center;gap:4px;height:34px;margin:14px 0 6px;animation:hl-in .3s both;`);
        for(let i=0;i<5;i++) bars.appendChild(el("span", `width:5px;height:100%;background:${T.rule};border-radius:3px;transform-origin:bottom;animation:hl-bar 1s ${i*0.12}s ease-in-out infinite;`));
        body.appendChild(bars);
        body.appendChild(el("div", `font:italic 13px ${SERIF};color:${T.faint};margin-top:8px;`, "checking localhost:" + PORT));
      } else if(p==="online"){
        setDot(T.green, false, true);
        statusTx.textContent = "Running on :" + PORT;
        const openBtn = el("a", `display:flex;align-items:center;justify-content:center;gap:8px;text-decoration:none;background:${T.accent};color:${T.paper};border-radius:13px;padding:16px;font:600 16px ${UI};margin:6px 0 4px;animation:hl-in .3s both;box-shadow:0 10px 26px -12px rgba(138,43,43,.7);cursor:pointer;`, "Open Harmonia →");
        openBtn.onclick = () => { HarmApp.showScreen('chart'); };
        body.appendChild(openBtn);
        body.appendChild(el("div", `font:italic 12.5px ${SERIF};color:${T.faint};margin-top:12px;`, "ready to explore"));
      } else {
        setDot(T.amber, false, false);
        statusTx.textContent = "Not running yet";
        body.appendChild(el("div", `font:400 14.5px ${UI};color:${T.ink};line-height:1.55;margin-bottom:18px;animation:hl-in .3s both;`, "Start Harmonia from your terminal — this page opens itself the moment it's up, no refresh needed."));
        body.appendChild(el("div", `font:600 10px ${UI};letter-spacing:.08em;text-transform:uppercase;color:${T.faint};text-align:left;margin-bottom:6px;`, "from the repo root"));
        const code = el("button", `position:relative;display:block;width:100%;text-align:left;background:${T.deep};border:none;border-radius:11px;padding:14px 16px;cursor:pointer;`);
        code.appendChild(el("code", `display:block;font:13px monospace;color:#e7c9a0;white-space:nowrap;overflow-x:auto;padding-right:60px;`, CMD));
        const cp = el("span", `position:absolute;right:12px;top:50%;transform:translateY(-50%);font:600 10.5px ${UI};color:rgba(247,243,233,.55);`, "copy");
        code.appendChild(cp);
        code.onclick=()=>{ try{ navigator.clipboard.writeText(CMD); }catch(e){} cp.textContent="copied!"; cp.style.color=T.green; setTimeout(()=>{ cp.textContent="copy"; cp.style.color="rgba(247,243,233,.55)"; },1600); };
        body.appendChild(code);
        const foot = el("div", "display:flex;align-items:center;justify-content:space-between;margin-top:18px;");
        const watching = el("div", `display:inline-flex;align-items:center;gap:8px;font:500 12px ${UI};color:${T.faint};`);
        watching.appendChild(el("span", `width:8px;height:8px;border-radius:50%;background:${T.amber};animation:hl-breathe 1.4s ease-in-out infinite;`));
        watching.appendChild(el("span",null,"watching for it…"));
        foot.appendChild(watching);
        const retry = el("button", `border:1px solid ${T.line};background:${T.paper};color:${T.accent};border-radius:9px;padding:8px 16px;font:600 12.5px ${UI};cursor:pointer;`, "Retry now");
        retry.onclick=()=>{ check(); };
        foot.appendChild(retry);
        body.appendChild(foot);
      }
    }

    async function check(){
      render("checking");
      let ok = false;
      try { await fetch(SRV + "/", { mode:"no-cors", cache:"no-store", signal: (AbortSignal.timeout?AbortSignal.timeout(2500):undefined) }); ok = true; } catch(e){ ok = false; }
      if(ok) render("online");
      else { render("offline"); pollTimer = setTimeout(check, 3000); }
    }
    check();
  };
  return API;
})();

// Add CSS animations
const style = document.createElement('style');
style.textContent = `
  @keyframes hl-breathe { 0%,100% { opacity: .5; transform: scale(1); } 50% { opacity: 1; transform: scale(1.25); } }
  @keyframes hl-bar { 0%,100% { transform: scaleY(.4); } 50% { transform: scaleY(1); } }
  @keyframes hl-in { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes hl-ring { 0% { transform: scale(.8); opacity: .55; } 100% { transform: scale(2.4); opacity: 0; } }
`;
document.head.appendChild(style);

// Initialize on load
document.addEventListener('DOMContentLoaded', function() {
  HarmApp.initLauncher();
});
</script>

<!-- NOTE: To fully integrate:
1. Load handoff JS files:
   <script src="/handoff/js/harmonia_chart.js"></script>
   <script src="/handoff/js/harmonia_chord_editor.js"></script>
   <script src="/handoff/js/harmonia_import.js"></script>
   <script src="/handoff/js/harmonia_reinfer.js"></script>

2. Wire real data from P (Autumn Leaves payload)

3. Implement screen initialization functions to mount engines

4. Wire Re-infer endpoint to POST /api/reinfer/<chart>

This is a proof-of-concept shell. Full integration requires:
- Data adapters for P → handoff formats
- Real endpoint wiring
- Mount point configuration for each engine
-->

</body>
</html>
