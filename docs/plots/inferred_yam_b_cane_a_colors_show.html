<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Yamê - Bécane | A COLORS SHOW — chord chart</title>
<style>
  :root { --paper:#f7f3e9; --ink:#1c1c1c; --rule:#b9b09a; --faint:#8a8371; --accent:#8a2b2b; }
  * { box-sizing:border-box; }
  body { background:var(--paper); color:var(--ink); margin:0;
         font-family:Georgia,'Times New Roman',serif; }
  .sheet { max-width:980px; margin:0 auto; padding:28px 32px 48px; }
  h1 { text-align:center; font-size:30px; margin:0 0 4px; }
  .subhead { display:flex; justify-content:space-between; color:var(--faint);
             font-style:italic; font-size:14px; margin-bottom:16px; }

  /* ── Minimal top bar: a key pill and an options button are the only chrome
     visible by default. Everything else — transpose, uncertainty, scales,
     jazzify, motifs — lives in on-demand bottom sheets, so the chord grid
     is the first and only thing you see when you open a chart. ── */
  .topbar { display:flex; align-items:center; gap:10px; margin-bottom:10px; }
  .topbar h1 { flex:1; min-width:0; margin:0; font-size:22px; text-align:center;
               overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .pill { display:inline-flex; align-items:center; gap:5px; background:#efe9d9;
          border:1px solid #e2dac4; border-radius:22px; padding:8px 16px;
          min-height:44px; box-sizing:border-box;
          font:700 13px system-ui,sans-serif; color:#4a4636; cursor:pointer;
          flex:0 0 auto; transition:transform .1s ease, background .12s; }
  .pill::after { content:"⌄"; opacity:.5; font-size:10px; }
  .pill:active { transform:scale(.94); background:#e2d9c2; }
  /* 44×44pt is Apple's minimum recommended touch target */
  .icon-btn { display:inline-flex; align-items:center; justify-content:center;
              width:44px; height:44px; border-radius:50%; background:#efe9d9;
              border:1px solid #e2dac4; color:#4a4636; cursor:pointer; flex:0 0 auto;
              transition:transform .1s ease, background .12s; }
  .icon-btn:active { transform:scale(.9); background:#e2d9c2; }
  .icon-btn svg { pointer-events:none; }
  .transposeCtl { display:flex; flex-direction:column; align-items:center; gap:12px; }
  /* Sized so 12 buttons around the ring have real gaps between them — a
     button diameter has to stay well under the 30°-apart chord length or
     neighbours overlap and merge into blobs instead of reading as circles.
     radius (0.40×wheel, set in JS) × 2×sin(15°) ≥ button + gap. */
  .wheel { position:relative; width:250px; height:250px; border-radius:50%;
           flex:0 0 auto; touch-action:none; -webkit-user-select:none; user-select:none;
           background:radial-gradient(circle at 50% 42%,#f2ead4 0%,#ddd0ac 72%,#c3b48c 100%);
           box-shadow:inset 0 1px 4px #0003, 0 1px 2px #0002; }
  .wheel-ring { position:absolute; inset:0; transform-origin:50% 50%; will-change:transform; }
  .wheel-ring.snap { transition:transform .45s cubic-bezier(.32,1.5,.55,1); }
  .wheel-ring.snap .lbl { transition:transform .45s cubic-bezier(.32,1.5,.55,1); }
  .wheel button { position:absolute; left:50%; top:50%; width:44px; height:44px;
                  margin:-22px 0 0 -22px; border-radius:50%; padding:0;
                  border:1px solid #0003; color:#242018; font:700 15px system-ui,sans-serif;
                  cursor:grab; box-shadow:0 1px 2px #0002; -webkit-tap-highlight-color:transparent; }
  .wheel button .lbl { display:block; pointer-events:none; }
  .wheel button[aria-pressed=true] { outline:3px solid var(--accent); outline-offset:1px;
                                     color:#111; }
  .wheel-pointer { position:absolute; top:-10px; left:50%; transform:translateX(-50%);
                   width:0; height:0; border-left:10px solid transparent;
                   border-right:10px solid transparent; border-bottom:14px solid var(--accent);
                   pointer-events:none; filter:drop-shadow(0 1px 1px #0003); }
  @keyframes wheelTick { 0%{transform:translateX(-50%) scale(1);}
                         45%{transform:translateX(-50%) scale(1.5);}
                         100%{transform:translateX(-50%) scale(1);} }
  .wheel-pointer.tick { animation:wheelTick .16s ease-out; }
  .wheel .hub { position:absolute; left:50%; top:50%; transform:translate(-50%,-50%);
                width:80px; height:80px; border-radius:50%; background:#f7f3e9e8;
                border:1px solid #cfc7ae; display:flex; align-items:center;
                justify-content:center; font:700 18px system-ui,sans-serif; color:#4a4636;
                pointer-events:none; box-shadow:inset 0 1px 2px #0002; }
  .transposeLabel { min-width:90px; font:700 15px system-ui,sans-serif; color:#4a4636; }
  select, input[type=range] { font:inherit; }
  select { padding:3px 6px; border-radius:6px; border:1px solid #cfc7ae; background:#fff; }
  .legend { display:flex; align-items:center; gap:8px; justify-content:center; }
  .legend .bar { width:110px; height:12px; border-radius:6px; }
  #keylegend { display:none; flex-wrap:wrap; gap:14px; font-family:system-ui,sans-serif;
               font-size:12.5px; color:#4a4636; margin:0 0 16px 2px; }
  #keylegend .item { display:flex; align-items:center; gap:6px; }
  #keylegend .sw { width:15px; height:15px; border-radius:4px; border:1px solid #0002; }
  .grid { display:grid; grid-template-columns:repeat(4,1fr);
          border-right:1px solid var(--rule); }
  .measure { position:relative; min-height:74px; border-left:1px solid var(--rule);
             display:flex; align-items:center; justify-content:center; padding:6px 4px;
             transition:background .15s; }
  .measure.section-start { border-left:4px double var(--rule); }
  .measure.final { border-right:3px solid var(--accent); }
  .seclabel { position:absolute; top:4px; left:5px; width:20px; height:20px;
              border:1.4px solid var(--accent); border-radius:4px; color:var(--accent);
              font-family:system-ui,sans-serif; font-weight:700; font-size:12px;
              display:flex; align-items:center; justify-content:center; background:#f7f3e9aa; }

  /* ── Section chips: A/B/C navigator row above the grid ── */
  #section-chips { display:none; flex-wrap:wrap; gap:6px; margin:0 0 10px; padding:0; }
  #section-chips.visible { display:flex; }
  .sec-chip { display:inline-flex; align-items:center; justify-content:center;
              min-width:32px; height:28px; padding:0 10px;
              border:1.5px solid var(--accent); border-radius:6px;
              background:#f7f3e9; color:var(--accent);
              font:700 13px Georgia,'Times New Roman',serif;
              cursor:pointer; transition:background .12s, color .12s; }
  .sec-chip:hover,
  .sec-chip.active { background:var(--accent); color:#f7f3e9; }
  body[data-motif-style="full"].motif-active .sec-chip {
    border-color:#00c8ff66; color:#58d4ff; background:#0c1522; }
  body[data-motif-style="full"].motif-active .sec-chip:hover,
  body[data-motif-style="full"].motif-active .sec-chip.active {
    background:#00c8ff22; color:#00c8ff; border-color:#00c8ff; }

  .chords { display:flex; gap:18px; align-items:baseline; justify-content:center;
            width:100%; flex-wrap:wrap; }
  .chord { white-space:nowrap; transition:color .15s; }
  .chord.jazz { opacity:.82; }
  .chord.jazz::after { content:"✦"; font-family:system-ui,sans-serif; font-size:10px;
                       color:#8a6f2a; margin-left:2px; vertical-align:top; }
  .chord .root { font-size:27px; font-style:italic; }
  .chord .qual { font-size:17px; font-style:italic; }
  .chord sup { font-size:.62em; }
  .chord .acc { font-size:.6em; margin-left:-.1em; vertical-align:.12em; }
  /* a bar with 2+ chords shrinks so it doesn't wrap onto a second line and
     blow out that entire grid row's height (every measure in the row grows
     to match the tallest one) */
  .measure:has(.chords > .chord:nth-child(2)) .chords { gap:8px; }
  .measure:has(.chords > .chord:nth-child(2)) .chord .root { font-size:19px; }
  .measure:has(.chords > .chord:nth-child(2)) .chord .qual { font-size:12px; }
  .repeat { position:absolute; right:6px; bottom:4px; color:var(--faint);
            font-family:system-ui,sans-serif; font-size:11px; }
  .repeat-bar { opacity:.55; }
  .pct-repeat { font:700 28px Georgia,serif; color:var(--faint); }
  .log { display:none; margin-top:12px; color:#5d5747; font-family:system-ui,sans-serif;
         font-size:12px; line-height:1.4; }
  .caption { color:var(--faint); font-size:12px; font-style:italic; margin-top:20px; }

  /* ── Scale label on first bar of each region ── */
  .scalelabel { position:absolute; bottom:4px; left:6px; font:600 9.5px system-ui,sans-serif;
                color:#4a4636cc; white-space:nowrap; pointer-events:none; letter-spacing:.02em; }

  /* ── Bottom-sheet modal: rotor + the consolidated options panel ── */
  /* above the docked YouTube player (z-index 9990, injected by
     harmonia_server.py) so an open sheet's bottom edge is never hidden
     behind the video */
  .modal { position:fixed; inset:0; z-index:9995; display:none; }
  .modal.open { display:block; }
  .modal-backdrop { position:absolute; inset:0; background:#1c1c1c5c;
                     opacity:0; transition:opacity .22s ease; }
  .modal.open .modal-backdrop { opacity:1; }
  .modal-panel { position:absolute; left:50%; bottom:0; transform:translate(-50%,105%);
                 width:min(94vw,440px); max-height:78vh; overflow-y:auto;
                 background:#f7f3e9; border:1px solid #e2dac4; border-bottom:none;
                 border-radius:18px 18px 0 0; padding:10px 20px calc(20px + env(safe-area-inset-bottom));
                 box-shadow:0 -8px 30px #0003; font-family:system-ui,sans-serif;
                 font-size:13px; color:#4a4636; transition:transform .32s cubic-bezier(.32,.9,.35,1); }
  .modal.open .modal-panel { transform:translate(-50%,0); }
  .modal-handle { width:36px; height:4px; border-radius:2px; background:#cfc7ae;
                  margin:2px auto 12px; }
  .opt-section { display:flex; flex-direction:column; gap:10px; padding:12px 0; }
  .opt-section label { display:flex; align-items:center; gap:8px; }
  .opt-title { font:700 11px system-ui,sans-serif; text-transform:uppercase;
               letter-spacing:.05em; color:#8a8371; }
  .opt-row { display:flex; gap:8px; flex-wrap:wrap; }
  .opt-info { display:flex; justify-content:space-between; gap:10px; font-style:italic;
              color:#6b6050; font-size:12.5px; }
  .modal-panel hr { border:none; border-top:1px solid #e2dac4; margin:0; }
  .modal-panel button { padding:7px 14px; border:1px solid #cfc7ae; border-radius:8px;
                         background:#efe9d9; cursor:pointer; font:600 12px system-ui,sans-serif;
                         color:#4a4636; transition:transform .1s ease, background .12s; }
  .modal-panel button:active { transform:scale(.94); background:#e0d5c0; }

  /* ── Jazzify overrides ── */
  .measure.bar-override { outline:2px dashed #8a6f2a; outline-offset:-2px; }
  .measure.bar-override::before { content:attr(data-barlevel); position:absolute;
                                  top:2px; right:4px; font:600 9px system-ui,sans-serif;
                                  color:#8a6f2a; background:#f7f3e9cc; padding:1px 4px;
                                  border-radius:3px; }

  /* ══ MOTIF ANALYSER ══ */
  #motifmode-btn {
    display:inline-flex; align-items:center; gap:7px; padding:6px 14px;
    border-radius:8px; cursor:pointer; font:700 12px system-ui,sans-serif;
    letter-spacing:.04em; border:1.5px solid #4a4636;
    background:linear-gradient(135deg,#2c2820,#3a3228);
    color:#c8b88a; box-shadow:0 2px 6px #0003,inset 0 1px 0 #ffffff18;
    transition:all .25s; user-select:none;
  }
  #motifmode-btn:hover { background:linear-gradient(135deg,#3a3228,#4a4238);
    color:#e8d8aa; border-color:#8a7a5a; }
  #motifmode-btn.active { background:linear-gradient(135deg,#0d1117,#161b22);
    color:#58d4ff; border-color:#58d4ff88;
    box-shadow:0 0 14px #58d4ff44,0 0 28px #58d4ff1a,inset 0 1px 0 #58d4ff22;
    text-shadow:0 0 10px #58d4ffaa; }
  #motifmode-btn .icon { font-size:15px; transition:transform .4s; }
  #motifmode-btn.active .icon { transform:rotate(20deg) scale(1.1); }
  #motif-overlay { display:none; border-radius:12px; overflow:hidden; margin-bottom:14px;
                   box-shadow:0 0 0 1.5px #58d4ff22,0 8px 40px #00000077; }
  #motif-overlay.active { display:block; }
  #motifpanel {
    display:flex; background:linear-gradient(180deg,#0d1117,#111820);
    border-bottom:1px solid #58d4ff18; padding:12px 16px;
    font-family:system-ui,sans-serif; font-size:13px; color:#8da8c0;
    gap:16px; flex-wrap:wrap; align-items:center;
  }
  /* Song-structure-at-a-glance: the whole song compressed to its recurring
     motifs in sequence (e.g. "A A A' B") — the practical payoff of the
     motif-detection work, meant to be legible in one look, no scrolling
     the chart to piece it together. Non-motif stretches collapse to a
     single neutral dash instead of one chip per passing chord. */
  #motifroadmap { width:100%; display:flex; align-items:center; gap:5px;
                  overflow-x:auto; padding-bottom:2px; -webkit-overflow-scrolling:touch; }
  #motifroadmap:empty { display:none; }
  .roadmap-chip { flex:0 0 auto; padding:4px 10px; border-radius:8px;
                  font:700 11px system-ui,sans-serif; white-space:nowrap;
                  cursor:pointer; transition:filter .15s,transform .15s; }
  .roadmap-chip:hover { filter:brightness(1.3); transform:scale(1.06); }
  .roadmap-gap { flex:0 0 auto; width:14px; height:1px; background:#2a3a50; }
  /* Song-structure-at-a-glance: the whole song compressed to its recurring
     motifs in sequence (e.g. "A A A' B") — the practical payoff of the
     motif-detection work, meant to be legible in one look, no scrolling
     the chart to piece it together. Non-motif stretches collapse to a
     single neutral dash instead of one chip per passing chord. */
  #motifroadmap { width:100%; display:flex; align-items:center; gap:5px;
                  overflow-x:auto; padding-bottom:2px; -webkit-overflow-scrolling:touch; }
  #motifroadmap:empty { display:none; }
  .roadmap-chip { flex:0 0 auto; padding:4px 10px; border-radius:8px;
                  font:700 11px system-ui,sans-serif; white-space:nowrap;
                  cursor:pointer; transition:filter .15s,transform .15s; }
  .roadmap-chip:hover { filter:brightness(1.3); transform:scale(1.06); }
  .roadmap-gap { flex:0 0 auto; width:14px; height:1px; background:#2a3a50; }
  #motifpanel label { display:flex; align-items:center; gap:6px; color:#a0b8d0; }
  #motifpanel select { background:#1a2233; border:1px solid #2a3a50; color:#c8dff0;
    border-radius:6px; padding:4px 8px; font:inherit; cursor:pointer; outline:none; }
  .gran-group { display:flex; gap:3px; flex-wrap:wrap; }
  .gran-group button { padding:4px 10px; border-radius:6px; border:1px solid #2a3a50;
    background:#1a2233; color:#7590b0; font:600 11px system-ui,sans-serif;
    cursor:pointer; transition:all .15s; white-space:nowrap; }
  .gran-group button.sel { background:#58d4ff1a; border-color:#58d4ff88; color:#58d4ff;
    box-shadow:0 0 8px #58d4ff33; }
  .gran-group button:hover:not(.sel) { background:#202c3c; color:#8da8c0; }
  #motif-mode-group button.sel { border-color:#bf5fff88; color:#bf5fff;
    background:#bf5fff1a; box-shadow:0 0 8px #bf5fff33; }
  #motifstats { color:#7590b0; font-size:11px; margin-left:auto; }
  #motifstats b { color:#58d4ff; }
  #motiflegend { width:100%; display:flex; flex-direction:column; gap:7px;
                 padding-top:8px; border-top:1px solid #1a2a3a; margin-top:4px; }
  .motif-fam-group { display:flex; align-items:center; flex-wrap:wrap; gap:6px; }
  .motif-fam-label { font:700 10px system-ui,sans-serif; text-transform:uppercase;
    letter-spacing:.05em; color:#7590b0; flex:0 0 auto; margin-right:2px; min-width:112px; }
  #motiflegend .item { display:inline-flex; align-items:center; gap:6px; padding:4px 12px;
    border-radius:20px; cursor:pointer; font:600 12px system-ui,sans-serif;
    border:1px solid transparent; transition:filter .2s,transform .2s; }
  #motiflegend .item:hover { filter:brightness(1.3); transform:scale(1.05); }
  #motiflegend .item .sw { width:9px; height:9px; border-radius:50%; flex:0 0 auto; }
  #motiflegend .item .cnt { font-size:10px; opacity:.6; font-weight:400; }
  /* style toggle button */
  #motif-style-btn { padding:5px 9px; border-radius:7px; cursor:pointer; font-size:13px;
    border:1.5px solid #4a4636; background:linear-gradient(135deg,#2c2820,#3a3228);
    color:#c8b88a; transition:all .25s; user-select:none; line-height:1; }
  #motif-style-btn:hover { border-color:#8a7a5a; color:#e8d8aa; }
  body.motif-active #motif-style-btn { border-color:#58d4ff66; color:#58d4ff88; }

  /* ── Style 1: "Neon Lights" — full-page Tron dark ── */
  body[data-motif-style="full"].motif-active {
    --paper:#07090f; --ink:#c8d8f0; --rule:#1e2d45; --faint:#3a5070;
    --accent:#00c8ff; background:#07090f; transition:background .4s, color .4s; }
  body[data-motif-style="full"].motif-active .sheet { background:#07090f; }
  body[data-motif-style="full"].motif-active h1,
  body[data-motif-style="full"].motif-active .subhead { color:#a0c4e8; text-shadow:0 0 18px #00c8ff44; }
  body[data-motif-style="full"].motif-active .grid { border-color:#1e2d45; background:#07090f; }
  body[data-motif-style="full"].motif-active .measure { border-color:#1e2d45 !important; background:#0b1220 !important; }
  body[data-motif-style="full"].motif-active .measure.section-start { border-left-color:#1e4a7a !important; }
  body[data-motif-style="full"].motif-active .seclabel { border-color:#1e4a7a; color:#5599cc; }
  body[data-motif-style="full"].motif-active .scalelabel { color:#4488bb; }
  body[data-motif-style="full"].motif-active .chord { color:#8ab8d8; }
  body[data-motif-style="full"].motif-active .pill,
  body[data-motif-style="full"].motif-active .icon-btn { background:#0c1522; border-color:#1e2d45; color:#8ab8d8; }
  body[data-motif-style="full"].motif-active #motif-overlay { background:#07090f; }
  body[data-motif-style="full"].motif-active #motifpanel { background:#0c1522; border-color:#1e2d45; color:#8ab8d8; }
  body[data-motif-style="full"].motif-active #motiflegend .item { background:#0c1e35; border-color:#1e3550; }
  body[data-motif-style="full"].motif-active #motiflegend .item .cnt { color:#5588aa; }
  body[data-motif-style="full"].motif-active .caption { color:#3a5070; }
  body[data-motif-style="full"].motif-active #motifmode-btn { background:#001428; border-color:#00c8ff88;
    color:#00c8ff; box-shadow:0 0 12px #00c8ff44; }
  /* ── Style 2: "Lab" — dark overlay panel + grid only, warm page stays ── */
  body[data-motif-style="overlay"].motif-active #motif-overlay {
    box-shadow:0 0 0 1.5px #58d4ff22,0 8px 40px #00000077; }
  body[data-motif-style="overlay"].motif-active #motifpanel {
    background:linear-gradient(180deg,#0d1117,#111820); border-bottom:1px solid #58d4ff18; }
  body[data-motif-style="overlay"].motif-active .grid.motif-mode { background:#0a0e14; }
  body[data-motif-style="overlay"].motif-active .grid.motif-mode .measure {
    background:#0a0e14 !important; border-color:#161e2a !important; }
  body[data-motif-style="overlay"].motif-active .grid.motif-mode .measure.section-start {
    border-left:4px double #1e3050 !important; }
  body[data-motif-style="overlay"].motif-active .grid.motif-mode .seclabel {
    border-color:#2a4060; color:#3a5878; }
  body[data-motif-style="overlay"].motif-active .grid.motif-mode .chord { color:#1e2c3a !important; }

  /* Motif segment — background tint only; SVG overlay draws the outline */
  .motif-segment {
    --cc: var(--chip-color, #00c8ff);
    display:inline-flex; align-items:center; gap:14px;
    align-self:center;
    border:none; border-radius:0; padding:3px 8px;
    box-sizing:border-box;
    transition:filter .2s;
  }
  body[data-motif-style="full"].motif-active .motif-segment {
    background:color-mix(in srgb,var(--cc) 7%,transparent);
  }
  body[data-motif-style="overlay"].motif-active .motif-segment {
    background:var(--mc-bg);
  }
  .motif-segment.motif-hi { filter:brightness(1.4); }
  body[data-motif-style="full"].motif-active .motif-segment .chord {
    color:#e8f4ff !important; text-shadow:0 0 6px var(--cc);
  }
  body[data-motif-style="overlay"].motif-active .motif-segment .chord {
    color:var(--mc-fg) !important; text-shadow:0 0 5px var(--mc-glow);
  }
  .motif-segment .chord.jazz::after { color:#c8a050; }
  /* SVG overlay rect highlighting */
  .motif-svg-rect { transition:stroke-width .15s; }
  .motif-svg-rect.motif-svg-hi { stroke-width:2.5 !important; }
  .measure.motif-bar { transition:background .2s; }
  .measure.motif-bar-hi { filter:brightness(0.88); }
  .grid { position:relative; }
  .grid.motif-mode { cursor:crosshair; user-select:none; }
  .measure.motif-sel { outline:2px solid #00c8ff66; outline-offset:-2px; z-index:2;
    background:#00c8ff08 !important; }
  .measure.motif-sel-start { border-left:2px solid #00c8ff !important; }
  .measure.motif-sel-end   { border-right:2px solid #00c8ff !important; }

  /* Motif brackets rendered above measures */
  .motif-brackets { position:absolute; top:2px; left:0; right:0; pointer-events:none;
                    display:flex; flex-direction:column; gap:2px; transform:translateY(-100%); }
  /* Auto-detected motif brackets rendered inside the top of each measure */
  .motif-auto-brackets { position:absolute; top:4px; left:0; right:0; pointer-events:none;
                         display:flex; flex-direction:column; gap:2px; }
  .measure.has-motif { padding-top:24px; }
  .measure.has-motif-stack { padding-top:44px; }

}
function targetQual(ctx){return ctx.kind==="minor"?"-7":"^7";}

// Level 3: sample between just V or full ii-V
function iiVFor(target, bar){
  const justV = seededRandom(bar, 30) < 0.3;  // 30% chance for just V
  if(target.ctx.kind==="minor"){
    if(justV) return [{root:mod(target.ctx.tonic+7,12), q:"7b9", beat:0}];
    return [
      {root:mod(target.ctx.tonic+2,12), q:"-7b5", beat:0},
      {root:mod(target.ctx.tonic+7,12), q:"7b9", beat:P.bpb/2},
    ];
  }
  if(justV) return [{root:mod(target.ctx.tonic+7,12), q:"7", beat:0}];
  return [
    {root:mod(target.ctx.tonic+2,12), q:"-7", beat:0},
    {root:mod(target.ctx.tonic+7,12), q:"7", beat:P.bpb/2},
  ];
}

// Level 4: sample tritone sub, backdoor (bVII7), or keep original
function sampleSubstitution(d, bar, resolves) {
  const r = seededRandom(bar, 40);
  if(r < 0.2) return {type:"keep", root:d.root, q:d.q};  // 20% keep
  if(resolves && r < 0.4) return {type:"backdoor", root:mod(d.root+5,12), q:"7"};  // bVII7
  return {type:"tritone", root:mod(d.root+6,12), q:"7"};  // default: tritone
}

// Level 5: sample alterations
function sampleAlteration(d, bar) {
  const alts = d.jazz
    ? ["7#11", "7b9#11", "7alt"]           // substituted doms: Lydian-ish
    : ["7b9", "7#9", "7b13", "7alt"];      // original doms: altered scale
  return pick(alts, bar, 50);
}

function jazzify(base, k1, globalAmount, flats){
  const log=[];
  const name=pc=>noteName(pc,flats);

  // Effective level per bar: override or global
  const barLevel = bar => barOverrides.has(bar) ? barOverrides.get(bar) : globalAmount;

  let out=base.map((d,i)=>({...d, ctx:k1[i], jazz:false, source:i, effLevel:barLevel(d.bar)}));

  // Level 1: triads -> 7ths
  out=out.map(d=>{
    if(d.effLevel < 1) return d;
    const q=seventhQuality(d,d.ctx);
    if(q!==d.q) log.push(`bar ${d.bar+1}: ${name(d.root)}${d.q||""} → ${name(d.root)}${q}`);
    return {...d,q,jazz:d.jazz||q!==d.q};
  });

  // Level 2: extensions (9/11/13)
  out=out.map(d=>{
    if(d.effLevel < 2) return d;
    const q=extensionQuality(d.q);
    if(q!==d.q) log.push(`bar ${d.bar+1}: added ${q.replace(d.q,"")} colour`);
    return {...d,q,jazz:d.jazz||q!==d.q};
  });

  // Level 3: ii-V insertions with sampling
  const byBar=Object.groupBy?Object.groupBy(out,d=>d.bar):out.reduce((a,d)=>((a[d.bar]??=[]).push(d),a),{});
  const inserts=new Map();
  out.forEach((d,i)=>{
    if(i===0||d.beat!==0) return;
    const prev=out[i-1];
    if(prev.effLevel < 3) return;
    const prevBar=byBar[prev.bar]||[];
    if(d.bar<=0||prev.bar!==d.bar-1||prevBar.length!==1) return;
    const targetish=isMajQ(d.q)||isMinorQ(d.q)||d.q.includes("^");
    const strong=[5,7].includes(mod(d.root-prev.root,12));
    if(!targetish||!strong) return;
    const iiV = iiVFor(d, prev.bar);
    inserts.set(prev.bar, iiV.map(x=>({...x,bar:prev.bar,bass:-1,c:0.55,jazz:true,ctx:d.ctx,effLevel:prev.effLevel})));
    const label = iiV.length === 1 ? `V into` : `ii-V into`;
    log.push(`bar ${prev.bar+1}: inserted ${label} ${name(d.root)}${targetQual(d.ctx)}`);
  });
  out=out.filter(d=>!inserts.has(d.bar)).concat([...inserts.values()].flat()).sort((a,b)=>a.bar-b.bar||a.beat-b.beat);

  // Level 3b: intra-bar approach chords — split a lone full-bar chord at beat 3,
  // inserting a sneaky V7 or tritone-of-V on beats 3+ so it "points" to the chord.
  // Only when the bar carries exactly one chord (undivided slot) and the chord is
  // a valid resolution target (maj or min).  Adds up to 4 chords per bar.
  const intraInserts=new Map();
  {
    const byBar2=out.reduce((a,d)=>((a[d.bar]??=[]).push(d),a),{});
    out.forEach(d=>{
      if(d.effLevel < 3) return;
      const barChords=byBar2[d.bar]||[];
      if(barChords.length!==1||d.beat!==0) return;   // only lone full-bar chords
      if(!isMajQ(d.q)&&!isMinorQ(d.q)&&!d.q.includes("^")) return;
      const r=seededRandom(d.bar,35);
      if(r<0.45) return;  // 55% chance of inserting an approach
      const useTritone=seededRandom(d.bar,36)<0.3;
      const vRoot=isMinorQ(d.q)?mod(d.root+7,12):mod(d.root+7,12);  // V is always dom7 a 5th up
      const approachRoot=useTritone?mod(vRoot+6,12):vRoot;
      const approachQ=isMinorQ(d.q)?"7b9":"7";
      const half=P.bpb/2;
      intraInserts.set(d.bar,[
        {...d, beat:0},
        {root:approachRoot,q:approachQ,bar:d.bar,beat:half,bass:-1,c:0.52,jazz:true,ctx:d.ctx,effLevel:d.effLevel},
      ]);
      log.push(`bar ${d.bar+1}: beat-3 ${useTritone?"tritone ":""}approach → ${name(d.root)}${d.q||""}`);
    });
  }
  out=out.filter(d=>!intraInserts.has(d.bar)||d.beat!==0).map(d=>intraInserts.has(d.bar)&&d.beat===0?d:d);
  // replace bars that got intra-inserts
  out=out.filter(d=>!intraInserts.has(d.bar)).concat([...intraInserts.values()].flat()).sort((a,b)=>a.bar-b.bar||a.beat-b.beat);

  // Level 4: substitutions with sampling
  out=out.map((d,i)=>{
    if(d.effLevel < 4) return d;
    const n=out[i+1], resolves=n&&mod(n.root-d.root,12)===5;
    if(isDomQ(d.q)&&(d.jazz||d.beat>=P.bpb/2||resolves)){
      const sub = sampleSubstitution(d, d.bar, resolves);
      if(sub.type === "keep") return d;
      const label = sub.type === "tritone" ? "tritone sub" : "backdoor";
      log.push(`bar ${d.bar+1}: ${label} ${name(d.root)}7 → ${name(sub.root)}7`);
      return {...d,root:sub.root,q:sub.q,jazz:true};
    }
    return d;
  });

  // Level 5: alterations with sampling
  out=out.map((d,i)=>{
    if(d.effLevel < 5) return d;
    if(isDomQ(d.q)){
      const q=sampleAlteration(d, d.bar);
      if(q!==d.q) log.push(`bar ${d.bar+1}: altered ${name(d.root)}${d.q} → ${name(d.root)}${q}`);
      return {...d,q,jazz:true};
    }
    return d;
  });

  const barHasOverride = new Set([...barOverrides.keys()]);
  return {chords:out.map(d=>({...d,ctx:undefined,effLevel:undefined,barOverride:barHasOverride.has(d.bar)})), log};
}
function renderGrid(chords,flats,globalJazz){
  const grid=document.querySelector(".grid");
  const byBar=Array.from({length:P.nBars},()=>[]);
  chords.forEach((d,i)=>byBar[d.bar]?.push({...d,idx:i}));
  const fuse=document.getElementById("fuse").checked;
  const effective=[];
  for(let i=0;i<P.nBars;i++){
    const sameSection=i>0&&P.sections[i]===P.sections[i-1];
    effective[i]=byBar[i].length?barSig(byBar[i]):(sameSection?effective[i-1]:"");
  }
  let html="",bar=0;
  while(bar<P.nBars){
    const sec=P.sections[bar]||"", start=bar===0||sec!==(P.sections[bar-1]||"");
    let span=1;
    if(fuse&&effective[bar]){
      const sig=effective[bar], maxSpan=P.cols-(bar%P.cols);
      while(bar+span<P.nBars&&span<maxSpan&&P.sections[bar+span]===sec&&effective[bar+span]===sig) span++;
    }
    const hasOverride = barOverrides.has(bar);
    const barLvl = hasOverride ? barOverrides.get(bar) : globalJazz;
    let klass="measure"+(start?" section-start":"")+(bar+span>=P.nBars?" final":"");
    if(hasOverride) klass += " bar-override";
    const label=start&&sec?`<span class="seclabel">${sec}</span>`:"";
    const body='<span class="chords">'+byBar[bar].map(d=>
      `<span class="chord${d.jazz?" jazz":""}" id="chord-${d.idx}" data-beat="${d.beat}"></span>`).join("")+'</span>';
    const levelAttr = hasOverride ? ` data-barlevel="${barLvl}"` : "";
    // First cell: full chords + span count if >1; subsequent cells: % repeat sign
    html+=`<div class="${klass}" data-bar="${bar}" data-sec="${sec}"${levelAttr} style="grid-column:span 1">${label}${body}${span>1?`<span class="repeat">×${span}</span>`:""}</div>`;
    for(let s=1;s<span;s++){
      html+=`<div class="measure repeat-bar" data-bar="${bar+s}" data-sec="${sec}" style="grid-column:span 1"><span class="pct-repeat">%</span></div>`;
    }
    bar+=span;
  }
  grid.innerHTML=html;
}

// AUTO MOTIF ANALYSER — colours chords from pre-computed payload
// ══════════════════════════════════════════════════════════════════

let motifModeActive = false;

// Derive per-colour CSS vars for a hex colour (bg, fg, glow, border)
function motifColorVars(hex) {
  return `--mc-bg:${hex}22;--mc-fg:${hex};--mc-glow:${hex}88;--mc-border:${hex}44`;
}

// Fixed colour per *named* shape, grouped by harmonic family — "ii-V" is
// always cyan, in every song, instead of whichever hue happened to be next
// in rotation (the old bug: colour = order of first appearance, so it
// silently collided past 8 motifs and never meant the same thing twice).
// Computed client-side from the motif's name so it applies uniformly
// whether this chart was rendered before or after this fix.
const MOTIF_PALETTE = ["#00d4ff","#39ff14","#ff6ec7","#ffe400","#bf5fff","#ff4444","#00ffb3","#ff8c00"];
const SHAPE_FAMILY = {
  "ii-V":"Cadential","ii-V-I":"Cadential","ii-V ii-V":"Cadential",
  "V-I":"Resolution",
  "I-IV":"Subdominant",
  "I-VI":"Turnaround",
  "vi-ii":"Diatonic chain",
  "V/V-V":"Secondary dominant","dom-cycle":"Secondary dominant",
  "+4th":"Root: 4ths/5ths","+5th":"Root: 4ths/5ths",
  "+4th chain":"Root: 4ths/5ths","4th cycle":"Root: 4ths/5ths",
  "+2nd":"Root: steps","-2nd":"Root: steps","+½step":"Root: steps","-½step":"Root: steps",
  "+m3rd":"Root: 3rds","+M3rd":"Root: 3rds",
  "tritone":"Root: tritone",
};
const FAMILY_COLOR = {
  "Cadential":"#00d4ff","Resolution":"#39ff14","Subdominant":"#ff8c00",
  "Turnaround":"#bf5fff","Diatonic chain":"#00ffb3","Secondary dominant":"#ff4444",
  "Root: 4ths/5ths":"#00d4ff","Root: steps":"#ffe400","Root: 3rds":"#bf5fff",
  "Root: tritone":"#ff4444",
};
function motifFamily(name) { return SHAPE_FAMILY[name] || "Other patterns"; }
function motifColor(name) {
  if (SHAPE_FAMILY[name]) return FAMILY_COLOR[SHAPE_FAMILY[name]];
  // unnamed shape or a literal ("exact") repeat — no fixed identity to
  // anchor a colour to, so hash the name into the palette deterministically
  let h = 0;
  for (let i = 0; i < name.length; i++) h = (h * 31 + name.charCodeAt(i)) | 0;
  return MOTIF_PALETTE[Math.abs(h) % MOTIF_PALETTE.length];
}

function renderAutoMotifs() {
  const active = motifModeActive;
  const overlay = document.getElementById('motif-overlay');
  const btn = document.getElementById('motifmode-btn');
  overlay.classList.toggle('active', active);
  btn.classList.toggle('active', active);
  document.querySelector('.grid').classList.toggle('motif-mode', active);
  // Tron dark mode
  document.body.classList.toggle('motif-active', active);

  // Clear existing motif segments (unwrap)
  document.querySelectorAll('.motif-segment').forEach(seg => {
    while (seg.firstChild) seg.parentNode.insertBefore(seg.firstChild, seg);
    seg.remove();
  });
  document.getElementById('motif-svg-overlay')?.remove();
  document.getElementById('motiflegend').innerHTML = '';
  document.getElementById('motifstats').innerHTML = '';
  document.getElementById('motifroadmap').innerHTML = '';
  document.getElementById('motifroadmap').innerHTML = '';

  if (!active || !P.motifs || !Object.keys(P.motifs).length) return;

  const mode = document.querySelector('#motif-mode-group .sel')?.dataset.mode || 'shape';
  const cat  = document.querySelector('#motif-cat-group .sel')?.dataset.cat   || 'All';
  const layer = P.motifs[mode]?.[cat];
  if (!layer) return;

  const ann = layer.ann;

  // Assign one run id per motif *instance* — a new id starts at pos===0
  // (the first chord of an occurrence) and every following chord of that
  // same occurrence (pos 1, 2, ...) keeps it, so a 2+ chord motif like a
  // ii-V draws as one grouped bracket instead of one box per chord. (Bug
  // history: this used to key on name+pos, which is unique per chord within
  // an instance almost by construction — so every chord got its own id and
  // "grouped" motifs never visually grouped.)
  const chordRunId = {};
  let runCounter = 0, prevIdx = -2;
  P.chords.forEach((_, i) => {
    const a = ann[i];
    if (!a || a.len < 2) { return; }
    if (a.pos === 0 || i !== prevIdx + 1) runCounter++;
    chordRunId[i] = runCounter;
    prevIdx = i;
  });

  // Group chord indices by (runId, parent .chords container) — one segment
  // per bar per motif instance; drawMotifOutlines() unifies same-run
  // segments that land in different bars into one visual bracket.
  let parentCounter = 0;
  const segGroups = new Map(); // key -> {els, a, rid}
  P.chords.forEach((_, i) => {
    const a = ann[i];
    if (!a || a.len < 2) return;
    const el = document.getElementById('chord-' + i);
    if (!el) return;
    const rid = chordRunId[i];
    const parent = el.parentNode;
    if (!parent._msid) parent._msid = ++parentCounter;
    const key = rid + '|' + parent._msid;
    if (!segGroups.has(key)) segGroups.set(key, {els: [], a, rid});
    segGroups.get(key).els.push(el);
  });
  document.querySelectorAll('.chords').forEach(p => delete p._msid);

  // Inject one .motif-segment per group (one per bar; drawMotifOutlines()
  // unifies same-run segments across bars/rows into one visual bracket)
  segGroups.forEach(({els, a, rid}) => {
    const parent = els[0].parentNode;
    const seg = document.createElement('span');
    seg.className = 'motif-segment';
    seg.dataset.motifName  = a.name;
    seg.dataset.motifRunId = rid;
    const segColor = motifColor(a.name);
    seg.style.setProperty('--chip-color', segColor);
    seg.style.setProperty('--mc-bg',      segColor + '18');
    seg.style.setProperty('--mc-fg',      segColor);
    seg.style.setProperty('--mc-glow',    segColor + '99');
    seg.style.setProperty('--mc-border',  segColor + '55');
    parent.insertBefore(seg, els[0]);
    els.forEach(el => seg.appendChild(el));
  });

  // Roadmap — the whole song compressed to its recurring motifs in sequence,
  // legible in one look instead of piecing it together by scrolling the
  // chart. Non-motif stretches collapse to a single dash, not one chip per
  // passing chord — the point is to show what repeats, not to re-draw the
  // whole chart in miniature.
  (function renderRoadmap(){
    const road = document.getElementById('motifroadmap');
    let i = 0, lastWasGap = false;
    while (i < ann.length) {
      const a = ann[i];
      if (a && a.pos === 0) {
        const chip = document.createElement('span');
        chip.className = 'roadmap-chip';
        const col = motifColor(a.name);
        chip.style.background = col + '2a';
        chip.style.color = col;
        chip.textContent = a.name;
        chip.title = `${a.name} — ×${a.count}`;
        chip.addEventListener('mouseenter', () => {
          document.querySelectorAll('.motif-segment').forEach(seg => {
            seg.classList.toggle('motif-hi', seg.dataset.motifName === a.name);
          });
        });
        chip.addEventListener('mouseleave', () => {
          document.querySelectorAll('.motif-segment.motif-hi').forEach(seg => seg.classList.remove('motif-hi'));
        });
        road.appendChild(chip);
        i += a.len;
        lastWasGap = false;
      } else {
        if (!lastWasGap) {
          const gap = document.createElement('span');
          gap.className = 'roadmap-gap';
          road.appendChild(gap);
          lastWasGap = true;
        }
        i += 1;
      }
    }
  })();

  // Legend
  const leg = document.getElementById('motiflegend');
  const families = [];
  const byFamily = {};
  layer.legend.forEach(m => {
    const fam = motifFamily(m.name);
    if (!byFamily[fam]) { byFamily[fam] = []; families.push(fam); }
    byFamily[fam].push(m);
  });
  families.forEach(fam => {
    const group = document.createElement('div');
    group.className = 'motif-fam-group';
    const label = document.createElement('span');
    label.className = 'motif-fam-label';
    label.textContent = fam;
    group.appendChild(label);
    byFamily[fam].forEach(m => {
      const col = motifColor(m.name);
      const item = document.createElement('span');
      item.className = 'item';
      item.style.background = col + '18';
      item.style.borderColor = col + '44';
      item.style.color = col;
      item.innerHTML = `<span class="sw" style="background:${col}"></span>`
        + `${m.name} <span class="cnt">×${m.count} &minus;${m.saving}</span>`;
      item.addEventListener('mouseenter', () => {
        document.querySelectorAll('.motif-segment').forEach(seg => {
          seg.classList.toggle('motif-hi', seg.dataset.motifName === m.name);
        });
        document.querySelectorAll('.motif-svg-rect').forEach(r => {
          r.classList.toggle('motif-svg-hi', r.dataset.motifName === m.name);
        });
      });
      item.addEventListener('mouseleave', () => {
        document.querySelectorAll('.motif-segment.motif-hi').forEach(seg => seg.classList.remove('motif-hi'));
        document.querySelectorAll('.motif-svg-rect.motif-svg-hi').forEach(r => r.classList.remove('motif-svg-hi'));
      });
      group.appendChild(item);
    });
    leg.appendChild(group);
  });

  const saved = layer.legend.reduce((s, m) => s + m.saving, 0);
  document.getElementById('motifstats').innerHTML =
    `<b>${layer.nUnique}</b> motifs &nbsp;·&nbsp; <b>${layer.nUnits}</b> units &nbsp;·&nbsp; <b>${saved}</b> slots saved`;

  // Draw SVG outlines after the DOM is fully laid out
  requestAnimationFrame(drawMotifOutlines);
}

// ── SVG outline overlay ────────────────────────────────────────────────────
// Draws one rounded rect per visual row per motif run so a ii-V spanning two
// bars gets a single continuous outline, not two separate pills.
function drawMotifOutlines() {
  document.getElementById('motif-svg-overlay')?.remove();
  if (!motifModeActive) return;

  const grid = document.querySelector('.grid');
  if (!grid) return;

  const neon = document.body.dataset.motifStyle === 'full';

  const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
  svg.id = 'motif-svg-overlay';
  svg.style.cssText = 'position:absolute;top:0;left:0;width:100%;height:100%;' +
                      'pointer-events:none;z-index:6;overflow:visible';

  // Neon glow filter
  const defs = document.createElementNS('http://www.w3.org/2000/svg', 'defs');
  defs.innerHTML =
    '<filter id="mg" x="-30%" y="-30%" width="160%" height="160%">' +
    '<feGaussianBlur stdDeviation="4" result="b"/>' +
    '<feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>' +
    '</filter>';
  svg.appendChild(defs);
  grid.appendChild(svg);

  const gridRect = grid.getBoundingClientRect();

  // Group segments by run id
  const byRun = {};
  document.querySelectorAll('.motif-segment').forEach(seg => {
    const rid = seg.dataset.motifRunId;
    if (!byRun[rid]) byRun[rid] = {
      segs: [], color: seg.style.getPropertyValue('--chip-color').trim(),
      name: seg.dataset.motifName
    };
    byRun[rid].segs.push(seg);
  });

  Object.values(byRun).forEach(({segs, color, name}) => {
    // Measure each segment relative to the grid container
    const measured = segs.map(seg => {
      const r = seg.getBoundingClientRect();
      return {
        x1: r.left  - gridRect.left,
        y1: r.top   - gridRect.top,
        x2: r.right - gridRect.left,
        y2: r.bottom - gridRect.top,
        cy: (r.top + r.bottom) / 2 - gridRect.top,
      };
    }).sort((a, b) => a.y1 !== b.y1 ? a.y1 - b.y1 : a.x1 - b.x1);

    // Cluster into visual rows (segments whose centres are within 30px)
    const rows = [];
    measured.forEach(m => {
      const row = rows.find(rw => Math.abs(rw.refY - m.cy) < 30);
      if (row) row.ms.push(m);
      else rows.push({refY: m.cy, ms: [m]});
    });

    const pad = 5;
    rows.forEach(({ms}) => {
      const x1 = Math.min(...ms.map(s => s.x1)) - pad;
      const y1 = Math.min(...ms.map(s => s.y1)) - pad;
      const x2 = Math.max(...ms.map(s => s.x2)) + pad;
      const y2 = Math.max(...ms.map(s => s.y2)) + pad;

      const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
      rect.setAttribute('x', x1);
      rect.setAttribute('y', y1);
      rect.setAttribute('width',  Math.max(0, x2 - x1));
      rect.setAttribute('height', Math.max(0, y2 - y1));
      rect.setAttribute('rx', 10);
      rect.setAttribute('ry', 10);
      rect.setAttribute('fill',         color + '14');
      rect.setAttribute('stroke',       color);
      rect.setAttribute('stroke-width', neon ? '1.5' : '1');
      if (neon) rect.setAttribute('filter', 'url(#mg)');
      rect.className.baseVal = 'motif-svg-rect';
      rect.dataset.motifRunId = segs[0].dataset.motifRunId;
      rect.dataset.motifName  = name;
      svg.appendChild(rect);
    });
  });
}

const reinforcedConf = new Map();

// ── build rotary transpose dial — drag/swipe to spin like an old phone dial,
//    or tap a key directly; snaps to the nearest of 12 chromatic stops ──
(function(){
  const wheel=document.getElementById("transposeWheel");
  const field=document.getElementById("transpose");
  const ring=document.createElement("div");
  ring.className="wheel-ring"; ring.id="wheelRing";
  wheel.appendChild(ring);
  const pointer=document.createElement("div");
  pointer.className="wheel-pointer";
  wheel.appendChild(pointer);

  const btns=[];
  for(let off=0;off<12;off++){
    const ang=(-90+off*30)*Math.PI/180;  // chromatic: C at top, then C#, D, ...
    const b=document.createElement("button");
    b.type="button"; b.value=off; b.dataset.ang=ang;
    const lbl=document.createElement("span");
    lbl.className="lbl";
    lbl.textContent=keyLabel(P.home.tonic,P.home.mode,off).replace(/ major| minor/,"");
    b.appendChild(lbl);
    b.title=keyLabel(P.home.tonic,P.home.mode,off)+(off===0?" (original)":"");
    b.style.background=colOf({tonic:mod(P.home.tonic+off,12),kind:P.home.mode});
    ring.appendChild(b);
    btns.push(b);
  }
  const hub=document.createElement("span");
  hub.className="hub"; hub.id="wheelHub"; hub.textContent="";
  wheel.appendChild(hub);

  function positionButtons(){
    const size=wheel.getBoundingClientRect().width||250;
    const radius=size*0.40;   // wide enough that 12×44px buttons don't overlap
    btns.forEach(b=>{
      const ang=parseFloat(b.dataset.ang);
      b.style.transform=`translate(${Math.cos(ang)*radius}px, ${Math.sin(ang)*radius}px)`;
    });
  }
  positionButtons();
  window.addEventListener("resize",positionButtons);

  let rot=0, dragging=false, startAngle=0, startRot=0, moved=0, lastNotch=0;

  // ── detent feel: each 30° step gets a little "give" (sticky near the
  // centre of a stop, springs through past the boundary) plus a click ──
  let actx=null;
  function ensureAudio(){
    if(!actx){
      const AC=window.AudioContext||window.webkitAudioContext;
      if(!AC) return;
      actx=new AC();
    }
    if(actx.state==="suspended") actx.resume();
  }
  function playTick(){
    if(!actx) return;
    const t=actx.currentTime;
    const osc=actx.createOscillator(), gain=actx.createGain();
    osc.type="square";
    osc.frequency.setValueAtTime(1500,t);
    osc.frequency.exponentialRampToValueAtTime(650,t+0.018);
    gain.gain.setValueAtTime(0.05,t);
    gain.gain.exponentialRampToValueAtTime(0.0001,t+0.03);
    osc.connect(gain).connect(actx.destination);
    osc.start(t); osc.stop(t+0.04);
  }
  function pulsePointer(){
    pointer.classList.remove("tick");
    void pointer.offsetWidth;  // restart the CSS animation
    pointer.classList.add("tick");
  }
  function feedback(){
    // sound + visual pulse everywhere; vibration is a no-op on iOS Safari
    // (no Vibration API there) but fires on Android PWAs/Chrome.
    playTick(); pulsePointer();
    if(navigator.vibrate) navigator.vibrate(6);
  }
  function detent(raw){
    const notch=Math.round(raw/30)*30;
    const diff=raw-notch;                 // -15..15, distance from the stop
    const t=Math.max(-1,Math.min(1,diff/15));
    const shaped=Math.sign(t)*Math.pow(Math.abs(t),1.7)*15;  // resist near centre, give at edge
    return notch+shaped;
  }

  function setLabelsRotation(deg){
    btns.forEach(b=>{ b.querySelector(".lbl").style.transform=`rotate(${-deg}deg)`; });
  }
  function applyRot(deg,animate){
    ring.classList.toggle("snap",!!animate);
    const shown=animate?deg:detent(deg);
    ring.style.transform=`rotate(${shown}deg)`;
    setLabelsRotation(shown);
  }
  function offsetFromRot(deg){
    return ((Math.round(-deg/30)%12)+12)%12;
  }
  applyRot(0,false);

  function angleAt(clientX,clientY){
    const r=wheel.getBoundingClientRect();
    return Math.atan2(clientY-(r.top+r.height/2),clientX-(r.left+r.width/2))*180/Math.PI;
  }
  wheel.addEventListener("pointerdown",e=>{
    ensureAudio();
    dragging=true; moved=0;
    wheel.setPointerCapture(e.pointerId);
    startAngle=angleAt(e.clientX,e.clientY);
    startRot=rot;
    lastNotch=Math.round(rot/30);
    ring.classList.remove("snap");
  });
  wheel.addEventListener("pointermove",e=>{
    if(!dragging) return;
    let delta=angleAt(e.clientX,e.clientY)-startAngle;
    while(delta>180) delta-=360;
    while(delta<-180) delta+=360;
    moved=Math.max(moved,Math.abs(delta));
    rot=startRot+delta;
    applyRot(rot,false);
    const notch=Math.round(rot/30);
    if(notch!==lastNotch){ lastNotch=notch; feedback(); }
  });
  function endDrag(e){
    if(!dragging) return;
    dragging=false;
    const tapped = moved<8 ? e.target.closest("button") : null;
    let off;
    if(tapped){
      off=parseInt(tapped.value);
      let target=-off*30;
      while(target-rot>180) target-=360;
      while(target-rot<-180) target+=360;
      rot=target;
    } else {
      off=offsetFromRot(rot);
      rot=Math.round(rot/30)*30;
    }
    applyRot(rot,true);
    feedback();
    field.value=off;
    render();
  }
  wheel.addEventListener("pointerup",endDrag);
  wheel.addEventListener("pointercancel",endDrag);
})();
function updateTransposeWheel(offset){
  document.querySelectorAll("#transposeWheel button").forEach(b=>{
    b.setAttribute("aria-pressed",parseInt(b.value)===offset?"true":"false");
  });
  const label=keyLabel(P.home.tonic,P.home.mode,offset);
  document.getElementById("transposeLabel").textContent=label;
  const hub=document.getElementById("wheelHub");
  if(hub) hub.textContent=label.replace(/ major| minor/,"");
  const pill=document.getElementById("keyPillLabel");
  if(pill) pill.textContent=label;
}
function render(){
  const mode=document.getElementById("level").value;
  const scale=document.getElementById("scale").value;
  const th=parseFloat(document.getElementById("thresh").value);
  const offset=parseInt(document.getElementById("transpose").value);
  const hl=document.getElementById("hl").checked;
  const view=document.getElementById("scaleview").value;
  const jazz=parseInt(document.getElementById("jazz").value);
  const flats=preferFlats(offset);
  updateTransposeWheel(offset);
  document.getElementById("thv").textContent=th.toFixed(2);
  document.getElementById("jv").textContent=jazz;
  document.getElementById("gate").style.opacity=mode==="auto"?1:0.35;
  document.getElementById("sv").style.opacity=hl?1:0.35;

  // displayed token per chord (root + quality tail at the shown level)
  // reinforcedConf overrides confidence for motif-consensus-boosted chords.
  const base=P.chords.map((d,i)=>{
    const boosted = reinforcedConf.has(i) ? reinforcedConf.get(i) : null;
    const d2 = boosted ? {
      ...d,
      lv: { family:{q:d.lv.family.q,c:boosted},
            seventh:{q:d.lv.seventh.q,c:boosted},
            exact:{q:d.lv.exact.q,c:boosted} }
    } : d;
    const lv=pickLevel(d2,mode,th);
    return {root:d2.root,bass:d2.bass,bar:d2.bar,beat:d2.beat,q:d2.lv[lv].q,c:d2.lv[lv].c,jazz:false};
  });
  const baseK=continuity(base);
  const jz=jazzify(base,baseK,jazz,flats);
  const toks=jz.chords.map(d=>({root:d.root,q:d.q}));
  const k1=continuity(toks), kn=fitting(toks,k1);
  renderGrid(jz.chords,flats,jazz);

  jz.chords.forEach((d,i)=>{
    const el=document.getElementById("chord-"+i);
    if(!el) return;
    el.innerHTML=chordHTML(d,d.q,offset,flats);
    el.style.color=jazz?colour("gray",Math.max(0.45,d.c)):colour(scale,d.c);
  });

  // scale highlight as measure bands. "natural" (view=one): the continuity scale,
  // so same-scale chords merge into one region. "all fitting" (view=all): each
  // chord split into vertical stripes for every scale it belongs to.
  let carry=null, prevScaleId=null;
  document.querySelectorAll(".measure").forEach(m=>{
    // remove old scale label
    m.querySelectorAll(".scalelabel").forEach(el=>el.remove());
    if(!hl){m.style.background="";return;}
    const spans=[...m.querySelectorAll(".chord")];
    if(spans.length===0){m.style.background=carry?bandCss(carry,offset):"";return;}
    const g=measureCss(spans,k1,kn,view,offset); m.style.background=g.css; carry=g.last;
    // inject scale label on first bar of each new scale region (continuity view only)
    if(view==="one" && spans.length>0){
      const firstIdx=+spans[0].id.split("-")[1];
      const sc=k1[firstIdx];
      const sid=scaleId(sc);
      if(sid!==prevScaleId){
        prevScaleId=sid;
        const lbl=document.createElement("span");
        lbl.className="scalelabel";
        lbl.textContent=keyLabel(sc.tonic,sc.kind,offset);
        m.appendChild(lbl);
      }
    }
  });
  if(!hl) prevScaleId=null;

  // legend: distinct scales present in the current view (at this transposition)
  const leg=document.getElementById("keylegend");
  if(hl){
    const seen=[];
    jz.chords.forEach((d,i)=>(view==="all"?kn[i]:[k1[i]]).forEach(s=>{
      if(!seen.some(x=>scaleId(x)===scaleId(s))) seen.push(s);}));
    leg.innerHTML=seen.map(s=>
      `<span class="item"><span class="sw" style="background:${colOf(s,offset)}"></span>`+
      `${keyLabel(s.tonic,s.kind,offset)}</span>`).join("");
    leg.style.display="flex";
  } else leg.style.display="none";

  const g=[];for(let k=0;k<=10;k++)g.push(colour(scale,0.35+0.6*k/10));
  document.getElementById("legbar").style.background=`linear-gradient(90deg, ${g.join(",")})`;
  const tnote=offset?` · transposed to ${keyLabel(P.home.tonic,P.home.mode,offset)}`:"";
  const log=document.getElementById("jazzlog");
  log.style.display=jazz&&jz.log.length?"block":"none";
  log.innerHTML=jz.log.slice(0,12).map(x=>`<div>${x}</div>`).join("")+
    (jz.log.length>12?`<div>… ${jz.log.length-12} more</div>`:"");
  const nOverrides = barOverrides.size;
  document.getElementById("caption").textContent=(mode==="auto"
    ? `Auto: shows 7th / exact only where certainty ≥ ${th.toFixed(2)}; colour = certainty at the shown depth.`
    : `Fixed level: ${mode}. Colour = certainty about that ${mode} label.`)
    + (jazz?`  Jazzify ${jazz} (seed ${globalSeed}): suggested reharmonization, not inferred audio.`:"")
    + (nOverrides?`  ${nOverrides} bar${nOverrides>1?"s":""} at custom level.`:"")
    + (jazz?"  Click a bar to change its level.":"")
    + (document.getElementById("fuse").checked?"  Fused repeated bars are shown as one wider measure.":"")
    + (hl?(view==="all"
        ? "  Stripes = every scale each chord fits (jazz view)."
        : "  Bands = the natural scale, held until a chord's note forces a change."):"")
    + tnote;
}
["level","scale","thresh","transpose","hl","scaleview","jazz","fuse"].forEach(id=>{

document.querySelector(".grid").addEventListener("click",(e)=>{
  // Skip if in motif mode - motif mode handles its own clicks
  if(motifModeActive) return;
  const jazz=parseInt(document.getElementById("jazz").value);
  if(jazz === 0) return;  // no per-bar control when jazzify is off
  const m = e.target.closest(".measure");
  if(!m) return;
  const bar = parseInt(m.dataset.bar);
  const current = barOverrides.has(bar) ? barOverrides.get(bar) : jazz;
  // Cycle: current+1, wrap to 0, if back to global then remove override
  const next = (current + 1) % 6;
  if(next === jazz) {
    barOverrides.delete(bar);
  } else {
    barOverrides.set(bar, next);
  }
  render();
});

// ════════════════════════════════════════════════════════════════════════════
// MOTIF MODE — interactive motif marking, naming, and stacking
// ════════════════════════════════════════════════════════════════════════════

const MOTIF_COLORS = [
  "#e07848", "#5898c8", "#68a868", "#c878a8", "#a8a858",
  "#8878b8", "#c89858", "#58a8a8", "#b86868", "#7898a8"
];

// Shape detection: port of motif.py _shape_key + _SHAPE_NAMES
const SHAPE_NAMES = {
  'min7,5:dom7': 'ii-V',
  'min7,5:dom7,5:maj7': 'ii-V-I',
  'min7,5:dom7,5:6': 'ii-V-I',
  'min7,5:dom7,5:min7,5:dom7': 'ii-V ii-V',
  'maj7,9:dom7': 'I-VI',
  '6,9:dom7': 'I-VI',
  'dom7,5:dom7': 'V/V-V',
  'dom7,5:dom7,5:dom7': 'dom-cycle',
};

function qualBucket(q) {
  // Map iReal quality to bucket for shape matching
  if (!q) return 'maj';
  if (q.startsWith('-7b5') || q.startsWith('h')) return 'hdim7';
  if (q.startsWith('-') || q.startsWith('m')) return q.includes('7') || q.includes('9') || q.includes('11') ? 'min7' : 'min';
  if (q.startsWith('o') || q.startsWith('dim')) return q.includes('7') ? 'dim7' : 'dim';
  if (q.startsWith('^') || q.includes('maj7') || q.includes('M7')) return 'maj7';
  if (q.includes('7') || q.includes('9') || q.includes('13') || q.includes('alt')) return 'dom7';
  if (q.includes('6')) return '6';
  if (q.startsWith('sus')) return 'sus';
  if (q.startsWith('+') || q.includes('aug')) return 'aug';
  return 'maj';
}

function shapeKey(chords) {
  // Transposition-invariant identity: first quality, then (interval, quality) pairs
  if (chords.length === 0) return '';
  const parts = [qualBucket(chords[0].q)];
  for (let i = 1; i < chords.length; i++) {
    const iv = mod(chords[i].root - chords[i-1].root, 12);
    parts.push(`${iv}:${qualBucket(chords[i].q)}`);
  }
  return parts.join(',');
}

function shapeName(key, chords) {
  if (SHAPE_NAMES[key]) return SHAPE_NAMES[key];
  // Generate a descriptive fallback
  const parts = key.split(',');
  if (parts.length === 2 && parts[1].startsWith('5:')) return 'V-I motion';
  if (parts.length === 2 && parts[1].startsWith('7:')) return 'step up';
  if (parts.every(p => p.includes('dom7'))) return 'dom chain';
  return null;
}

function motifExactKey(chords, offset, flats) {
  // Literal chord labels as key
  return chords.map(c => noteName(c.root + offset, flats) + (c.q || '')).join(' | ');
}

// Motif state: persists across re-renders within the page session
const motifState = {
  motifs: [],        // {id, name, color, bars: [[s,e],...], shape: string|null, exact: string|null}
  nextId: 1,
  selecting: false,
  selStart: null,
  selEnd: null,
};

function getMotifColor() {
  const used = new Set(motifState.motifs.map(m => m.color));
  for (const c of MOTIF_COLORS) {
    if (!used.has(c)) return c;
  }
  return MOTIF_COLORS[motifState.nextId % MOTIF_COLORS.length];
}

function barRange(a, b) {
  return [Math.min(a, b), Math.max(a, b)];
}

function rangesOverlap(r1, r2) {
  return r1[0] <= r2[1] && r2[0] <= r1[1];
}

function chordsInBars(startBar, endBar) {
  // Get the current displayed chords for the bar range
  const mode = document.getElementById("level").value;
  const th = parseFloat(document.getElementById("thresh").value);
  const jazz = parseInt(document.getElementById("jazz").value);
  const offset = parseInt(document.getElementById("transpose").value);
  const flats = preferFlats(offset);

  const base = P.chords.map(d => {
    const lv = pickLevel(d, mode, th);
    return {root: d.root, bass: d.bass, bar: d.bar, beat: d.beat, q: d.lv[lv].q, c: d.lv[lv].c};
  });
  const baseK = continuity(base);
  const jz = jazzify(base, baseK, jazz, flats);

  return jz.chords.filter(c => c.bar >= startBar && c.bar <= endBar);
}

function displayChords(chords, offset, flats) {
  return chords.map(c => {
    const name = noteName(c.root + offset, flats);
    const [base, sup] = typesetQuality(c.q || '');
    return name + base + (sup ? sup.replace(/[<>]/g, '') : '');
  }).join(' | ');
}

// ── Selection UI ──

function initMotifMode() {
  const grid = document.querySelector('.grid');
  // motif-mode class is now toggled by renderAutoMotifs() via the button
  // but manual selection still reads motifModeActive

  // Mouse events for drag selection
  grid.addEventListener('mousedown', onGridMouseDown);
  grid.addEventListener('mousemove', onGridMouseMove);
  document.addEventListener('mouseup', onGridMouseUp);

  // Close popovers on outside click
  document.addEventListener('click', (e) => {
    if (!e.target.closest('.motif-popover, .motif-edit-popover, .motif-bracket')) {
      closeAllPopovers();
    }
  });
}

function getMeasureBar(el) {
  const m = el.closest('.measure');
  return m ? parseInt(m.dataset.bar) : null;
}

function onGridMouseDown(e) {
  if (!motifModeActive) return;
  const bar = getMeasureBar(e.target);
  if (bar === null) return;
  e.preventDefault();
  closeAllPopovers();
  motifState.selecting = true;
  motifState.selStart = bar;
  motifState.selEnd = bar;
  updateSelectionUI();
}

function onGridMouseMove(e) {
  if (!motifState.selecting) return;
  const bar = getMeasureBar(e.target);
  if (bar !== null) {
    motifState.selEnd = bar;
    updateSelectionUI();
  }
}

function onGridMouseUp(e) {
  if (!motifState.selecting) return;
  motifState.selecting = false;
  const [s, end] = barRange(motifState.selStart, motifState.selEnd);
  if (s !== null && end !== null) {
    showMotifPopover(s, end, e);
  }
}

function clearSelection() {
  motifState.selecting = false;
  motifState.selStart = null;
  motifState.selEnd = null;
  document.querySelectorAll('.measure.motif-sel, .measure.motif-sel-start, .measure.motif-sel-end').forEach(m => {
    m.classList.remove('motif-sel', 'motif-sel-start', 'motif-sel-end');
  });
}

function updateSelectionUI() {
  document.querySelectorAll('.measure').forEach(m => {
    m.classList.remove('motif-sel', 'motif-sel-start', 'motif-sel-end', 'motif-match');
  });
  if (motifState.selStart === null) return;
  const [s, e] = barRange(motifState.selStart, motifState.selEnd);
  document.querySelectorAll('.measure').forEach(m => {
    const bar = parseInt(m.dataset.bar);
    if (bar >= s && bar <= e) {
      m.classList.add('motif-sel');
      if (bar === s) m.classList.add('motif-sel-start');
      if (bar === e) m.classList.add('motif-sel-end');
    }
  });
}

// ── Popover for naming a new motif ──

function closeAllPopovers() {
  document.querySelectorAll('.motif-popover, .motif-edit-popover, .motif-preview').forEach(el => el.remove());
}

function showMotifPopover(startBar, endBar, event) {
  closeAllPopovers();
  const offset = parseInt(document.getElementById("transpose").value);
  const flats = preferFlats(offset);
  const chords = chordsInBars(startBar, endBar);

  if (chords.length === 0) {
    clearSelection();
    return;
  }

  const shape = shapeKey(chords);
  const exact = motifExactKey(chords, offset, flats);
  const suggested = shapeName(shape, chords);

  const pop = document.createElement('div');
  pop.className = 'motif-popover';
  pop.innerHTML = `
    <h4>Name this motif</h4>
    <div class="chords">${displayChords(chords, offset, flats)}</div>
    <div class="suggest"></div>
    <input type="text" id="motif-name-input" placeholder="Custom name..." value="${suggested || ''}">
    <div class="colors"></div>
    <div class="mode-toggle">
      <label><input type="radio" name="motif-match" value="shape" checked> Shape (any key)</label>
      <label><input type="radio" name="motif-match" value="exact"> Exact chords</label>
    </div>
    <button class="find-btn" id="find-similar">Find similar</button>
    <div class="find-result" id="find-result"></div>
    <div class="actions">
      <button class="cancel" id="motif-cancel">Cancel</button>
      <button class="save" id="motif-save">Save motif</button>
    </div>
  `;

  // Position near cursor
  pop.style.left = Math.min(event.clientX + 10, window.innerWidth - 280) + 'px';
  pop.style.top = Math.min(event.clientY + 10, window.innerHeight - 360) + 'px';
  document.body.appendChild(pop);

  // Suggestions
  const suggestEl = pop.querySelector('.suggest');
  const suggestions = [suggested, 'turnaround', 'bridge', 'tag', 'coda'].filter(Boolean);
  const uniqueSugg = [...new Set(suggestions)];
  uniqueSugg.forEach(s => {
    const btn = document.createElement('button');
    btn.textContent = s;
    btn.onclick = () => {
      pop.querySelector('#motif-name-input').value = s;
      suggestEl.querySelectorAll('button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    };
    suggestEl.appendChild(btn);
  });

  // Colors
  const colorsEl = pop.querySelector('.colors');
  const defaultColor = getMotifColor();
  let selectedColor = defaultColor;
  MOTIF_COLORS.forEach((c, i) => {
    const btn = document.createElement('button');
    btn.style.background = c;
    if (c === defaultColor) btn.classList.add('active');
    btn.onclick = () => {
      colorsEl.querySelectorAll('button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      selectedColor = c;
    };
    colorsEl.appendChild(btn);
  });

  // Find similar
  pop.querySelector('#find-similar').onclick = () => {
    const matchMode = pop.querySelector('input[name="motif-match"]:checked').value;
    const matches = findSimilar(startBar, endBar, matchMode, chords, shape, exact);
    highlightMatches(matches);
    const resultEl = pop.querySelector('#find-result');
    if (matches.length > 1) {
      resultEl.innerHTML = `Found ${matches.length} occurrences. <button class="find-btn group-all" id="group-all">Group all ${matches.length}</button>`;
      resultEl.querySelector('#group-all').onclick = () => {
        const name = pop.querySelector('#motif-name-input').value || (matchMode === 'shape' ? suggested : 'pattern') || 'motif';
        saveMotif(name, selectedColor, matches, matchMode === 'shape' ? shape : null, matchMode === 'exact' ? exact : null);
        closeAllPopovers();
        clearSelection();
        renderMotifBrackets();
      };
    } else {
      resultEl.textContent = 'No other occurrences found.';
    }
  };

  // Cancel / Save
  pop.querySelector('#motif-cancel').onclick = () => {
    closeAllPopovers();
    clearSelection();
    document.querySelectorAll('.measure.motif-match').forEach(m => m.classList.remove('motif-match'));
  };

  pop.querySelector('#motif-save').onclick = () => {
    const name = pop.querySelector('#motif-name-input').value || 'motif';
    const matchMode = pop.querySelector('input[name="motif-match"]:checked').value;
    saveMotif(name, selectedColor, [[startBar, endBar]], matchMode === 'shape' ? shape : null, matchMode === 'exact' ? exact : null);
    closeAllPopovers();
    clearSelection();
    document.querySelectorAll('.measure.motif-match').forEach(m => m.classList.remove('motif-match'));
    renderMotifBrackets();
  };

  // Prevent closing on click inside
  pop.onclick = e => e.stopPropagation();
}

function findSimilar(startBar, endBar, mode, chords, shape, exact) {
  const matches = [[startBar, endBar]];
  const len = endBar - startBar + 1;
  const offset = parseInt(document.getElementById("transpose").value);
  const flats = preferFlats(offset);

  for (let b = 0; b <= P.nBars - len; b++) {
    if (b === startBar) continue;
    const c = chordsInBars(b, b + len - 1);
    if (c.length !== chords.length) continue;

    if (mode === 'shape') {
      if (shapeKey(c) === shape) matches.push([b, b + len - 1]);
    } else {
      if (motifExactKey(c, offset, flats) === exact) matches.push([b, b + len - 1]);
    }
  }
  return matches;
}

function highlightMatches(matches) {
  document.querySelectorAll('.measure.motif-match').forEach(m => m.classList.remove('motif-match'));
  matches.forEach(([s, e]) => {
    document.querySelectorAll('.measure').forEach(m => {
      const bar = parseInt(m.dataset.bar);
      if (bar >= s && bar <= e) m.classList.add('motif-match');
    });
  });
}

function saveMotif(name, color, bars, shape, exact) {
  // Check for overlaps with existing motifs and remove overlapping ranges
  bars = bars.filter(r => {
    for (const m of motifState.motifs) {
      for (const mr of m.bars) {
        if (rangesOverlap(r, mr)) return false;
      }
    }
    return true;
  });
  if (bars.length === 0) return;

  motifState.motifs.push({
    id: motifState.nextId++,
    name,
    color,
    bars,
    shape,
    exact
  });
}

// ── Render motif brackets ──

function renderMotifBrackets() {
  // Clear existing brackets and padding classes
  document.querySelectorAll('.motif-brackets').forEach(el => el.remove());
  document.querySelectorAll('.measure.has-motif, .measure.has-motif-stack').forEach(m => {
    m.classList.remove('has-motif', 'has-motif-stack');
  });

  if (motifState.motifs.length === 0) return;

  // For each measure, collect motifs that cover it
  const measureMotifs = {};
  for (let b = 0; b < P.nBars; b++) {
    measureMotifs[b] = [];
    for (const m of motifState.motifs) {
      for (const [s, e] of m.bars) {
        if (b >= s && b <= e) {
          measureMotifs[b].push({motif: m, start: s, end: e, isStart: b === s, isEnd: b === e});
        }
      }
    }
  }

  // Render brackets on each measure
  document.querySelectorAll('.measure').forEach(mEl => {
    const bar = parseInt(mEl.dataset.bar);
    const covering = measureMotifs[bar] || [];
    if (covering.length === 0) return;

    // Add padding class based on number of stacked motifs
    mEl.classList.add(covering.length > 1 ? 'has-motif-stack' : 'has-motif');

    // Make measure position relative for absolute bracket positioning
    if (getComputedStyle(mEl).position === 'static') {
      mEl.style.position = 'relative';
    }

    const container = document.createElement('div');
    container.className = 'motif-brackets';

    // Sort by motif length (longer = higher) for nesting
    covering.sort((a, b) => (b.end - b.start) - (a.end - a.start));

    covering.forEach(({motif, start, end, isStart, isEnd}) => {
      const bracket = document.createElement('div');
      bracket.className = 'motif-bracket';
      bracket.dataset.motifId = motif.id;
      bracket.dataset.start = start;
      bracket.dataset.end = end;

      const barDiv = document.createElement('div');
      barDiv.className = 'bar';
      barDiv.style.background = motif.color;
      barDiv.style.borderRadius = `${isStart ? 4 : 0}px ${isEnd ? 4 : 0}px ${isEnd ? 4 : 0}px ${isStart ? 4 : 0}px`;
      bracket.appendChild(barDiv);

      // Label only on start measure
      if (isStart) {
        const label = document.createElement('span');
        label.className = 'label';
        label.textContent = motif.name;
        label.style.color = motif.color;
        bracket.appendChild(label);
      }

      bracket.onclick = (e) => {
        e.stopPropagation();
        showMotifEditPopover(motif, start, end, e);
      };

      container.appendChild(bracket);
    });

    mEl.insertBefore(container, mEl.firstChild);
  });
}

// ── Edit popover (click on bracket) ──

function showMotifEditPopover(motif, rangeStart, rangeEnd, event) {
  closeAllPopovers();

  const pop = document.createElement('div');
  pop.className = 'motif-edit-popover';
  pop.innerHTML = `
    <div class="name" style="color:${motif.color}">${motif.name}</div>
    <div class="occ">${motif.bars.length} occurrence${motif.bars.length > 1 ? 's' : ''}</div>
    <button class="rename">Rename</button>
    <button class="ungroup">Ungroup this</button>
    <button class="delete">Delete all</button>
  `;

  pop.style.left = Math.min(event.clientX + 10, window.innerWidth - 200) + 'px';
  pop.style.top = Math.min(event.clientY - 80, window.innerHeight - 150) + 'px';
  document.body.appendChild(pop);

  pop.querySelector('.rename').onclick = () => {
    const newName = prompt('Rename motif:', motif.name);
    if (newName && newName.trim()) {
      motif.name = newName.trim();
      closeAllPopovers();
      renderMotifBrackets();
    }
  };

  pop.querySelector('.ungroup').onclick = () => {
    // Remove just this range from the motif
    motif.bars = motif.bars.filter(([s, e]) => !(s === rangeStart && e === rangeEnd));
    if (motif.bars.length === 0) {
      motifState.motifs = motifState.motifs.filter(m => m.id !== motif.id);
    }
    closeAllPopovers();
    renderMotifBrackets();
  };

  pop.querySelector('.delete').onclick = () => {
    motifState.motifs = motifState.motifs.filter(m => m.id !== motif.id);
    closeAllPopovers();
    renderMotifBrackets();
  };

  pop.onclick = e => e.stopPropagation();
}

// Re-render brackets + auto motifs after main render (grid changes)
const originalRender = render;
window.render = function() {
  originalRender();
  renderMotifBrackets();
  renderAutoMotifs();
};

// Motif style: "full" (Neon Lights, whole page goes dark) or "overlay"
// ("Lab" — just the grid gets a dark treatment, the warm paper page stays).
// Default is "overlay": switching the *entire* page to a black theme the
// instant you tap Motifs was a jarring way to answer "show me the patterns"
// — Neon Lights is still one tap away for whoever wants the dramatic look.
document.body.dataset.motifStyle = 'overlay';
const MOTIF_STYLE_LABELS = {full: '🌃 Neon Lights', overlay: '🔬 Lab'};
const motifStyleBtn = document.getElementById('motif-style-btn');
function updateStyleBtn(style) {
  const next = style === 'full' ? 'overlay' : 'full';
  motifStyleBtn.textContent = MOTIF_STYLE_LABELS[style];
  motifStyleBtn.title = 'Switch to ' + (next === 'full' ? 'Neon Lights' : 'Lab') + ' style';
}
updateStyleBtn('overlay');
motifStyleBtn.addEventListener('click', () => {
  const cur = document.body.dataset.motifStyle;
  const next = cur === 'full' ? 'overlay' : 'full';
  document.body.dataset.motifStyle = next;
  updateStyleBtn(next);
  if (motifModeActive) renderAutoMotifs();
});

// Motif analyser button toggle
document.getElementById('motifmode-btn').addEventListener('click', () => {
  motifModeActive = !motifModeActive;
  renderAutoMotifs();
});

// Mode pill buttons (Quality / Root only)
document.querySelectorAll('#motif-mode-group button').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('#motif-mode-group button').forEach(b => b.classList.remove('sel'));
    btn.classList.add('sel');
    _rebuildCatButtons();
    renderAutoMotifs();
  });
});

// Category pill buttons — rebuilt whenever mode changes
function _rebuildCatButtons() {
  const mode = document.querySelector('#motif-mode-group .sel')?.dataset.mode || 'shape';
  const cats = (P.motifs && P.motifs['cats_' + mode]) || ['All'];
  const group = document.getElementById('motif-cat-group');
  group.innerHTML = '';
  cats.forEach((cat, i) => {
    const b = document.createElement('button');
    b.type = 'button';
    b.dataset.cat = cat;
    b.textContent = cat;
    if (i === 0) b.classList.add('sel');
    b.addEventListener('click', () => {
      document.querySelectorAll('#motif-cat-group button').forEach(x => x.classList.remove('sel'));
      b.classList.add('sel');
      renderAutoMotifs();
    });
    group.appendChild(b);
  });
}
_rebuildCatButtons();

// Initialize motif mode
initMotifMode();

// ── Section chips: A/B/C navigator built from P.sectionChips ──────────────
(function(){
  const chips = P.sectionChips;
  if (!chips || !chips.length) return;
  const container = document.getElementById('section-chips');
  if (!container) return;
  container.classList.add('visible');
  chips.forEach(chip => {
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'sec-chip';
    btn.textContent = chip.label;
    btn.title = 'Section ' + chip.label + ' (' + Math.round(chip.start_s) + 's)';
    btn.addEventListener('click', () => {
      // Find the first chord at or after this section's start time, then
      // scroll to its measure.
      const c = P.chords.find(d => (d.t0 != null ? d.t0 : 0) >= chip.start_s - 0.5);
      if (!c) return;
      const el = document.querySelector('.measure[data-bar="' + c.bar + '"]');
      if (el) el.scrollIntoView({behavior: 'smooth', block: 'start'});
    });
    container.appendChild(btn);
  });
})();

render();
</script>
