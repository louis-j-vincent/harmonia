<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8">

<title>Bye Bye Blackbird — chord chart</title>
<style>
  :root { --paper:#f7f3e9; --ink:#1c1c1c; --rule:#b9b09a; --faint:#8a8371; --accent:#8a2b2b; }
  * { box-sizing:border-box; }
  body { background:var(--paper); color:var(--ink); margin:0;
         font-family:Georgia,'Times New Roman',serif; }
  .sheet { max-width:960px; margin:0 auto; padding:28px 32px 48px; }
  h1 { text-align:center; font-size:30px; margin:0 0 4px; letter-spacing:.3px; }
  .subhead { display:flex; justify-content:space-between; color:var(--faint);
             font-style:italic; font-size:14px; margin-bottom:18px; }
  .controls { display:flex; gap:20px; flex-wrap:wrap; align-items:center;
              background:#efe9d9; border:1px solid #e2dac4; border-radius:10px;
              padding:12px 16px; margin-bottom:22px; font-family:system-ui,sans-serif;
              font-size:13px; color:#4a4636; }
  .controls label { display:flex; align-items:center; gap:7px; }
  select, input[type=range] { font:inherit; }
  select { padding:3px 6px; border-radius:6px; border:1px solid #cfc7ae; background:#fff; }
  .legend { display:flex; align-items:center; gap:8px; margin-left:auto; }
  .legend .bar { width:120px; height:12px; border-radius:6px; }
  .grid { display:grid; grid-template-columns:repeat(4,1fr);
          border-right:1px solid var(--rule); }
  .measure { position:relative; min-height:74px; border-left:1px solid var(--rule);
             display:flex; align-items:center; justify-content:center; padding:6px 4px; }
  .measure.section-start { border-left:4px double var(--rule); }
  .measure.final { border-right:3px solid var(--accent); }
  .seclabel { position:absolute; top:4px; left:5px; width:20px; height:20px;
              border:1.4px solid var(--accent); border-radius:4px; color:var(--accent);
              font-family:system-ui,sans-serif; font-weight:700; font-size:12px;
              display:flex; align-items:center; justify-content:center; }
  .chords { display:flex; gap:18px; align-items:baseline; justify-content:center;
            width:100%; flex-wrap:wrap; }
  .chord { white-space:nowrap; transition:color .15s; }
  .chord .root { font-size:27px; font-style:italic; }
  .chord .qual { font-size:17px; font-style:italic; }
  .chord sup { font-size:.62em; }
  .chord .acc { font-size:.6em; margin-left:-.1em; vertical-align:.12em; }
  .caption { color:var(--faint); font-size:12px; font-style:italic; margin-top:22px; }
</style></head>

>", "c": 0.999}}, {"family": {"h": "<span class=\"root\">C</span>", "c": 0.9986}, "seventh": {"h": "<span class=\"root\">C</span><span class=\"qual\"><sup>7</sup></span>", "c": 0.9978}, "exact": {"h": "<span class=\"root\">C</span><span class=\"qual\"><sup>7</sup></span>", "c": 0.9422}}, {"family": {"h": "<span class=\"root\">G</span><span class=\"qual\">m</span>", "c": 1.0}, "seventh": {"h": "<span class=\"root\">G</span><span class=\"qual\">m<sup>7</sup></span>", "c": 0.9999}, "exact": {"h": "<span class=\"root\">G</span><span class=\"qual\">m<sup>7</sup></span>", "c": 0.9989}}, {"family": {"h": "<span class=\"root\">C</span>", "c": 1.0}, "seventh": {"h": "<span class=\"root\">C</span><span class=\"qual\"><sup>7</sup></span>", "c": 0.9999}, "exact": {"h": "<span class=\"root\">C</span><span class=\"qual\"><sup>7</sup></span>", "c": 0.989}}, {"family": {"h": "<span class=\"root\">F</span>", "c": 0.9998}, "seventh": {"h": "<span class=\"root\">F</span>", "c": 0.9999}, "exact": {"h": "<span class=\"root\">F</span><span class=\"qual\"><sup>6</sup></span>", "c": 0.9997}}, {"family": {"h": "<span class=\"root\">F</span>", "c": 0.9895}, "seventh": {"h": "<span class=\"root\">F</span><span class=\"qual\"><sup>7</sup></span>", "c": 0.9529}, "exact": {"h": "<span class=\"root\">F</span><span class=\"qual\"><sup>7</sup></span>", "c": 0.889}}, {"family": {"h": "<span class=\"root\">E</span>", "c": 0.9873}, "seventh": {"h": "<span class=\"root\">E</span><span class=\"qual\"><sup>7</sup></span>", "c": 0.9563}, "exact": {"h": "<span class=\"root\">E</span><span class=\"qual\"><sup>7</sup></span>", "c": 0.6805}}, {"family": {"h": "<span class=\"root\">E<span class='acc'>\u266d</span></span>", "c": 0.9999}, "seventh": {"h": "<span class=\"root\">E<span class='acc'>\u266d</span></span><span class=\"qual\"><sup>7</sup></span>", "c": 0.9999}, "exact": {"h": "<span class=\"root\">E<span class='acc'>\u266d</span></span><span class=\"qual\"><sup>7</sup></span>", "c": 0.9985}}, {"family": {"h": "<span class=\"root\">D</span>", "c": 0.9998}, "seventh": {"h": "<span class=\"root\">D</span><span class=\"qual\"><sup>7</sup></span>", "c": 0.9998}, "exact": {"h": "<span class=\"root\">D</span><span class=\"qual\"><sup>7alt</sup></span>", "c": 0.9781}}, {"family": {"h": "<span class=\"root\">G</span><span class=\"qual\">m</span>", "c": 1.0}, "seventh": {"h": "<span class=\"root\">G</span><span class=\"qual\">m<sup>7</sup></span>", "c": 0.9999}, "exact": {"h": "<span class=\"root\">G</span><span class=\"qual\">m<sup>7</sup></span>", "c": 0.9997}}, {"family": {"h": "<span class=\"root\">D<span class='acc'>\u266d</span></span>", "c": 0.9997}, "seventh": {"h": "<span class=\"root\">D<span class='acc'>\u266d</span></span><span class=\"qual\"><sup>7</sup></span>", "c": 0.9899}, "exact": {"h": "<span class=\"root\">D<span class='acc'>\u266d</span></span><span class=\"qual\"><sup>7</sup></span>", "c": 0.976}}, {"family": {"h": "<span class=\"root\">C</span>", "c": 0.9999}, "seventh": {"h": "<span class=\"root\">C</span><span class=\"qual\"><sup>7</sup></span>", "c": 0.9993}, "exact": {"h": "<span class=\"root\">C</span><span class=\"qual\"><sup>7</sup></span>", "c": 0.9252}}, {"family": {"h": "<span class=\"root\">F</span>", "c": 0.9974}, "seventh": {"h": "<span class=\"root\">F</span><span class=\"qual\"><sup>\u25b37</sup></span>", "c": 0.9878}, "exact": {"h": "<span class=\"root\">F</span><span class=\"qual\"><sup>\u25b37</sup></span>", "c": 0.9727}}, {"family": {"h": "<span class=\"root\">G</span><span class=\"qual\">m</span>", "c": 0.9997}, "seventh": {"h": "<span class=\"root\">G</span><span class=\"qual\">m<sup>7</sup></span>", "c": 0.9996}, "exact": {"h": "<span class=\"root\">G</span><span class=\"qual\">m<sup>7</sup></span>", "c": 0.9989}}, {"family": {"h": "<span class=\"root\">C</span>", "c": 0.9965}, "seventh": {"h": "<span class=\"root\">C</span><span class=\"qual\"><sup>7</sup></span>", "c": 0.9966}, "exact": {"h": "<span class=\"root\">C</span><span class=\"qual\"><sup>7</sup></span>", "c": 0.9576}}, {"family": {"h": "<span class=\"root\">F</span>", "c": 1.0}, "seventh": {"h": "<span class=\"root\">F</span><span class=\"qual\"><sup>\u25b37</sup></span>", "c": 0.9975}, "exact": {"h": "<span class=\"root\">F</span><span class=\"qual\"><sup>\u25b37</sup></span>", "c": 0.9962}}, {"family": {"h": "<span class=\"root\">A</span><span class=\"qual\">m</span>", "c": 0.9606}, "seventh": {"h": "<span class=\"root\">A</span><span class=\"qual\">m<sup>7</sup></span>", "c": 0.8952}, "exact": {"h": "<span class=\"root\">A</span><span class=\"qual\">m<sup>7</sup></span>", "c": 0.6389}}, {"family": {"h": "<span class=\"root\">D</span>", "c": 0.9903}, "seventh": {"h": "<span class=\"root\">D</span><span class=\"qual\"><sup>7</sup></span>", "c": 0.9839}, "exact": {"h": "<span class=\"root\">D</span><span class=\"qual\"><sup>7</sup></span>", "c": 0.7732}}, {"family": {"h": "<span class=\"root\">G</span><span class=\"qual\">m</span>", "c": 1.0}, "seventh": {"h": "<span class=\"root\">G</span><span class=\"qual\">m<sup>7</sup></span>", "c": 0.9976}, "exact": {"h": "<span class=\"root\">G</span><span class=\"qual\">m<sup>7</sup></span>", "c": 0.989}}, {"family": {"h": "<span class=\"root\">C</span>", "c": 1.0}, "seventh": {"h": "<span class=\"root\">C</span><span class=\"qual\"><sup>7</sup></span>", "c": 1.0}, "exact": {"h": "<span class=\"root\">C</span><span class=\"qual\"><sup>7</sup></span>", "c": 0.9789}}, {"family": {"h": "<span class=\"root\">F</span>", "c": 0.9994}, "seventh": {"h": "<span class=\"root\">F</span>", "c": 0.995}, "exact": {"h": "<span class=\"root\">F</span><span class=\"qual\"><sup>6</sup></span>", "c": 0.9987}}, {"family": {"h": "<span class=\"root\">G</span><span class=\"qual\">m</span>", "c": 0.9992}, "seventh": {"h": "<span class=\"root\">G</span><span class=\"qual\">m<sup>7</sup></span>", "c": 0.999}, "exact": {"h": "<span class=\"root\">G</span><span class=\"qual\">m<sup>7</sup></span>", "c": 0.9985}}, const LEVELS = ["family","seventh","exact"];
const SCALES = {
  rg:   [[0.0,[192,57,43]],[0.5,[224,195,26]],[1.0,[58,138,58]]],
  warm: [[0.0,[176,57,43]],[0.5,[201,123,30]],[1.0,[40,40,40]]],
  gray: [[0.0,[190,60,50]],[0.15,[120,120,120]],[1.0,[28,28,28]]],
};
function lerp(a,b,t){return Math.round(a+(b-a)*t);}
function colour(scaleKey, conf){
  const t = Math.min(1,Math.max(0,(conf-0.35)/0.6));
  const stops = SCALES[scaleKey];
  for(let i=0;i<stops.length-1;i++){
    const [p0,c0]=stops[i],[p1,c1]=stops[i+1];
    if(t<=p1){const k=(t-p0)/(p1-p0);
      return `rgb(${lerp(c0[0],c1[0],k)},${lerp(c0[1],c1[1],k)},${lerp(c0[2],c1[2],k)})`;}
  }
  const last=stops[stops.length-1][1]; return `rgb(${last[0]},${last[1]},${last[2]})`;
}
function pickLevel(d, mode, th){
  if(mode!=="auto") return mode;
  if(d.exact.c>=th && d.seventh.c>=th) return "exact";
  if(d.seventh.c>=th) return "seventh";
  return "family";
}
function render(){
  const mode=document.getElementById("level").value;
  const scale=document.getElementById("scale").value;
  const th=parseFloat(document.getElementById("thresh").value);
  document.getElementById("thv").textContent=th.toFixed(2);
  document.getElementById("gate").style.opacity = mode==="auto"?1:0.35;
  DATA.forEach((d,i)=>{
    const lv=pickLevel(d,mode,th);
    const el=document.getElementById("chord-"+i);
    if(!el) return;
    el.innerHTML=d[lv].h;
    el.style.color=colour(scale,d[lv].c);
  });
  // legend gradient
  const g=[]; for(let k=0;k<=10;k++){g.push(colour(scale,0.35+0.6*k/10));}
  document.getElementById("legbar").style.background=
    `linear-gradient(90deg, ${g.join(",")})`;
  document.getElementById("caption").textContent = mode==="auto"
    ? `Auto: shows 7th / exact only where certainty ≥ ${th.toFixed(2)}; colour = certainty at the shown depth.`
    : `Fixed level: ${mode}. Colour = the model's certainty about that ${mode} label.`;
}
["level","scale","thresh"].forEach(id=>
  document.getElementById(id).addEventListener("input",render));
render();
</script>
