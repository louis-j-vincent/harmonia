  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

"<!DOCTYPE html>\n<html><head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<script src=\"b95c55c9-4942-4ab2-8f87-85e65954de4f\"><\u002Fscript>\n<\u002Fhead>\n<body>\n<x-dc>\n<helmet>\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1, viewport-fit=cover\">\n\n<title>Harmonia<\u002Ftitle>\n\n<style>\n  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }\n  html, body { margin: 0; height: 100%; background: #e7e0d0; }\n  a { color: #8a2b2b; } a:hover { color: #6f2020; }\n  @keyframes ap-in { from { opacity:0; transform:translateY(10px);} to { opacity:1; transform:translateY(0);} }\n  @keyframes ap-fade { from { opacity:0;} to { opacity:1;} }\n  @keyframes ap-spin { to { transform: rotate(360deg); } }\n  @keyframes ap-sheet { from { transform:translateY(100%);} to { transform:translateY(0);} }\n  @keyframes ap-halo { 0%{box-shadow:0 0 0 0 rgba(31,138,91,0);} 30%{box-shadow:0 0 0 5px rgba(31,138,91,.35);} 100%{box-shadow:0 0 0 0 rgba(31,138,91,0);} }\n  @keyframes ap-pulse { 0%,100%{transform:scale(1);opacity:1;} 50%{transform:scale(1.06);opacity:.85;} }\n  @keyframes ap-orb { from { opacity:0; transform:scale(.4);} to { opacity:1; transform:scale(1);} }\n  .ap-scroll::-webkit-scrollbar{width:7px;height:7px;} .ap-scroll::-webkit-scrollbar-thumb{background:#cdc4ad;border-radius:4px;}\n<\u002Fstyle>\n<script>\nwindow.APP = (function(){\n  \"use strict\";\n  const UI=\"-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif\";\n  const SERIF=\"Georgia,'Times New Roman',serif\";\n  const T={ bg:\"#e7e0d0\", paper:\"#f7f3e9\", card:\"#fffdf6\", ink:\"#1c1c1c\", rule:\"#b9b09a\", faint:\"#8a8371\", accent:\"#8a2b2b\", line:\"#e5dcc6\", deep:\"#2a2622\", green:\"#1f8a5b\", amber:\"#c58a2e\", blue:\"#2a6fb0\" };\n  const FLAT=[\"C\",\"D\\u266d\",\"D\",\"E\\u266d\",\"E\",\"F\",\"G\\u266d\",\"G\",\"A\\u266d\",\"A\",\"B\\u266d\",\"B\"];\n  const mod=(n,m)=>((n%m)+m)%m;\n  const note=pc=>FLAT[mod(pc,12)];\n  const el=(t,c,x)=>{const e=document.createElement(t); if(c)e.style.cssText=c; if(x!=null)e.textContent=x; return e;};\n  const clear=n=>{ while(n.firstChild) n.removeChild(n.firstChild); };\n\n  const TOK={\"\":\"\",\"6\":\"6\",\"^7\":\"maj7\",\"7\":\"7\",\"-\":\"m\",\"-7\":\"m7\",\"-^7\":\"mMaj7\",\"o\":\"dim\",\"-7b5\":\"m7\\u266d5\",\"o7\":\"dim7\",\"9\":\"9\",\"7b9\":\"7\\u266d9\"};\n  function seventhOf(q){ if(q===\"6\"||q===\"^7\")return \"^7\"; if(q===\"-7b5\")return \"-7b5\"; if(q===\"o7\"||q===\"o\")return q; if(q.indexOf(\"-\")===0)return \"-7\"; if(q===\"\")return \"\"; return \"7\"; }\n  function famSuffix(q){ if(q.indexOf(\"-7b5\")===0||q.indexOf(\"o\")===0)return \"\\u00b0\"; if(q.indexOf(\"-\")===0)return \"m\"; if(q.indexOf(\"+\")===0)return \"+\"; return \"\"; }\n  function confColor(c){ if(c>=.82)return T.ink; if(c>=.66)return \"#5c4a30\"; if(c>=.5)return \"#9a6a1e\"; if(c>=.38)return \"#bd6a22\"; return \"#a8281f\"; }\n  function depthOf(c){ return c>=.66?\"exact\":(c>=.42?\"seventh\":\"family\"); }\n  function glyph(root,q,size,depth,color){\n    const w=el(\"span\",`font-family:${SERIF};font-style:italic;line-height:1;white-space:nowrap;color:${color};display:inline-flex;align-items:baseline;`);\n    w.appendChild(el(\"span\",`font-size:${size}px;font-weight:600;`,note(root)));\n    let suf; if(depth===\"family\") suf=famSuffix(q); else if(depth===\"seventh\") suf=TOK[seventhOf(q)]||\"\"; else suf=(TOK[q]!=null?TOK[q]:q);\n    if(suf) w.appendChild(el(\"sup\",`font-size:${Math.round(size*0.44)}px;font-weight:600;`,suf));\n    return w;\n  }\n  // circle-of-fifths hue\n  const fifthsIndex=pc=>mod(pc*7,12);\n  const keyHue=pc=>fifthsIndex(pc)/12*360;\n  const keyFill=pc=>`hsl(${keyHue(pc)} 42% 62%)`;\n  // harmonic function colour (relative to key tonic)\n  function fnColor(root,keyTonic){ const d=mod(root-keyTonic,12);\n    if(d===0||d===9) return T.green;         // I / vi  (home)\n    if(d===5||d===2) return T.blue;          // IV / ii (setting up)\n    if(d===7||d===11) return T.accent;       // V / vii (pulling)\n    return \"#8a7d5a\"; }\n  // ── suggestion colour: hue = circle-of-fifths position, deeper/more saturated = more sure ──\n  const rootHue=pc=>Math.round(fifthsIndex(pc)/12*360);\n  function petalFill(pc,conf){ return `hsl(${rootHue(pc)} ${Math.round(46+conf*26)}% ${Math.round(84-conf*34)}%)`; }\n  function petalEdge(pc,conf){ return `hsl(${rootHue(pc)} ${Math.round(50+conf*26)}% ${Math.round(60-conf*22)}%)`; }\n  function keyTint(pc){ return `hsl(${rootHue(pc)} 52% 90%)`; }\n  const SVGNS=\"http://www.w3.org/2000/svg\";\n  function sv(t,a){ const e=document.createElementNS(SVGNS,t); for(const k in a) e.setAttribute(k,a[k]); return e; }\n  // ── functional role of a candidate (roman numeral + plain-language why) ──\n  function qClass(q){ if(q===\"\"||q.startsWith(\"^\")||q.startsWith(\"6\")) return \"maj\"; if(q.startsWith(\"-7b5\")||q.startsWith(\"h\")) return \"m7b5\"; if(q.startsWith(\"o\")) return \"dim\"; if(q.startsWith(\"-\")) return \"min\"; if(q.startsWith(\"sus\")) return (q.indexOf(\"7\")>=0)?\"dom\":\"sus\"; if(q.startsWith(\"+\")) return q.indexOf(\"7\")>=0?\"dom\":\"aug\"; return \"dom\"; }\n  const ROMAN=[\"I\",\"\\u266dII\",\"II\",\"\\u266dIII\",\"III\",\"IV\",\"\\u266dV\",\"V\",\"\\u266dVI\",\"VI\",\"\\u266dVII\",\"VII\"];\n  function romanFor(deg,cls){ let n=ROMAN[deg]; if(cls===\"min\"||cls===\"m7b5\"||cls===\"dim\") n=n.toLowerCase(); if(cls===\"m7b5\") n+=\"\\u00f8\"; else if(cls===\"dim\") n+=\"\\u00b0\"; else if(cls===\"dom\") n+=\"\\u2077\"; return n; }\n  function roleOf(home,root,q,next){ const cls=qClass(q); const deg=mod(root-home,12); const num=romanFor(deg,cls); const nRoot=next?next.root:null, nCls=next?qClass(next.q):null; const resolvesTo=t=>nRoot!==null&&nRoot===t; let text;\n    if(cls===\"dom\"){ const target=mod(root+5,12), tdeg=mod(target-home,12); if(deg===1) text=\"Tritone sub of V\\u2077 \\u2014 slides down a half-step to I\"; else if(deg===7) text=\"V\\u2077 \\u2014 the dominant, pulls home to I\"+(resolvesTo(target)?\" (resolves)\":\"\"); else if(target===home) text=\"V\\u2077 \\u2014 dominant, resolves home\"; else text=\"V\\u2077 of \"+ROMAN[tdeg]+\" \\u2014 secondary dominant\"+(resolvesTo(target)?\" (resolves down a 5th)\":\"\"); }\n    else if(cls===\"min\"||cls===\"m7b5\"){ const v=mod(root+5,12); if(nCls===\"dom\"&&resolvesTo(v)) text=(cls===\"m7b5\"?\"ii\\u00f8\":\"ii\")+\" \\u2014 sets up the V into \"+note(mod(v+5,12)); else if(deg===2) text=(cls===\"m7b5\"?\"ii\\u00f8\":\"ii\")+\" \\u2014 pre-dominant, leads to the V\"; else if(deg===9) text=\"vi \\u2014 the relative minor\"; else if(deg===5) text=\"iv \\u2014 borrowed minor subdominant, strong pull\"; else if(deg===0) text=\"i \\u2014 the tonic (minor)\"; else text=num+\" \\u2014 minor colour\"; }\n    else if(cls===\"maj\"){ if(deg===0) text=\"I \\u2014 home, the tonic\"; else if(deg===5) text=\"IV \\u2014 subdominant\"; else if(deg===7) text=\"V \\u2014 dominant degree\"; else if(deg===9) text=\"VI \\u2014 submediant\"; else if(deg===2) text=\"II \\u2014 supertonic\"; else if(deg===10) text=\"\\u266dVII \\u2014 borrowed from Mixolydian\"; else if(deg===8) text=\"\\u266dVI \\u2014 modal-interchange borrow\"; else if(deg===3) text=\"\\u266dIII \\u2014 modal-interchange borrow\"; else text=num+\" \\u2014 chromatic colour\"; }\n    else if(cls===\"dim\"){ text=\"\\u00b0 \\u2014 passing / leading-tone diminished\"; }\n    else if(cls===\"sus\"){ text=\"sus \\u2014 suspended, the 3rd held open\"; }\n    else { text=\"augmented \\u2014 raised 5th, unstable\"; }\n    return { num, text }; }\n  // ── audio: short felt-piano arpeggio ──\n  const CE_IV={ \"\":[0,4,7],\"6\":[0,4,7,9],\"^7\":[0,4,7,11],\"7\":[0,4,7,10],\"-\":[0,3,7],\"-7\":[0,3,7,10],\"-^7\":[0,3,7,11],\"-7b5\":[0,3,6,10],\"o\":[0,3,6],\"o7\":[0,3,6,9],\"+\":[0,4,8],\"sus4\":[0,5,7],\"sus2\":[0,2,7],\"9\":[0,4,7,10,14] };\n  let actx=null;\n  function play(root,q){ try{ if(!actx) actx=new (window.AudioContext||window.webkitAudioContext)(); if(actx.state===\"suspended\") actx.resume(); const ivs=CE_IV[q]||CE_IV[\"\"]; const base=233.08*Math.pow(2,root/12); ivs.forEach((iv,i)=>{ const f=base*Math.pow(2,iv/12), t0=actx.currentTime+i*0.075; const o=actx.createOscillator(), o2=actx.createOscillator(), g=actx.createGain(); o.type=\"triangle\"; o2.type=\"sine\"; o.frequency.value=f; o2.frequency.value=f*2; g.gain.setValueAtTime(0,t0); g.gain.linearRampToValueAtTime(0.16,t0+0.012); g.gain.exponentialRampToValueAtTime(0.0001,t0+0.55); o.connect(g); o2.connect(g); g.connect(actx.destination); o.start(t0); o2.start(t0); o.stop(t0+0.6); o2.stop(t0+0.6); }); }catch(e){} }\n  function haptic(ms){ try{ if(navigator.vibrate) navigator.vibrate(ms||6); }catch(e){} }\n\n  // ── Harte parsing (real /api/reinfer response) ──\n  const NOTE_PC={C:0,\"C#\":1,Db:1,D:2,\"D#\":3,Eb:3,E:4,F:5,\"F#\":6,Gb:6,G:7,\"G#\":8,Ab:8,A:9,\"A#\":10,Bb:10,B:11};\n  const HARTE_Q={maj:\"\",maj7:\"^7\",min:\"-\",min7:\"-7\",\"7\":\"7\",hdim7:\"-7b5\",dim:\"o\",dim7:\"o7\",\"6\":\"6\"};\n  const NOTE_NAME=[\"C\",\"Db\",\"D\",\"Eb\",\"E\",\"F\",\"Gb\",\"G\",\"Ab\",\"A\",\"Bb\",\"B\"];\n  function parseLabel(l){ const p=String(l).split(\":\"); return { root: NOTE_PC[p[0]]!=null?NOTE_PC[p[0]]:0, q: HARTE_Q[p[1]]!=null?HARTE_Q[p[1]]:(p[1]||\"\") }; }\n  function qToHarte(q){ for(const k in HARTE_Q){ if(HARTE_Q[k]===q) return k; } return \"maj\"; }\n  function labelOf(r,q){ return NOTE_NAME[mod(r,12)]+\":\"+qToHarte(q); }\n  function overlaps(a0,a1,b0,b1){ return Math.min(a1,b1)-Math.max(a0,b0) > 1e-6; }\n\n  // ── Song model (Autumn Leaves excerpt, inferred key G# major) ──\n  // Each bar: {chords:[{root,q,c}, ...]} — 1 or 2 chords per bar.\n  const FORM=[\n    { label:\"A\", reps:2, bars:[\n      [{root:10,q:\"-7\",c:.88}],[{root:3,q:\"7\",c:.79}],[{root:8,q:\"^7\",c:.94}],[{root:1,q:\"^7\",c:.46}],\n      [{root:7,q:\"-7b5\",c:.33}],[{root:7,q:\"-7b5\",c:.33}],[{root:6,q:\"^7\",c:.40}],[{root:10,q:\"-7\",c:.90}] ] },\n    { label:\"B\", reps:1, bars:[\n      [{root:1,q:\"-7\",c:.90}],[{root:6,q:\"7\",c:.88}],[{root:11,q:\"^7\",c:.85}],[{root:11,q:\"6\",c:.80}],\n      [{root:10,q:\"-7\",c:.87}],[{root:3,q:\"7\",c:.86}],[{root:8,q:\"^7\",c:.92}],[{root:8,q:\"6\",c:.82}] ] },\n    { label:\"C\", reps:1, bars:[\n      [{root:1,q:\"-7\",c:.84},{root:6,q:\"7\",c:.80}],[{root:11,q:\"^7\",c:.86},{root:4,q:\"7\",c:.78}],\n      [{root:10,q:\"-7\",c:.83}],[{root:3,q:\"7\",c:.80}],[{root:8,q:\"^7\",c:.90}],[{root:5,q:\"-7\",c:.74}],\n      [{root:3,q:\"7\",c:.77}],[{root:8,q:\"^7\",c:.88}] ] },\n  ];\n  // scripted re-infer responses (mock; live server replaces)\n  const CANDS={ // per flat-chord-index candidate lists (demo) — {root,q,c}\n    4:[{root:2,q:\"7\",c:.62},{root:7,q:\"7\",c:.26},{root:7,q:\"-7b5\",c:.16}],\n    5:[{root:7,q:\"7\",c:.55},{root:7,q:\"-7b5\",c:.28},{root:2,q:\"7\",c:.20}],\n    3:[{root:1,q:\"^7\",c:.46},{root:1,q:\"7\",c:.34},{root:6,q:\"7\",c:.24}],\n    6:[{root:6,q:\"^7\",c:.40},{root:6,q:\"7\",c:.33},{root:1,q:\"-7\",c:.22}]\n  };\n  const REINFER_DIFF=[\n    {i:5, oldRoot:7,oldQ:\"-7b5\",oldC:.33, root:7,q:\"7\", c:.71},\n    {i:6, oldRoot:6,oldQ:\"^7\",  oldC:.40, root:6,q:\"7\", c:.77},\n    {i:3, oldRoot:1,oldQ:\"^7\",  oldC:.46, root:1,q:\"7\", c:.68},\n  ];\n  const MERGE_DIFF=[\n    {i:4, oldRoot:7,oldQ:\"-7b5\",oldC:.33, root:2,q:\"7\", c:.76},\n    {i:5, oldRoot:7,oldQ:\"-7b5\",oldC:.33, root:7,q:\"7\", c:.69},\n    {i:6, oldRoot:6,oldQ:\"^7\",  oldC:.40, root:6,q:\"7\", c:.73},\n  ];\n  const SECTIONS=[{id:\"A1\",label:\"A\",tag:\"\\u00b9\"},{id:\"A2\",label:\"A\",tag:\"\\u00b2\"},{id:\"B\",label:\"B\",tag:\"\"},{id:\"C\",label:\"C\",tag:\"\"}];\n\n  // ── build a flat working chord list from the (first-pass) form ──\n  function buildChords(){\n    const chords=[]; let t=0;\n    FORM.forEach(sec=>{\n      sec.bars.forEach((bar,bi)=>{\n        const span=2, step=span/bar.length;\n        bar.forEach((c,ci)=>{\n          chords.push({ root:c.root, q:c.q, c:c.c, confirmed:false, sec:sec.label,\n            barFirst: ci===0, secFirst: bi===0&&ci===0, reps:sec.reps,\n            t0:t, t1:t+step });\n          t+=step;\n        });\n      });\n    });\n    return chords;\n  }\n  function buildRequest(chords,pending,merges){\n    return { confirms: pending.map(i=>{const c=chords[i];return {t0:c.t0,t1:c.t1,root:c.root,q:c.q};}), merges: merges||[] };\n  }\n  const FILENAME=\"inferred_autumn_leaves.html\";\n  async function reinfer(body){\n    // ⇩ SWAP FOR LIVE: uncomment the fetch, delete the mock line.\n    // return (await fetch(\"/api/reinfer/\"+FILENAME,{method:\"POST\",headers:{\"Content-Type\":\"application/json\"},body:JSON.stringify(body)})).json();\n    return mockReinfer(body);\n  }\n  function mockReinfer(body){\n    const srcArr=(body.merges&&body.merges.length)?MERGE_DIFF:REINFER_DIFF;\n    const diff=srcArr.map(d=>({ index:d.i, start_s:d.i*0, end_s:d.i*0,\n      old_label:labelOf(d.oldRoot,d.oldQ), new_label:labelOf(d.root,d.q),\n      old_confidence:d.oldC, new_confidence:d.c, _i:d.i }));\n    return { key:\"G# major\", tempo_bpm:112.3, n_changed:diff.length, diff, chords:[] };\n  }\n\n  // ── YouTube playback: the fetched song, synced to the grid ──\n  // The real app feeds the id of the track it fetched audio from; the playhead\n  // follows real playback time, mapped onto each chord's [t0,t1] span.\n  const VIDEO_ID=\"sTfmMd0uOEc\"; // Autumn Leaves demo — swap for the fetched track's id\n  let ytApiReady=(typeof YT!==\"undefined\" && !!YT.Player), pendingYtInit=null;\n  window.onYouTubeIframeAPIReady=function(){ ytApiReady=true; if(pendingYtInit){ pendingYtInit(); pendingYtInit=null; } };\n  function fmt(s){ s=Math.max(0,Math.floor(s||0)); return Math.floor(s/60)+\":\"+String(s%60).padStart(2,\"0\"); }\n\n  // ══════════════════════════════════════════════════════════════\n  const API={};\n  let root, S;\n  API.build=function(host){\n    root=host
