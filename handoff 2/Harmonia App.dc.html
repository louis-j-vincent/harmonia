<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; height: 100%; background: #e7e0d0; }
  a { color: #8a2b2b; } a:hover { color: #6f2020; }
  @keyframes ap-in { from { opacity:0; transform:translateY(10px);} to { opacity:1; transform:translateY(0);} }
  @keyframes ap-fade { from { opacity:0;} to { opacity:1;} }
  @keyframes ap-spin { to { transform: rotate(360deg); } }
  @keyframes ap-sheet { from { transform:translateY(100%);} to { transform:translateY(0);} }
  @keyframes ap-halo { 0%{box-shadow:0 0 0 0 rgba(31,138,91,0);} 30%{box-shadow:0 0 0 5px rgba(31,138,91,.35);} 100%{box-shadow:0 0 0 0 rgba(31,138,91,0);} }
  @keyframes ap-pulse { 0%,100%{transform:scale(1);opacity:1;} 50%{transform:scale(1.06);opacity:.85;} }
  @keyframes ap-orb { from { opacity:0; transform:scale(.4);} to { opacity:1; transform:scale(1);} }
  .ap-scroll::-webkit-scrollbar{width:7px;height:7px;} .ap-scroll::-webkit-scrollbar-thumb{background:#cdc4ad;border-radius:4px;}

<script>
window.APP = (function(){
  "use strict";
  const UI="-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif";
  const SERIF="Georgia,'Times New Roman',serif";
  const T={ bg:"#e7e0d0", paper:"#f7f3e9", card:"#fffdf6", ink:"#1c1c1c", rule:"#b9b09a", faint:"#8a8371", accent:"#8a2b2b", line:"#e5dcc6", deep:"#2a2622", green:"#1f8a5b", amber:"#c58a2e", blue:"#2a6fb0" };
  const FLAT=["C","D\u266d","D","E\u266d","E","F","G\u266d","G","A\u266d","A","B\u266d","B"];
  const mod=(n,m)=>((n%m)+m)%m;
  const note=pc=>FLAT[mod(pc,12)];
  const el=(t,c,x)=>{const e=document.createElement(t); if(c)e.style.cssText=c; if(x!=null)e.textContent=x; return e;};
  const clear=n=>{ while(n.firstChild) n.removeChild(n.firstChild); };

  const TOK={"":"","6":"6","^7":"maj7","7":"7","-":"m","-7":"m7","-^7":"mMaj7","o":"dim","-7b5":"m7\u266d5","o7":"dim7","9":"9","7b9":"7\u266d9"};
  function seventhOf(q){ if(q==="6"||q==="^7")return "^7"; if(q==="-7b5")return "-7b5"; if(q==="o7"||q==="o")return q; if(q.indexOf("-")===0)return "-7"; if(q==="")return ""; return "7"; }
  function famSuffix(q){ if(q.indexOf("-7b5")===0||q.indexOf("o")===0)return "\u00b0"; if(q.indexOf("-")===0)return "m"; if(q.indexOf("+")===0)return "+"; return ""; }
  function confColor(c){ if(c>=.82)return T.ink; if(c>=.66)return "#5c4a30"; if(c>=.5)return "#9a6a1e"; if(c>=.38)return "#bd6a22"; return "#a8281f"; }
  function depthOf(c){ return c>=.66?"exact":(c>=.42?"seventh":"family"); }
  function glyph(root,q,size,depth,color){
    const w=el("span",`font-family:${SERIF};font-style:italic;line-height:1;white-space:nowrap;color:${color};display:inline-flex;align-items:baseline;`);
    w.appendChild(el("span",`font-size:${size}px;font-weight:600;`,note(root)));
    let suf; if(depth==="family") suf=famSuffix(q); else if(depth==="seventh") suf=TOK[seventhOf(q)]||""; else suf=(TOK[q]!=null?TOK[q]:q);
    if(suf) w.appendChild(el("sup",`font-size:${Math.round(size*0.44)}px;font-weight:600;`,suf));
    return w;
  }
  // circle-of-fifths hue
  const fifthsIndex=pc=>mod(pc*7,12);
  const keyHue=pc=>fifthsIndex(pc)/12*360;
  const keyFill=pc=>`hsl(${keyHue(pc)} 42% 62%)`;
  // harmonic function colour (relative to key tonic)
  function fnColor(root,keyTonic){ const d=mod(root-keyTonic,12);
    if(d===0||d===9) return T.green;         // I / vi  (home)
    if(d===5||d===2) return T.blue;          // IV / ii (setting up)
    if(d===7||d===11) return T.accent;       // V / vii (pulling)
    return "#8a7d5a"; }
  // ── suggestion colour: hue = circle-of-fifths position, deeper/more saturated = more sure ──
  const rootHue=pc=>Math.round(fifthsIndex(pc)/12*360);
  function petalFill(pc,conf){ return `hsl(${rootHue(pc)} ${Math.round(46+conf*26)}% ${Math.round(84-conf*34)}%)`; }
  function petalEdge(pc,conf){ return `hsl(${rootHue(pc)} ${Math.round(50+conf*26)}% ${Math.round(60-conf*22)}%)`; }
  function keyTint(pc){ return `hsl(${rootHue(pc)} 52% 90%)`; }
  const SVGNS="http://www.w3.org/2000/svg";
  function sv(t,a){ const e=document.createElementNS(SVGNS,t); for(const k in a) e.setAttribute(k,a[k]); return e; }
  // ── functional role of a candidate (roman numeral + plain-language why) ──
  function qClass(q){ if(q===""||q.startsWith("^")||q.startsWith("6")) return "maj"; if(q.startsWith("-7b5")||q.startsWith("h")) return "m7b5"; if(q.startsWith("o")) return "dim"; if(q.startsWith("-")) return "min"; if(q.startsWith("sus")) return (q.indexOf("7")>=0)?"dom":"sus"; if(q.startsWith("+")) return q.indexOf("7")>=0?"dom":"aug"; return "dom"; }
  const ROMAN=["I","\u266dII","II","\u266dIII","III","IV","\u266dV","V","\u266dVI","VI","\u266dVII","VII"];
  function romanFor(deg,cls){ let n=ROMAN[deg]; if(cls==="min"||cls==="m7b5"||cls==="dim") n=n.toLowerCase(); if(cls==="m7b5") n+="\u00f8"; else if(cls==="dim") n+="\u00b0"; else if(cls==="dom") n+="\u2077"; return n; }
  function roleOf(home,root,q,next){ const cls=qClass(q); const deg=mod(root-home,12); const num=romanFor(deg,cls); const nRoot=next?next.root:null, nCls=next?qClass(next.q):null; const resolvesTo=t=>nRoot!==null&&nRoot===t; let text;
    if(cls==="dom"){ const target=mod(root+5,12), tdeg=mod(target-home,12); if(deg===1) text="Tritone sub of V\u2077 \u2014 slides down a half-step to I"; else if(deg===7) text="V\u2077 \u2014 the dominant, pulls home to I"+(resolvesTo(target)?" (resolves)":""); else if(target===home) text="V\u2077 \u2014 dominant, resolves home"; else text="V\u2077 of "+ROMAN[tdeg]+" \u2014 secondary dominant"+(resolvesTo(target)?" (resolves down a 5th)":""); }
    else if(cls==="min"||cls==="m7b5"){ const v=mod(root+5,12); if(nCls==="dom"&&resolvesTo(v)) text=(cls==="m7b5"?"ii\u00f8":"ii")+" \u2014 sets up the V into "+note(mod(v+5,12)); else if(deg===2) text=(cls==="m7b5"?"ii\u00f8":"ii")+" \u2014 pre-dominant, leads to the V"; else if(deg===9) text="vi \u2014 the relative minor"; else if(deg===5) text="iv \u2014 borrowed minor subdominant, strong pull"; else if(deg===0) text="i \u2014 the tonic (minor)"; else text=num+" \u2014 minor colour"; }
    else if(cls==="maj"){ if(deg===0) text="I \u2014 home, the tonic"; else if(deg===5) text="IV \u2014 subdominant"; else if(deg===7) text="V \u2014 dominant degree"; else if(deg===9) text="VI \u2014 submediant"; else if(deg===2) text="II \u2014 supertonic"; else if(deg===10) text="\u266dVII \u2014 borrowed from Mixolydian"; else if(deg===8) text="\u266dVI \u2014 modal-interchange borrow"; else if(deg===3) text="\u266dIII \u2014 modal-interchange borrow"; else text=num+" \u2014 chromatic colour"; }
    else if(cls==="dim"){ text="\u00b0 \u2014 passing / leading-tone diminished"; }
    else if(cls==="sus"){ text="sus \u2014 suspended, the 3rd held open"; }
    else { text="augmented \u2014 raised 5th, unstable"; }
    return { num, text }; }
  // ── audio: short felt-piano arpeggio ──
  const CE_IV={ "":[0,4,7],"6":[0,4,7,9],"^7":[0,4,7,11],"7":[0,4,7,10],"-":[0,3,7],"-7":[0,3,7,10],"-^7":[0,3,7,11],"-7b5":[0,3,6,10],"o":[0,3,6],"o7":[0,3,6,9],"+":[0,4,8],"sus4":[0,5,7],"sus2":[0,2,7],"9":[0,4,7,10,14] };
  let actx=null;
  function play(root,q){ try{ if(!actx) actx=new (window.AudioContext||window.webkitAudioContext)(); if(actx.state==="suspended") actx.resume(); const ivs=CE_IV[q]||CE_IV[""]; const base=233.08*Math.pow(2,root/12); ivs.forEach((iv,i)=>{ const f=base*Math.pow(2,iv/12), t0=actx.currentTime+i*0.075; const o=actx.createOscillator(), o2=actx.createOscillator(), g=actx.createGain(); o.type="triangle"; o2.type="sine"; o.frequency.value=f; o2.frequency.value=f*2; g.gain.setValueAtTime(0,t0); g.gain.linearRampToValueAtTime(0.16,t0+0.012); g.gain.exponentialRampToValueAtTime(0.0001,t0+0.55); o.connect(g); o2.connect(g); g.connect(actx.destination); o.start(t0); o2.start(t0); o.stop(t0+0.6); o2.stop(t0+0.6); }); }catch(e){} }
  function haptic(ms){ try{ if(navigator.vibrate) navigator.vibrate(ms||6); }catch(e){} }

  // ── Harte parsing (real /api/reinfer response) ──
  const NOTE_PC={C:0,"C#":1,Db:1,D:2,"D#":3,Eb:3,E:4,F:5,"F#":6,Gb:6,G:7,"G#":8,Ab:8,A:9,"A#":10,Bb:10,B:11};
  const HARTE_Q={maj:"",maj7:"^7",min:"-",min7:"-7","7":"7",hdim7:"-7b5",dim:"o",dim7:"o7","6":"6"};
  const NOTE_NAME=["C","Db","D","Eb","E","F","Gb","G","Ab","A","Bb","B"];
  function parseLabel(l){ const p=String(l).split(":"); return { root: NOTE_PC[p[0]]!=null?NOTE_PC[p[0]]:0, q: HARTE_Q[p[1]]!=null?HARTE_Q[p[1]]:(p[1]||"") }; }
  function qToHarte(q){ for(const k in HARTE_Q){ if(HARTE_Q[k]===q) return k; } return "maj"; }
  function labelOf(r,q){ return NOTE_NAME[mod(r,12)]+":"+qToHarte(q); }
  function overlaps(a0,a1,b0,b1){ return Math.min(a1,b1)-Math.max(a0,b0) > 1e-6; }

  // ── Song model (Autumn Leaves excerpt, inferred key G# major) ──
  // Each bar: {chords:[{root,q,c}, ...]} — 1 or 2 chords per bar.
  const FORM=[
    { label:"A", reps:2, bars:[
      [{root:10,q:"-7",c:.88}],[{root:3,q:"7",c:.79}],[{root:8,q:"^7",c:.94}],[{root:1,q:"^7",c:.46}],
      [{root:7,q:"-7b5",c:.33}],[{root:7,q:"-7b5",c:.33}],[{root:6,q:"^7",c:.40}],[{root:10,q:"-7",c:.90}] ] },
    { label:"B", reps:1, bars:[
      [{root:1,q:"-7",c:.90}],[{root:6,q:"7",c:.88}],[{root:11,q:"^7",c:.85}],[{root:11,q:"6",c:.80}],
      [{root:10,q:"-7",c:.87}],[{root:3,q:"7",c:.86}],[{root:8,q:"^7",c:.92}],[{root:8,q:"6",c:.82}] ] },
    { label:"C", reps:1, bars:[
      [{root:1,q:"-7",c:.84},{root:6,q:"7",c:.80}],[{root:11,q:"^7",c:.86},{root:4,q:"7",c:.78}],
      [{root:10,q:"-7",c:.83}],[{root:3,q:"7",c:.80}],[{root:8,q:"^7",c:.90}],[{root:5,q:"-7",c:.74}],
      [{root:3,q:"7",c:.77}],[{root:8,q:"^7",c:.88}] ] },
  ];
  // scripted re-infer responses (mock; live server replaces)
  const CANDS={ // per flat-chord-index candidate lists (demo) — {root,q,c}
    4:[{root:2,q:"7",c:.62},{root:7,q:"7",c:.26},{root:7,q:"-7b5",c:.16}],
    5:[{root:7,q:"7",c:.55},{root:7,q:"-7b5",c:.28},{root:2,q:"7",c:.20}],
    3:[{root:1,q:"^7",c:.46},{root:1,q:"7",c:.34},{root:6,q:"7",c:.24}],
    6:[{root:6,q:"^7",c:.40},{root:6,q:"7",c:.33},{root:1,q:"-7",c:.22}]
  };
  const REINFER_DIFF=[
    {i:5, oldRoot:7,oldQ:"-7b5",oldC:.33, root:7,q:"7", c:.71},
    {i:6, oldRoot:6,oldQ:"^7",  oldC:.40, root:6,q:"7", c:.77},
    {i:3, oldRoot:1,oldQ:"^7",  oldC:.46, root:1,q:"7", c:.68},
  ];
  const MERGE_DIFF=[
    {i:4, oldRoot:7,oldQ:"-7b5",oldC:.33, root:2,q:"7", c:.76},
    {i:5, oldRoot:7,oldQ:"-7b5",oldC:.33, root:7,q:"7", c:.69},
    {i:6, oldRoot:6,oldQ:"^7",  oldC:.40, root:6,q:"7", c:.73},
  ];
  const SECTIONS=[{id:"A1",label:"A",tag:"\u00b9"},{id:"A2",label:"A",tag:"\u00b2"},{id:"B",label:"B",tag:""},{id:"C",label:"C",tag:""}];

  // ── build a flat working chord list from the (first-pass) form ──
  function buildChords(){
    const chords=[]; let t=0;
    FORM.forEach(sec=>{
      sec.bars.forEach((bar,bi)=>{
        const span=2, step=span/bar.length;
        bar.forEach((c,ci)=>{
          chords.push({ root:c.root, q:c.q, c:c.c, confirmed:false, sec:sec.label,
            barFirst: ci===0, secFirst: bi===0&&ci===0, reps:sec.reps,
            t0:t, t1:t+step });
          t+=step;
        });
      });
    });
    return chords;
  }
  function buildRequest(chords,pending,merges){
    return { confirms: pending.map(i=>{const c=chords[i];return {t0:c.t0,t1:c.t1,root:c.root,q:c.q};}), merges: merges||[] };
  }
  const FILENAME="inferred_autumn_leaves.html";
  async function reinfer(body){
    // ⇩ SWAP FOR LIVE: uncomment the fetch, delete the mock line.
    // return (await fetch("/api/reinfer/"+FILENAME,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)})).json();
    return mockReinfer(body);
  }
  function mockReinfer(body){
    const srcArr=(body.merges&&body.merges.length)?MERGE_DIFF:REINFER_DIFF;
    const diff=srcArr.map(d=>({ index:d.i, start_s:d.i*0, end_s:d.i*0,
      old_label:labelOf(d.oldRoot,d.oldQ), new_label:labelOf(d.root,d.q),
      old_confidence:d.oldC, new_confidence:d.c, _i:d.i }));
    return { key:"G# major", tempo_bpm:112.3, n_changed:diff.length, diff, chords:[] };
  }

  // ── YouTube playback: the fetched song, synced to the grid ──
  // The real app feeds the id of the track it fetched audio from; the playhead
  // follows real playback time, mapped onto each chord's [t0,t1] span.
  const VIDEO_ID="sTfmMd0uOEc"; // Autumn Leaves demo — swap for the fetched track's id
  let ytApiReady=(typeof YT!=="undefined" && !!YT.Player), pendingYtInit=null;
  window.onYouTubeIframeAPIReady=function(){ ytApiReady=true; if(pendingYtInit){ pendingYtInit(); pendingYtInit=null; } };
  function fmt(s){ s=Math.max(0,Math.floor(s||0)); return Math.floor(s/60)+":"+String(s%60).padStart(2,"0"); }

  // ══════════════════════════════════════════════════════════════
  const API={};
  let root, S;
  API.build=function(host){
    root=host;
    root.style.cssText="position:relative;height:100%;background:"+T.bg+";overflow:hidden;font-family:"+UI+";color:"+T.ink+";";
    S={ screen:null, mode:"read", colorMode:"function", key:8, chords:buildChords(),
        pending:[], selectedSecs:[], playing:false, playIdx:-1, reinfering:false,
        ytPlayer:null, ytReady:false, videoDur:0, videoOpen:false, rafId:null, demoStart:0, _cells:[] };
    go("launcher");
  };

  function screenWrap(){ const w=el("div","position:absolute;inset:0;display:flex;flex-direction:column;animation:ap-fade .28s ease both;"); return w; }
  function go(screen){
    const leavingChart = S.screen==="chart" && screen!=="chart";
    if(leavingChart) stopPlayback();
    S.screen=screen;
    // remove old screen + any transient overlays, but KEEP the persistent transport
    // (moving the transport would reload its YouTube iframe and stop playback)
    [...root.children].forEach(c=>{ if(c!==S._np) root.removeChild(c); });
    let elS;
    if(screen==="launcher") elS=renderLauncher();
    else if(screen==="library") elS=renderLibrary();
    else if(screen==="analysing") elS=renderAnalysing();
    else elS=renderChart();
    S._screenEl=elS; root.appendChild(elS);
    syncTransport(screen);
  }

  // ── shared app bar ──
  function appBar(title, sub, backTo){
    const bar=el("div",`flex:0 0 auto;display:flex;align-items:center;gap:12px;padding:16px 18px;border-bottom:1px solid ${T.line};background:${T.paper};`);
    if(backTo){
      const b=el("button",`flex:0 0 auto;width:34px;height:34px;border-radius:50%;border:1px solid ${T.line};background:${T.card};color:${T.ink};font:600 17px ${UI};cursor:pointer;display:flex;align-items:center;justify-content:center;`,"\u2039");
      b.onclick=()=>go(backTo); bar.appendChild(b);
    }
    const tw=el("div","flex:1;min-width:0;");
    const wm=el("div",`font:italic 600 17px ${SERIF};color:${T.ink};`); wm.innerHTML='harmon<span style="color:'+T.accent+'">ia</span>';
    if(title){ wm.textContent=""; wm.appendChild(el("span",`font:italic 600 17px ${SERIF};`,title)); }
    tw.appendChild(wm);
    if(sub) tw.appendChild(el("div",`font:500 12px ${UI};color:${T.faint};margin-top:1px;`,sub));
    bar.appendChild(tw);
    return bar;
  }

  // ── 1. LAUNCHER ──
  function renderLauncher(){
    const w=screenWrap(); w.style.background=`radial-gradient(120% 90% at 50% 0%, ${T.paper}, ${T.bg})`;
    w.style.alignItems="center"; w.style.justifyContent="center"; w.style.textAlign="center"; w.style.padding="24px";
    const wm=el("div",`font:italic 600 clamp(46px,13vw,72px) ${SERIF};color:${T.ink};letter-spacing:-.01em;`);
    wm.innerHTML='harmon<span style="color:'+T.accent+'">ia</span>';
    w.appendChild(wm);
    w.appendChild(el("div",`font:500 15px ${UI};color:${T.faint};margin-top:8px;max-width:340px;line-height:1.5;`,"Read, understand and annotate the harmony of any song \u2014 with an ear that tells you how sure it is."));
    const ring=el("div",`margin-top:34px;width:74px;height:74px;border-radius:50%;background:${T.green};display:flex;align-items:center;justify-content:center;box-shadow:0 12px 30px -10px rgba(31,138,91,.55);animation:ap-pulse 2.4s ease-in-out infinite;cursor:pointer;`);
    ring.appendChild(el("div",`color:#fff;font:600 15px ${UI};`,"Open"));
    ring.onclick=()=>go("library");
    w.appendChild(ring);
    w.appendChild(el("div",`margin-top:16px;font:500 11.5px ${UI};color:${T.faint};`,"server \u00b7 localhost:7771"));
    return w;
  }

  // ── 2. LIBRARY / SEARCH ──
  const RECENT=[
    {title:"Autumn Leaves",artist:"Joseph Kosma",key:"G\u266f major",chords:32,fresh:true},
    {title:"Blue in Green",artist:"Miles Davis",key:"D minor",chords:20},
    {title:"So What",artist:"Miles Davis",key:"D dorian",chords:16},
    {title:"Fly Me to the Moon",artist:"Bart Howard",key:"C major",chords:32},
  ];
  function renderLibrary(){
    const w=screenWrap();
    w.appendChild(appBar(null,"Your charts",null));
    const body=el("div","flex:1;overflow-y:auto;padding:18px;"); body.className="ap-scroll";
    const inner=el("div","max-width:640px;margin:0 auto;");
    // search / paste field
    const field=el("div",`display:flex;align-items:center;gap:10px;background:${T.card};border:1.5px solid ${T.line};border-radius:14px;padding:13px 15px;box-shadow:0 6px 18px -12px rgba(50,35,20,.3);`);
    field.appendChild(el("span",`font:400 17px ${UI};color:${T.faint};`,"\u26b2"));
    const input=el("input",`flex:1;border:none;outline:none;background:transparent;font:500 15px ${UI};color:${T.ink};`);
    input.placeholder="Search a song or paste a YouTube link";
    field.appendChild(input);
    const goBtn=el("button",`flex:0 0 auto;border:none;background:${T.accent};color:#fff;border-radius:10px;padding:9px 15px;font:600 13px ${UI};cursor:pointer;`,"Analyse");
    goBtn.onclick=()=>go("analysing");
    field.appendChild(goBtn);
    inner.appendChild(field);
    input.addEventListener("keydown",e=>{ if(e.key==="Enter") go("analysing"); });
    inner.appendChild(el("div",`font:600 10px ${UI};letter-spacing:.08em;text-transform:uppercase;color:${T.faint};margin:22px 4px 10px;`,"Recent"));
    RECENT.forEach(r=>{
      const card=el("button",`width:100%;display:flex;align-items:center;gap:14px;background:${T.card};border:1px solid ${T.line};border-radius:14px;padding:14px 16px;margin-bottom:10px;cursor:pointer;text-align:left;transition:transform .12s,box-shadow .12s;`);
      card.onmouseenter=()=>{card.style.transform="translateY(-2px)";card.style.boxShadow="0 10px 24px -14px rgba(50,35,20,.4)";};
      card.onmouseleave=()=>{card.style.transform="";card.style.boxShadow="";};

  function chordColor(ch){

        item.appendChild(glyph(ch.root,ch.q,b.chords.length>1?24:30,chordDepth(ch),chordColor(ch)));

  }
  function barNumFor(idx){ let n=0; for(let i=0;i<=idx&&i<S.chords.length;i++){ if(S.chords[i].barFirst) n++; } return n; }

  // ── persistent transport (survives screen re-renders so audio keeps playing) ──
  function ensureTransport(){
    if(S._np) return;
    const np=el("div",`position:absolute;left:0;right:0;bottom:0;z-index:30;background:${T.card};border-top:1px solid ${T.line};box-shadow:0 -8px 24px -16px rgba(50,35,20,.4);`);
    // hidden YouTube player — we only want its AUDIO, played against the grid
    const hidden=el("div","position:absolute;width:1px;height:1px;left:-9999px;top:0;overflow:hidden;opacity:0;pointer-events:none;");
    const mount=el("div",""); mount.id="ap-yt-"+Math.random().toString(36).slice(2,7);
    hidden.appendChild(mount); np.appendChild(hidden); S._ytMount=mount;
    // control row
    const row=el("div",`display:flex;align-items:center;gap:13px;padding:11px 18px 14px;max-width:720px;margin:0 auto;`);
    const play=el("button",`flex:0 0 auto;width:44px;height:44px;border-radius:50%;border:none;background:${T.accent};color:#fff;font:600 16px ${UI};cursor:pointer;display:flex;align-items:center;justify-content:center;`,"\u25b6");
    play.onclick=togglePlay; S._playBtn=play; row.appendChild(play);
    const mid=el("div","flex:1;min-width:0;");
    const meta=el("div","display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:5px;");
    const src=el("div","display:flex;align-items:center;gap:6px;min-width:0;");
    src.appendChild(el("span",`flex:0 0 auto;font:600 9px ${UI};letter-spacing:.04em;color:#fff;background:#c00;border-radius:3px;padding:2px 5px;`,"YT"));
    src.appendChild(el("div",`font:600 12px ${UI};color:${T.ink};overflow:hidden;text-overflow:ellipsis;white-space:nowrap;`,"Autumn Leaves \u2014 audio"));
    meta.appendChild(src);
    const timeL=el("div",`flex:0 0 auto;font:600 11px ${UI};color:${T.faint};`,"0:00 / 0:00"); S._timeLabel=timeL; meta.appendChild(timeL);
    mid.appendChild(meta);
    const track=el("div",`height:6px;border-radius:3px;background:${T.line};position:relative;cursor:pointer;`);
    const fill=el("div",`position:absolute;left:0;top:0;bottom:0;width:0%;background:${T.accent};border-radius:3px;`);
    const knob=el("div",`position:absolute;top:50%;width:12px;height:12px;border-radius:50%;background:${T.accent};transform:translate(-50%,-50%);left:0%;box-shadow:0 1px 4px rgba(0,0,0,.3);`);
    track.appendChild(fill); track.appendChild(knob); S._scrubFill=fill; S._scrubKnob=knob;
    track.onclick=(e)=>{ const r=track.getBoundingClientRect(); seekFrac((e.clientX-r.left)/r.width); };
    mid.appendChild(track); row.appendChild(mid);
    const barL=el("div",`flex:0 0 auto;font:600 12px ${UI};color:${T.faint};min-width:44px;text-align:right;`,"\u2014"); S._barLabel=barL; row.appendChild(barL);
    np.appendChild(row);
    root.appendChild(np); S._np=np;
    initYt();
  }
  function syncTransport(screen){
    ensureTransport();
    S._np.style.display = screen==="chart" ? "block" : "none";
    setPlayBtn();
    if(S._scrubFill){ const dur=totalDur()||1; const t=nowTime(); const f=S.playing?Math.min(1,t/dur):(S.playIdx>=0?(S.playIdx+1)/S.chords.length:0); S._scrubFill.style.width=(f*100)+"%"; S._scrubKnob.style.left=(f*100)+"%"; }
  }
  function setPlayBtn(){ if(S._playBtn) S._playBtn.textContent = S.playing?"\u2758\u2758":"\u25b6"; }
  function initYt(){
    if(S.ytPlayer || typeof YT==="undefined" || !YT.Player){ if(!ytApiReady) pendingYtInit=initYt; return; }
    try{
      S.ytPlayer=new YT.Player(S._ytMount,{ videoId:VIDEO_ID,
        playerVars:{playsinline:1,controls:0,modestbranding:1,rel:0,fs:0},
        events:{
          onReady:e=>{ S.ytReady=true; S.videoDur=e.target.getDuration()||0; syncTransport(S.screen); },
          onStateChange:e=>{ if(e.data===YT.PlayerState.PLAYING){ S.playing=true; setPlayBtn(); startTick(); }
            else if(e.data===YT.PlayerState.PAUSED){ S.playing=false; setPlayBtn(); stopTick(); }
            else if(e.data===YT.PlayerState.ENDED){ stopPlayback(); setPlayhead(-1); } }
        }});
    }catch(err){}
  }
  // time helpers — playhead maps real playback time onto each chord's [t0,t1]
  function songTotal(){ return S.chords[S.chords.length-1].t1; }
  function totalDur(){ return (S.ytReady && S.videoDur) ? S.videoDur : songTotal()*0.62; }
  function timeScale(){ return totalDur()/songTotal(); }
  // real YouTube time when the audio is actually advancing; otherwise a virtual
  // clock (keeps the grid moving in a blocked/offline preview — on-device the
  // real getCurrentTime wins immediately, so the playhead tracks the audio).
  function nowTime(){ if(S.ytReady && S.ytPlayer && S.ytPlayer.getCurrentTime){ try{ const t=S.ytPlayer.getCurrentTime(); if(t>0.05) return t; }catch(e){} } return (performance.now()-S.demoStart)/1000; }
  function idxAtTime(t){ const sc=timeScale(); for(let i=0;i<S.chords.length;i++){ if(t < S.chords[i].t1*sc) return i; } return -1; }
  function togglePlay(){
    if(S.playing){ stopPlayback(); return; }
    S.playing=true; if(S.playIdx<0) setPlayhead(0); setPlayBtn();
    const startT = S.playIdx>=0 ? S.chords[S.playIdx].t0*timeScale() : 0;
    S.demoStart = performance.now() - startT*1000;
    if(S.ytReady && S.ytPlayer && S.ytPlayer.playVideo){ try{ S.ytPlayer.playVideo(); }catch(e){} }
    startTick();
  }
  function seekFrac(f){ f=Math.max(0,Math.min(1,f)); const t=f*totalDur(); if(S.ytReady && S.ytPlayer){ try{ S.ytPlayer.seekTo(t,true); }catch(e){} } else { S.demoStart=performance.now()-t*1000; } setPlayhead(idxAtTime(t)); if(S._scrubFill){ S._scrubFill.style.width=(f*100)+"%"; S._scrubKnob.style.left=(f*100)+"%"; } }
  function startTick(){ stopTick(); const loop=()=>{ if(!S.playing) return; const t=nowTime(), dur=totalDur(); const idx=idxAtTime(t); if(idx<0){ stopPlayback(); setPlayhead(-1); return; } if(idx!==S.playIdx) setPlayhead(idx); if(S._scrubFill){ const f=Math.min(1,t/dur); S._scrubFill.style.width=(f*100)+"%"; S._scrubKnob.style.left=(f*100)+"%"; } if(S._timeLabel) S._timeLabel.textContent=fmt(t)+" / "+fmt(dur); S.rafId=requestAnimationFrame(loop); }; S.rafId=requestAnimationFrame(loop); }
  function stopTick(){ if(S.rafId) cancelAnimationFrame(S.rafId); S.rafId=null; }
  function stopPlayback(){ S.playing=false; stopTick(); if(S.ytReady && S.ytPlayer && S.ytPlayer.pauseVideo){ try{ S.ytPlayer.pauseVideo(); }catch(e){} } setPlayBtn(); }

  // ── key rotor ──
  function openRotor(){
    const back=overlay();
    const sheet=sheetBox(360);
    sheet.appendChild(handle());
    sheet.appendChild(el("div",`text-align:center;font:700 15px ${UI};color:${T.ink};margin-bottom:2px;`,"Change key"));
    sheet.appendChild(el("div",`text-align:center;font:italic 12px ${SERIF};color:${T.faint};margin-bottom:16px;`,"spin the circle of fifths \u2014 the whole chart transposes"));
    const size=220, cx=size/2, cy=size/2, R=88;
    const dial=el("div",`position:relative;width:${size}px;height:${size}px;margin:0 auto;`);
    dial.appendChild(el("div",`position:absolute;inset:22px;border-radius:50%;border:1.5px dashed ${T.line};`));
    for(let f=0; f<12; f++){
      const pc=mod(f*7,12); const ang=(f/12)*2*Math.PI - Math.PI/2;

    banner.appendChild(top);
    changed.forEach(ch=>{ const d=ch.d; const o=parseLabel(d.old_label), nw=parseLabel(d.new_label); const row=el("div","display:flex;align-items:center;gap:9px;padding:5px 0;"); const from=glyph(o.root,o.q,17,"exact",confColor(d.old_confidence!=null?d.old_confidence:.3)); from.style.opacity=".7"; row.appendChild(from); row.appendChild(el("span",`color:${T.faint};font:600 13px ${UI};`,"\u2192")); row.appendChild(glyph(nw.root,nw.q,19,"exact",T.ink)); row.appendChild(el("span",`margin-left:auto;font:600 11px ${UI};color:${T.green};`, Math.round((d.old_confidence||0)*100)+"% \u2192 "+Math.round((d.new_confidence||0)*100)+"%")); banner.appendChild(row); });
    const done=el("button",`width:100%;margin-top:10px;border:none;background:${T.deep};color:#fff;border-radius:10px;padding:11px;font:600 13px ${UI};cursor:pointer;`,"Nice \u2014 keep going");
    done.onclick=()=>banner.remove(); banner.appendChild(done);
    root.appendChild(banner);
  }

  // ── overlay + toast helpers ──
  function overlay(){ const b=el("div",`position:absolute;inset:0;z-index:50;background:rgba(28,24,20,.32);display:flex;align-items:flex-end;justify-content:center;animation:ap-fade .2s both;`); b.onclick=e=>{ if(e.target===b) closeOverlay(b); }; return b; }
  function sheetBox(maxH){ return el("div",`width:100%;max-width:520px;background:${T.card};border-top-left-radius:22px;border-top-right-radius:22px;padding:16px 20px 24px;box-shadow:0 -14px 36px -16px rgba(50,35,20,.5);animation:ap-sheet .3s cubic-bezier(.32,.9,.35,1);max-height:88%;overflow-y:auto;`); }
  function handle(){ return el("div",`width:38px;height:4px;border-radius:2px;background:${T.rule};margin:0 auto 14px;`); }
  function closeOverlay(b){ b.style.animation="ap-fade .18s reverse both"; setTimeout(()=>b.remove(),160); }
  function toast(msg){ const t=el("div",`position:absolute;left:50%;bottom:96px;transform:translateX(-50%);z-index:70;background:${T.deep};color:#fff;font:600 12.5px ${UI};padding:10px 16px;border-radius:22px;box-shadow:0 10px 26px -10px rgba(0,0,0,.5);animation:ap-in .25s both;`,msg); root.appendChild(t); setTimeout(()=>{ t.style.opacity="0"; t.style.transition="opacity .3s"; setTimeout(()=>t.remove(),300); },1500); }

  return API;
})();
</script>
