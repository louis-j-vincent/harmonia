  function legendFor(){
    const box=el("div",`display:flex;align-items:center;gap:10px;flex-wrap:wrap;background:${T.card};border:1px solid ${T.line};border-radius:10px;padding:8px 12px;`);
    if(S.mode==="read"){
      box.appendChild(el("span",`font:italic 12px ${SERIF};color:${T.faint};`,"Clean lead sheet — tap Analyse to see the harmony in colour, or Annotate to fix chords."));
    } else if(S.mode==="analyse"){
      const items = S.colorMode==="function"
        ? [["Home",T.green],["Setting up",T.blue],["Pulling",T.accent],["Colour","#8a7d5a"]]
        : null;
      box.appendChild(el("span",`font:600 9.5px ${UI};letter-spacing:.07em;text-transform:uppercase;color:${T.faint};`, S.colorMode==="function"?"Harmonic role":"Key colour (circle of fifths)"));
      if(items){ items.forEach(([lbl,col])=>{ const c=el("span","display:inline-flex;align-items:center;gap:5px;"); c.appendChild(el("span",`width:12px;height:12px;border-radius:3px;background:${col};`)); c.appendChild(el("span",`font:500 11px ${UI};color:${T.faint};`,lbl)); box.appendChild(c); }); }
      else box.appendChild(el("span",`font:500 11px ${UI};color:${T.faint};`,"each root gets its own hue — modulations shift colour."));
    } else {
      box.appendChild(el("span",`font:600 9.5px ${UI};letter-spacing:.07em;text-transform:uppercase;color:${T.faint};`,"How sure the model is"));
      box.appendChild(el("span",`width:96px;height:11px;border-radius:6px;background:linear-gradient(90deg,#a8281f,#bd6a22,#9a6a1e,${T.ink});`));
      box.appendChild(el("span",`font:500 11px ${UI};color:${T.faint};`,"shaky chords show just the family — tap one you know to lock it in."));
    }
    return box;
  }

  function chordColor(ch){
    if(S.mode==="read") return T.ink;
    if(S.mode==="analyse") return S.colorMode==="function"?fnColor(ch.root,S.key):keyFill(ch.root);
    return ch.confirmed?T.ink:confColor(ch.c);
  }
  function chordDepth(ch){ if(S.mode!=="annotate"||ch.confirmed) return "exact"; return depthOf(ch.c); }

  function buildIReal(){
    const frame=el("div",`position:relative;background:${T.paper};border:1px solid ${T.line};border-radius:8px;overflow:hidden;`);
    const grid=el("div","display:grid;grid-template-columns:repeat(4,minmax(0,1fr));");
    // A phone is 390px: four bars of "D♭maj7" at desktop size do not fit, and
    // a grid item's default min-width:auto silently widens the column instead
    // of shrinking the type — which pushed bars 3 and 4 of every row off the
    // clipped edge. minmax(0,1fr) + min-width:0 lets the column hold the line;
    // the glyph scales instead.
    const W=root.clientWidth||390, narrow=W<470;
    const SZ1=narrow?23:30, SZ2=narrow?15:22;
    S._cells=[];
    const bars=S.bars.map(b=>({sec:b.sec, secFirst:b.secFirst, reps:b.reps,
                               chords:b.idxs.map(i=>({ch:S.chords[i], idx:i}))}));
    // iReal-style layout (user request 2026-07-19): every section change starts
    // a NEW ROW (grid-column-start:1), even if the previous row is left short;
    // col/row are therefore tracked explicitly (bi%4 no longer holds). In Read
    // mode the Intro section collapses to a single label-only row — an intro's
    // bar count is noise on a lead sheet; Annotate/Analyse keep its bars so
    // N.C. cells stay correctable.
    let col=0,row=0,introRow=null;
    bars.forEach((b,bi)=>{
      const isIntro = S.mode==="read" && /^intro/i.test(String(b.sec||""));
      if(isIntro){
        if(!introRow){
          if(col!==0){col=0;row++;}
          introRow=el("div",`position:relative;grid-column:1/-1;display:flex;align-items:center;gap:8px;min-height:${narrow?34:40}px;padding:0 ${narrow?8:12}px;${row>0?`border-top:1px solid ${T.rule};`:""}`);
          introRow.appendChild(el("div",`font:800 ${narrow?9:11}px ${UI};color:${T.accent};border:1.5px solid ${T.accent};border-radius:4px;padding:0 3px;background:${T.paper};`,b.sec));
          introRow.appendChild(el("div",`font:italic 500 ${narrow?11:12.5}px ${SERIF};color:${T.faint};`,"…"));
          introRow.dataset.bar=String(bi);
          grid.appendChild(introRow);
          row++;
        }
        const ph=el("div",`position:absolute;right:0;top:0;bottom:0;width:3px;background:${T.accent};display:none;`); introRow.appendChild(ph);
        const sel=el("div","position:absolute;inset:0;pointer-events:none;display:none;"); introRow.appendChild(sel);
        S._cells.push({el:introRow, bar:bi, idxs:b.chords.map(x=>x.idx), ph, sel});
        return;
      }
      introRow=null;
      if((b.secFirst && col!==0) || col===4){col=0;row++;}
      const cell=el("div",`position:relative;min-width:0;min-height:${narrow?64:74}px;display:flex;align-items:center;justify-content:center;gap:${narrow?4:10}px;padding:0 ${narrow?3:8}px 0 ${b.secFirst?(narrow?21:26):(narrow?3:8)}px;${b.secFirst?"grid-column-start:1;":""}${col>0?`border-left:1px solid ${T.rule};`:""}${row>0?`border-top:1px solid ${T.rule};`:""}`);
      if(b.secFirst){
        cell.appendChild(el("div",`position:absolute;left:4px;top:5px;font:800 ${narrow?9:11}px ${UI};color:${T.accent};border:1.5px solid ${T.accent};border-radius:4px;padding:0 3px;background:${T.paper};z-index:2;`,b.sec));
        cell.appendChild(el("div",`position:absolute;left:2px;top:0;bottom:0;width:2px;background:${T.ink};`));
        if(b.reps>1) cell.appendChild(el("div",`position:absolute;left:5px;bottom:6px;font:700 10px ${UI};color:${T.faint};`,"×"+b.reps));
      }
      b.chords.forEach(({ch,idx})=>{
        const item=el(S.mode==="annotate"?"button":"div",`position:relative;min-width:0;display:flex;flex-direction:column;align-items:center;gap:2px;background:none;border:none;cursor:${S.mode==="annotate"?"pointer":"default"};padding:0 2px;`);
        const size=b.chords.length>1?SZ2:SZ1;
        // No-chord (N.C.) cell: music-x-lab detected silence/no harmony here.
        // Render a faint "N.C." rather than an invented glyph (the intro/outro
        // of a track, or an a-cappella bridge) — known_issues.md 2026-07-19
        // ★ CHORDS / NO-CHORD. Still clickable in annotate mode to override.
        if(ch.nc){
          item.appendChild(el("div",`font:italic 600 ${narrow?15:18}px ${SERIF};color:${T.faint};opacity:.55;`,"N.C."));
          if(S.mode==="annotate" && !S.mergeMode && !S.suggMode && !S.sectSuggMode) item.onclick=()=>openEditor(idx);
          cell.appendChild(item);
          return;
        }
        item.appendChild(glyph(ch.root,ch.q,size,chordDepth(ch),chordColor(ch)));
        if(S.mode==="annotate"&&!ch.confirmed){
          item.appendChild(el("span",`font:600 10px ${UI};color:${confColor(ch.c)};opacity:.8;`, Math.round(ch.c*100)+"%"));
          if(ch.c<.42) item.appendChild(el("span",`position:absolute;top:-4px;right:-2px;font:700 12px ${UI};color:${confColor(ch.c)};`,"?"));
        }
        if(S.mode==="annotate"&&ch.confirmed){
          item.appendChild(el("span",`font:600 10px ${UI};color:${T.green};`,"✓ locked"));
        }
        const gt=gtForSpan(ch.t0,ch.t1);
        if(gt){
          const ok=gtMatches(gt,ch);
          item.appendChild(el("span",
            `font:italic 600 ${narrow?9:10.5}px ${SERIF};color:${ok?T.faint:T.accent};opacity:${ok?.75:1};margin-top:1px;white-space:nowrap;`,
            "GT "+gt.text+(gt.extra?"…":"")));
        }
        if(S.mode==="annotate" && !S.mergeMode && !S.suggMode && !S.sectSuggMode) item.onclick=()=>openEditor(idx);
        cell.appendChild(item);
      });
      // Held bar: no chord of its own — the previous chord sounds through it.
      // Show a faint "%" (simile) so the cell reads as "same chord, held",
      // not as an empty/missing bar.
      if(!b.chords.length){
        cell.appendChild(el("div",`font:700 ${narrow?22:28}px ${SERIF};color:${T.faint};opacity:.5;`,"%"));
      }
      const ph=el("div",`position:absolute;right:0;top:0;bottom:0;width:3px;background:${T.accent};display:none;`); cell.appendChild(ph);
      const sel=el("div","position:absolute;inset:0;pointer-events:none;display:none;");
      cell.appendChild(sel);
      cell.dataset.bar=String(bi);
      S._cells.push({el:cell, bar:bi, idxs:b.chords.map(x=>x.idx), ph, sel});
      grid.appendChild(cell);
      col++;
    });
    frame.appendChild(grid);
    if(S.mergeMode) attachSpanDrag(grid);
    paintSpans();
    if(S.mode==="annotate" && S.suggMode) paintSuggestions();
    if(S.mode==="annotate" && S.sectSuggMode) paintSectionSuggestions();
    setPlayhead(S.playBar);
    return frame;
  }

  // ── swipe a range of bars to define a span to pool ──────────────────────
  // Section chips only ever offered whole segmenter sections, which on a jazz
  // solo are 72/88/128 bars long and never equal — i.e. never poolable. Swiping
  // your own two ranges is the way to actually USE pooling on those songs: mark
  // the same 16 bars in two different choruses and they pool.
  const SPAN_TINT=["rgba(31,138,91,.16)","rgba(42,111,176,.16)"];
  const SPAN_EDGE=[T.green,T.blue];
  function attachSpanDrag(grid){
    let anchor=null;
    const barUnder=(x,y)=>{ const e=document.elementFromPoint(x,y); const c=e&&e.closest?e.closest("[data-bar]"):null; return c?+c.dataset.bar:null; };
    grid.style.touchAction="none";
    grid.addEventListener("pointerdown",e=>{
      if(S.spans.length>=2) return;
      const b=barUnder(e.clientX,e.clientY); if(b==null) return;
      anchor=b; S._drag={b0:b,b1:b}; paintSpans(); haptic(5);
      grid.setPointerCapture(e.pointerId);
    });
    grid.addEventListener("pointermove",e=>{
      if(anchor==null) return;
      const b=barUnder(e.clientX,e.clientY); if(b==null) return;
      const nb={b0:Math.min(anchor,b), b1:Math.max(anchor,b)};
      if(!S._drag || nb.b0!==S._drag.b0 || nb.b1!==S._drag.b1){ S._drag=nb; paintSpans(); haptic(3); }
    });
    const end=()=>{
      if(anchor==null) return;
      anchor=null;
      const d=S._drag; S._drag=null;
      if(d){ S.spans.push(d); }
      go("chart");
      if(S.spans.length===2) openMerge();
    };
    grid.addEventListener("pointerup",end);
    grid.addEventListener("pointercancel",end);
  }
  function spanBars(sp){ return sp.b1-sp.b0+1; }
  function spanTime(sp){ return [S.bars[sp.b0].t0, S.bars[sp.b1].t1]; }
  function paintSpans(){
    if(!S._cells) return;
    S._cells.forEach(c=>{
      let tint=null, edge=null, tag=null;
      S.spans.forEach((sp,k)=>{ if(c.bar>=sp.b0 && c.bar<=sp.b1){ tint=SPAN_TINT[k]; edge=SPAN_EDGE[k]; tag=(k?"B":"A"); } });
      if(S._drag && c.bar>=S._drag.b0 && c.bar<=S._drag.b1){ tint="rgba(138,43,43,.14)"; edge=T.accent; tag=null; }
      clear(c.sel);
      c.sel.style.display = tint?"block":"none";
      if(!tint) return;
      c.sel.style.background=tint;
      c.sel.style.boxShadow=`inset 0 0 0 1.5px ${edge}`;
      if(tag && c.bar===S.spans[tag==="A"?0:1].b0){
        c.sel.appendChild(el("span",`position:absolute;top:2px;right:3px;font:800 9px ${UI};color:#fff;background:${edge};border-radius:3px;padding:1px 4px;`,tag));
      }
    });
  }
  // setPlayhead now takes a BAR index (S.bars / S._cells are index-aligned) so
  // held/% bars, N.C. bars and the intro row highlight as the audio passes
  // through them. Two passes (clear-all then set-one) because the intro row's
  // bars share one DOM element — a single-pass on/off would let a later
  // non-current intro bar clear the row the current one just lit.
  function setPlayhead(bi, rep){
    S.playBar=bi;
    if(S._cells){
      S._cells.forEach(c=>{ c.el.style.background=""; c.ph.style.display="none"; });
      if(bi>=0) S._cells.forEach(c=>{ if(c.bar===bi){ c.el.style.background="rgba(138,43,43,.09)"; c.ph.style.display="block"; } });
    }
    if(S._barLabel) S._barLabel.textContent = bi>=0 ? ("bar "+(bi+1)+((rep!=null&&rep>0)?" · ×"+(rep+1):"")) : "—";
    if(bi>=0 && S.follow && S._cells){
      const cell=S._cells.find(c=>c.bar===bi);
      if(cell) cell.el.scrollIntoView({block:"center",behavior:"smooth"});
    }
  }

  // Pooling requires spans of EQUAL MUSICAL LENGTH — pool_beat_evidence lines
  // the two spans up beat-by-beat and rejects unequal beat counts outright. Two
  // sections of different bar counts therefore CANNOT be merged, and the server
  // degrades to an unconstrained decode rather than failing, so a UI that let
  // you tap them would report a merge that never happened. Grey them out
  // instead, and say why.
  function barsOf(s){ return s.barRanges.reduce((n,[a,b])=>n+(b-a+1),0) / s.reps; }
  // Where a section sits in the RENDERED bar grid. Rendered bar indices only
  // equal payload bar indices when nothing was folded, so locate by section id.
  function sectionSpan(s){
    let start=null, end=null;
    S.bars.forEach((b,i)=>{ if(b.secId===s.id){ if(start===null) start=i; end=i; } });
    return start===null?null:{b0:start,b1:end};
  }
  function buildRibbon(){
    const wrap=el("div","margin-top:16px;");
    const row=el("div","display:flex;align-items:center;gap:10px;flex-wrap:wrap;");
    row.appendChild(el("span",`font:600 9.5px ${UI};letter-spacing:.07em;text-transform:uppercase;color:${T.faint};`,"Form"));
    const chips=el("div","display:flex;gap:7px;flex-wrap:wrap;");
    S.sections.forEach(s=>{
      const chip=el("button",`display:flex;align-items:baseline;gap:1px;border:1.5px solid ${T.line};background:${T.card};color:${T.ink};border-radius:9px;padding:7px 12px;font:700 13px ${UI};cursor:pointer;`);
      chip.appendChild(el("span","",s.label)); if(s.tag) chip.appendChild(el("sup","font-size:9px;font-weight:700;opacity:.85;",s.tag));
      chip.appendChild(el("span",`font:600 9px ${UI};opacity:.65;margin-left:4px;`, (s.reps>1?"×"+s.reps+" ":"")+barsOf(s)+"b"));
      // tapping a chip is just a shortcut for swiping that whole section
      chip.onclick=()=>{
        if(!S.mergeMode){ S.mergeMode=true; }
        if(S.spans.length>=2) return;
        const sp=sectionSpan(s); if(!sp) return;
        S.spans.push(sp); go("chart");
        if(S.spans.length===2) openMerge();
      };
      chips.appendChild(chip);
    });
    row.appendChild(chips);
    wrap.appendChild(row);

    const tools=el("div","display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-top:12px;");
    const on=S.mergeMode;
    const tog=el("button",`display:flex;align-items:center;gap:6px;border:1.5px solid ${on?T.accent:T.line};background:${on?T.accent:T.card};color:${on?"#fff":T.ink};border-radius:9px;padding:8px 13px;font:600 12.5px ${UI};cursor:pointer;`, (on?"⋈ selecting…":"⋈ Pool two passes"));
    tog.onclick=()=>{ S.mergeMode=!S.mergeMode; S.spans=[]; S._drag=null; if(S.mergeMode){ S.suggMode=false; S.sectSuggMode=false; } go("chart"); };
    tools.appendChild(tog);
    tools.appendChild(suggestToggleBtn());
    tools.appendChild(sectionSuggestToggleBtn());
    if(S.mergeMode){
      const st=el("span",`font:italic 11.5px ${SERIF};color:${T.faint};`);
      if(!S.spans.length) st.textContent="swipe across the bars of one pass, then the same bars of another";
      else if(S.spans.length===1) st.textContent="A = "+spanBars(S.spans[0])+" bars — now swipe the matching pass";
      tools.appendChild(st);
      if(S.spans.length){
        const clr=el("button",`border:none;background:transparent;color:${T.accent};font:600 12px ${UI};cursor:pointer;padding:6px;`,"clear");
        clr.onclick=()=>{ S.spans=[]; go("chart"); };
        tools.appendChild(clr);
      }
    }
    if(S.suggMode){
      const st=el("span",`font:italic 11.5px ${SERIF};color:${T.faint};`);
      if(S.suggCandidates===null) st.textContent="loading suggestions…";
      else if(!S.suggCandidates.length) st.textContent="no algorithmic suggestions for this song yet";
      else st.textContent=S.suggCandidates.length+" suggested bar-pair"+(S.suggCandidates.length===1?"":"s")+" — tap a 💡 badge on the chart";
      tools.appendChild(st);
    }
    if(S.sectSuggMode){
      const st=el("span",`font:italic 11.5px ${SERIF};color:${T.faint};`);
      if(S.sectSuggCandidates===null) st.textContent="loading section suggestions…";
      else if(!S.sectSuggCandidates.length) st.textContent="no section-level suggestions for this song yet";
      else{
        const live=S.sectSuggCandidates.filter(c=>!S.sectSuggDismissed.has(sectKeyOf(c)));
        const shown=Math.min(SECT_SUGG_MAX_SHOWN, live.length);
        st.textContent=shown+" of "+live.length+" 8-bar suggestions shown (ranked, not thresholded) — "
          +"~45-55% precision, weaker than bar suggestions — tap a 🧩 badge, use your ear";
      }
      tools.appendChild(st);
    }
    wrap.appendChild(tools);
    return wrap;
  }

  // ═══════════════════════════════════════════════════════════════════════
  //  BAR-MERGE SUGGESTIONS (2026-07-18) — ported from the baked
  //  chart_interactive.py `_TEMPLATE`'s #suggest-mode-btn overlay (see
  //  docs/known_issues.md "REFRAME: on-chart bar-merge SUGGESTIONS overlay")
  //  into this SPA's own JS-driven renderer, ADDITIVE to the existing
  //  "⋈ Pool two passes" swipe-select tool above (S.mergeMode/S.spans —
  //  untouched, still free manual span selection). Suggestions are the
  //  algorithmic ones from scratchpad/bar_merge_candidates.py, surfaced as
  //  gold 💡 badges directly on the chart grid; tapping one opens a bottom
  //  sheet (this app's own overlay()/sheetBox() pattern, not the baked
  //  template's custom popover — kept visually consistent with every other
  //  modal in this SPA) with Confirm/Dismiss. Confirm reuses the SAME
  //  /api/reinfer/<file> preview-only re-decode path as "⋈ Pool two passes"
  //  (via runFlow — see the `ok` return value added there for this purpose),
  //  so results surface exactly like a manual pool: toast + before/after
  //  diff banner, nothing persisted to the served chart (matches the baked
  //  overlay's and "Re-infer with my fixes"'s documented behaviour).
  //  Mutually exclusive with mergeMode (both alter the grid overlay and use
  //  bottom sheets) — toggling one off the other, per the tog.onclick above
  //  and toggleSuggestions() below.
  // ═══════════════════════════════════════════════════════════════════════
  function suggestToggleBtn(){
    const on=S.suggMode;
    const btn=el("button",`display:flex;align-items:center;gap:6px;border:1.5px solid ${on?"#b8860b":T.line};background:${on?"#b8860b":T.card};color:${on?"#fff":T.ink};border-radius:9px;padding:8px 13px;font:600 12.5px ${UI};cursor:pointer;`,
      on?"💡 suggestions…":"💡 Bar suggestions");
    btn.onclick=toggleSuggestions;
    return btn;
  }
  function suggKeyOf(c){ return c.bars[0]+"-"+c.bars[1]; }
  async function toggleSuggestions(){
    S.suggMode=!S.suggMode;
    if(S.suggMode){ S.mergeMode=false; S.spans=[]; S._drag=null; S.sectSuggMode=false; }
    go("chart");
    if(!S.suggMode || !S.model || !S.model.file) return;
    if(S.suggCandidates===null){
      try{
        const data=await api.get("/api/bar-merge-candidates/"+S.model.file);
        S.suggCandidates=(data && data.candidates) || [];
      }catch(e){ S.suggCandidates=[]; }
      // Only repaint if the user is still in suggest mode on the same song —
      // a slow fetch shouldn't clobber a screen the user has since left.
      if(S.suggMode && S.screen==="chart") go("chart");
    }
  }
  // 2026-07-18, later same day — REDESIGNED per user feedback: no gold
  // circular badge/emoji. A tapped bar's whole "family" (its connected
  // component in the candidate-pair graph — a pairs with b, b pairs with c
  // => a/b/c are one family) should be identifiable and highlightable
  // together by COLOR, directly on the chord cells, not via a small
  // separate icon. suggFamilies() computes bar -> family-index from the
  // (non-dismissed) candidate pairs via union-find; every bar in a family
  // gets an outline in that family's color (always visible, so families are
  // identifiable at a glance without tapping); tapping ANY cell in a family
  // fills that whole family with a stronger tint (S.suggHighlightFamily)
  // and opens the confirm sheet for the specific pair that bar belongs to
  // (its first non-dismissed candidate).
  const SUGG_FAMILY_COLORS=["#2a78d6","#008300","#e34948","#4a3aa7","#eb6834","#1baf7a","#e87ba4","#c98500"];
  function suggFamilies(){
    const parent={};
    function find(x){ if(!(x in parent)) parent[x]=x; while(parent[x]!==x){ parent[x]=parent[parent[x]]; x=parent[x]; } return x; }
    function union(a,b){ const ra=find(a), rb=find(b); if(ra!==rb) parent[Math.max(ra,rb)]=Math.min(ra,rb); }
    (S.suggCandidates||[]).forEach(c=>{ if(!S.suggDismissed.has(suggKeyOf(c))) union(c.bars[0], c.bars[1]); });
    const famIdx={}, order=[];
    Object.keys(parent).forEach(k=>{ const r=find(+k); if(!(r in famIdx)){ famIdx[r]=order.length; order.push(r); } });
    const byBar={}, membersByFam=[];
    Object.keys(parent).forEach(k=>{
      const bar=+k, f=famIdx[find(bar)];
      byBar[bar]=f;
      (membersByFam[f]=membersByFam[f]||[]).push(bar);
    });
    return {byBar, membersByFam};
  }
  function firstCandForBar(bar){
    return (S.suggCandidates||[]).find(c=>!S.suggDismissed.has(suggKeyOf(c)) && c.bars.includes(bar));
  }
  // Renders directly onto S._cells (built fresh by buildIReal() on every
  // render — this runs at the end of that function, mirroring paintSpans()).
  function paintSuggestions(){
    if(!S._cells || !S.suggCandidates || !S.suggCandidates.length) return;
    const byBar={}; S._cells.forEach(c=>{ byBar[c.bar]=c; });
    const {byBar:famOfBar, membersByFam}=suggFamilies();
    Object.keys(famOfBar).forEach(k=>{
      const bar=+k, cell=byBar[bar]; if(!cell) return;
      const cand=firstCandForBar(bar);
      const confirmed=!!cand && S.suggConfirmed.has(suggKeyOf(cand));
      const color=confirmed?"#1d8a1d":SUGG_FAMILY_COLORS[famOfBar[bar]%SUGG_FAMILY_COLORS.length];
      const highlighted=S.suggHighlightFamily===famOfBar[bar];
      cell.el.style.outline=`2px solid ${color}`;
      cell.el.style.outlineOffset="-1px";
      cell.el.style.borderRadius="6px";
      cell.el.style.background=highlighted?color+"26":confirmed?color+"14":"";
      cell.el.style.transition="background .15s ease";
      if(!confirmed && cand){
        cell.el.style.cursor="pointer";
        cell.el.onclick=(e)=>{
          e.stopPropagation(); e.preventDefault();
          S.suggHighlightFamily=famOfBar[bar];
          go("chart");
          openSuggestionSheet(cand);
        };
      }
      cell.el.title=confirmed?"Merged":
        "Family of "+( (membersByFam[famOfBar[bar]]||[]).length )+
        " similar bar(s) — tap to review";
    });
  }
  function openSuggestionSheet(cand){
    const back=overlay(); const sheet=sheetBox(); sheet.appendChild(handle());
    sheet.appendChild(el("div",`text-align:center;font:700 15px ${UI};color:${T.ink};margin-bottom:4px;`,
      "Bar "+(cand.bars[0]+1)+" ↔ Bar "+(cand.bars[1]+1)));
    sheet.appendChild(el("div",`text-align:center;font:italic 12.5px ${SERIF};color:${T.faint};line-height:1.5;margin-bottom:16px;`,
      Math.round(cand.confidence*100)+"% chroma similarity — the algorithm thinks these bars are the same chord. Pool them for a sharper reading?"));
    // Close the sheet FIRST, then kick off the async flow — mirrors
    // openMerge()'s go2.onclick pattern below. runFlow() shows its own
    // spinner overlay with a progress clock, and (being appended straight to
    // `root`) go("chart") inside applyResp() would otherwise yank this sheet
    // out from under an in-progress close animation, since go() clears every
    // root child except the persistent transport bar.
    const yes=el("button",`width:100%;border:none;background:#b8860b;color:#fff;border-radius:12px;padding:14px;font:600 14px ${UI};cursor:pointer;`,"✓ Merge & re-infer");
    yes.onclick=()=>{ closeOverlay(back); confirmSuggestion(cand); };
    sheet.appendChild(yes);
    const no=el("button",`width:100%;margin-top:10px;border:none;background:transparent;color:${T.accent};font:600 13px ${UI};padding:8px;cursor:pointer;`,"✕ Different — dismiss");
    no.onclick=()=>{ S.suggDismissed.add(suggKeyOf(cand)); closeOverlay(back); go("chart"); };
    sheet.appendChild(no);
    const cancel=el("button",`width:100%;margin-top:4px;background:transparent;border:none;color:${T.faint};font:600 13px ${UI};padding:8px;cursor:pointer;`,"Cancel");
    cancel.onclick=()=>closeOverlay(back);
    sheet.appendChild(cancel);
    back.appendChild(sheet); root.appendChild(back);
  }
  // Reuses runFlow (the SAME preview-only /api/reinfer round-trip "⋈ Pool
  // two passes" already uses) rather than a parallel fetch — one code path
  // for "pool these two spans and show me the diff", whether the spans came
  // from a manual swipe or an algorithmic suggestion. runFlow already
  // handles the spinner, the ~20s-decode clock, error/rejection toasts, and
  // (via applyResp) the before/after propagation banner + go("chart").
  async function confirmSuggestion(cand){
    const ok=await runFlow({confirms:[], merges:[{spans:cand.spans}]},
      "Pooling suggested bars…",
      "bar "+(cand.bars[0]+1)+" ↔ bar "+(cand.bars[1]+1)+" — about 20 seconds", true);
    if(ok){ S.suggConfirmed.add(suggKeyOf(cand)); go("chart"); }
    return ok;
  }

  // ═══════════════════════════════════════════════════════════════════════
  //  SECTION-LEVEL (8-bar) SUGGESTIONS (2026-07-18, later same day) —
  //  section-scale analog of the BAR-MERGE SUGGESTIONS block just above,
  //  consuming scratchpad/section_merge_candidates_<slug>_grain8.json via
  //  /api/section-merge-candidates/<file> (see docs/known_issues.md
  //  "SECTION-level (8-bar) repeat-detection suggestion tool"). Deliberately
  //  a SEPARATE mode/data path, not a parametrised reuse of the bar tool
  //  above, for two reasons that matter to the user reading this code:
  //   1. Data shape differs: candidates carry 8-bar RANGES per side
  //      (`bars:[[b0,b1),[b0,b1)]`), not single bar indices, so the whole
  //      family/union-find highlighting scheme above doesn't apply as-is.
  //   2. Confidence differs A LOT and must not read as equally trustworthy:
  //      corpus-validated precision here is ~45-55% at usable recall
  //      (ROC-AUC 0.674 best case) vs the bar tool's ~84-92% (AUC 0.99) —
  //      see known_issues.md for the full numbers. Every UI surface below
  //      (toggle button, status line, sheet copy) says so explicitly rather
  //      than just inheriting the bar tool's "algorithm thinks" framing.
  //
  //  Rendering choice (an 8-bar span is 2 full rows of the 4-col grid, so
  //  tinting all 16 bars of every one of up to 60 candidates at once would
  //  be unreadable): each candidate gets ONE color (cycled from
  //  SECTION_SUGG_COLORS, not the bar tool's family palette, so the two
  //  tools never look confusable on screen); only the top SECT_SUGG_MAX_SHOWN
  //  (rank-ordered, i.e. highest real-audio confidence first — the file is
  //  pre-sorted) are painted, each as a FAINT dashed-outline tint over its
  //  own two 8-bar spans (so the matched extent is visible at a glance) plus
  //  a small tappable "🧩" corner badge on just the FIRST bar of each side
  //  (a full badge-per-bar would be as cluttered as a full tint). If two
  //  different candidates happen to start on the same bar, the higher-
  //  ranked one wins the badge/tint for that cell (first-write-wins below);
  //  the lower one is still reachable by scrolling the ranked list, not
  //  lost — just not simultaneously paintable on that cell.
  // ═══════════════════════════════════════════════════════════════════════
  const SECTION_SUGG_COLORS=["#0e7c86","#7c3aed","#c2410c","#0f766e","#a21caf","#65a30d","#be123c","#0369a1"];
  const SECT_SUGG_MAX_SHOWN=15;
  function sectionSuggestToggleBtn(){
    const on=S.sectSuggMode;
    const btn=el("button",`display:flex;align-items:center;gap:6px;border:1.5px solid ${on?"#6d28d9":T.line};background:${on?"#6d28d9":T.card};color:${on?"#fff":T.ink};border-radius:9px;padding:8px 13px;font:600 12.5px ${UI};cursor:pointer;`,
      on?"🧩 sections…":"🧩 Section suggestions");
    btn.onclick=toggleSectionSuggestions;
    return btn;
  }
  function sectKeyOf(c){ return c.blocks[0]+"-"+c.blocks[1]; }
  async function toggleSectionSuggestions(){
    S.sectSuggMode=!S.sectSuggMode;
    if(S.sectSuggMode){ S.mergeMode=false; S.suggMode=false; S.spans=[]; S._drag=null; }
    go("chart");
    if(!S.sectSuggMode || !S.model || !S.model.file) return;
    if(S.sectSuggCandidates===null){
      try{
        const data=await api.get("/api/section-merge-candidates/"+S.model.file);
        S.sectSuggCandidates=(data && data.candidates) || [];
        S.sectSuggMeta=(data && data.meta) || {};
      }catch(e){ S.sectSuggCandidates=[]; S.sectSuggMeta={}; }
      // Same slow-fetch guard as toggleSuggestions() above — don't clobber a
      // screen the user has since navigated away from.
      if(S.sectSuggMode && S.screen==="chart") go("chart");
    }
  }
  // Renders onto S._cells, same convention as paintSuggestions() — runs at
  // the end of buildIReal(), after paintSpans()/paintSuggestions().
  function paintSectionSuggestions(){
    if(!S._cells || !S.sectSuggCandidates || !S.sectSuggCandidates.length) return;
    const byBar={}; S._cells.forEach(c=>{ byBar[c.bar]=c; });
    const cands=S.sectSuggCandidates.filter(c=>!S.sectSuggDismissed.has(sectKeyOf(c))).slice(0,SECT_SUGG_MAX_SHOWN);
    const startBarOwner={};
    cands.forEach((c,ci)=>{
      const key=sectKeyOf(c);
      const confirmed=S.sectSuggConfirmed.has(key);
      const color=confirmed?"#1d8a1d":SECTION_SUGG_COLORS[ci%SECTION_SUGG_COLORS.length];
      c.bars.forEach(span=>{
        for(let b=span[0]; b<span[1]; b++){
          const cell=byBar[b]; if(!cell || cell.el.dataset.sectTinted) continue;
          cell.el.style.background=color+"12";
          cell.el.style.outline=`1px dashed ${color}`;
          cell.el.style.outlineOffset="-1px";
          cell.el.dataset.sectTinted="1";
        }
        const startBar=span[0];
        if(!(startBar in startBarOwner)) startBarOwner[startBar]={cand:c, color, confirmed};
      });
    });
    Object.keys(startBarOwner).forEach(k=>{
      const bar=+k, info=startBarOwner[k], cell=byBar[bar]; if(!cell) return;
      const badge=el("div",`position:absolute;right:2px;top:3px;font:700 10px ${UI};background:${info.color};color:#fff;border-radius:5px;padding:1px 4px;z-index:3;line-height:1.3;cursor:${info.confirmed?"default":"pointer"};`,
        info.confirmed?"✓":"🧩");
      cell.el.appendChild(badge);
      cell.el.title=info.confirmed?"Section merge confirmed":
        "Suggested 8-bar section repeat (~45-55% precision) — tap to review";
      if(!info.confirmed){
        badge.onclick=(e)=>{ e.stopPropagation(); e.preventDefault(); openSectionSuggestionSheet(info.cand); };
      }
    });
  }
  function openSectionSuggestionSheet(cand){
    const back=overlay(); const sheet=sheetBox(); sheet.appendChild(handle());
    const b0=cand.bars[0], b1=cand.bars[1];
    sheet.appendChild(el("div",`text-align:center;font:700 15px ${UI};color:${T.ink};margin-bottom:4px;`,
      "Bars "+(b0[0]+1)+"–"+b0[1]+" ↔ Bars "+(b1[0]+1)+"–"+b1[1]));
    // Deliberately softer framing than the bar tool's "the algorithm thinks
    // these bars are the same chord" — that phrasing would overstate this
    // tool's corpus-validated precision (~45-55% vs the bar tool's ~85-92%).
    sheet.appendChild(el("div",`text-align:center;font:italic 12.5px ${SERIF};color:${T.faint};line-height:1.5;margin-bottom:10px;`,
      Math.round(cand.confidence*100)+"% audio similarity over this 8-bar span. This is a much weaker "
      +"signal than the bar-level tool — worth a listen, not a strong bet. Are these really the same section?"));
    sheet.appendChild(el("div",`text-align:center;font:600 10.5px ${UI};color:${T.faint};margin-bottom:16px;`,
      "rank order, not a probability — use your ear before confirming"));
    const yes=el("button",`width:100%;border:none;background:#6d28d9;color:#fff;border-radius:12px;padding:14px;font:600 14px ${UI};cursor:pointer;`,"✓ Sounds the same — pool & re-infer");
    yes.onclick=()=>{ closeOverlay(back); confirmSectionSuggestion(cand); };
    sheet.appendChild(yes);
    const no=el("button",`width:100%;margin-top:10px;border:none;background:transparent;color:${T.accent};font:600 13px ${UI};padding:8px;cursor:pointer;`,"✕ Different — dismiss");
    no.onclick=()=>{ S.sectSuggDismissed.add(sectKeyOf(cand)); closeOverlay(back); go("chart"); };
    sheet.appendChild(no);
    const cancel=el("button",`width:100%;margin-top:4px;background:transparent;border:none;color:${T.faint};font:600 13px ${UI};padding:8px;cursor:pointer;`,"Cancel");
    cancel.onclick=()=>closeOverlay(back);
    sheet.appendChild(cancel);
    back.appendChild(sheet); root.appendChild(back);
  }
  async function confirmSectionSuggestion(cand){
    const b0=cand.bars[0], b1=cand.bars[1];
    const ok=await runFlow({confirms:[], merges:[{spans:cand.spans}]},
      "Pooling suggested section…",
      "bars "+(b0[0]+1)+"–"+b0[1]+" ↔ bars "+(b1[0]+1)+"–"+b1[1]+" — about 20 seconds", true);
    if(ok){ S.sectSuggConfirmed.add(sectKeyOf(cand)); go("chart"); }
    return ok;
  }

  // ── persistent transport — LOCAL audio, survives screen re-renders ───────
  function ensureTransport(){
    if(S._np) return;
    const np=el("div",`position:absolute;left:0;right:0;bottom:0;z-index:30;background:${T.card};border-top:1px solid ${T.line};box-shadow:0 -8px 24px -16px rgba(50,35,20,.4);padding-bottom:env(safe-area-inset-bottom);`);
    const row=el("div","display:flex;align-items:center;gap:13px;padding:11px 18px 14px;max-width:720px;margin:0 auto;");
    const play=el("button",`flex:0 0 auto;width:44px;height:44px;border-radius:50%;border:none;background:${T.accent};color:#fff;font:600 16px ${UI};cursor:pointer;display:flex;align-items:center;justify-content:center;`,"▶");
    play.onclick=togglePlay; S._playBtn=play; row.appendChild(play);
    const mid=el("div","flex:1;min-width:0;");
    const meta=el("div","display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:5px;");
    const src=el("div","display:flex;align-items:center;gap:6px;min-width:0;");
    const followBtn=el("button",`flex:0 0 auto;font:600 9px ${UI};letter-spacing:.04em;border-radius:4px;padding:3px 6px;cursor:pointer;border:1px solid ${T.line};background:${T.paper};color:${T.faint};`,"FOLLOW");
    followBtn.onclick=()=>{ S.follow=!S.follow; paintFollow(); };
    S._followBtn=followBtn; src.appendChild(followBtn);
    const srcName=el("div",`font:600 12px ${UI};color:${T.ink};overflow:hidden;text-overflow:ellipsis;white-space:nowrap;`,""); S._srcName=srcName; src.appendChild(srcName);
    meta.appendChild(src);
    const timeL=el("div",`flex:0 0 auto;font:600 11px ${UI};color:${T.faint};`,"0:00 / 0:00"); S._timeLabel=timeL; meta.appendChild(timeL);
    mid.appendChild(meta);
    const track=el("div",`height:8px;border-radius:4px;background:${T.line};position:relative;cursor:pointer;touch-action:none;`);
    const fill=el("div",`position:absolute;left:0;top:0;bottom:0;width:0%;background:${T.accent};border-radius:4px;`);
    const knob=el("div",`position:absolute;top:50%;width:14px;height:14px;border-radius:50%;background:${T.accent};transform:translate(-50%,-50%);left:0%;box-shadow:0 1px 4px rgba(0,0,0,.3);`);
    track.appendChild(fill); track.appendChild(knob); S._scrubFill=fill; S._scrubKnob=knob;
    const seekAt=(clientX)=>{ const r=track.getBoundingClientRect(); seekFrac((clientX-r.left)/r.width); };
    track.onclick=e=>seekAt(e.clientX);
    track.addEventListener("touchstart",e=>{ seekAt(e.touches[0].clientX); },{passive:true});
    track.addEventListener("touchmove",e=>{ seekAt(e.touches[0].clientX); },{passive:true});
    mid.appendChild(track); row.appendChild(mid);
    const barL=el("div",`flex:0 0 auto;font:600 12px ${UI};color:${T.faint};min-width:52px;text-align:right;`,"—"); S._barLabel=barL; row.appendChild(barL);
    np.appendChild(row);
    root.appendChild(np); S._np=np;
    paintFollow();
  }
  function paintFollow(){
    const b=S._followBtn; if(!b) return;
    b.style.background=S.follow?T.accent:T.paper; b.style.color=S.follow?"#fff":T.faint;
    b.style.borderColor=S.follow?T.accent:T.line;
  }
  function syncTransport(screen){
    ensureTransport();
    const show = screen==="chart" && !!S.audioUrl;
    S._np.style.display = show ? "block" : "none";
    if(!show) return;
    if(S._srcName) S._srcName.textContent=(S.model?S.model.title:"")+" — audio";
    if(!S.audio || S._audioSrc!==S.audioUrl){
      if(S.audio){ S.audio.pause(); }
      // preload MUST be set before .src (2026-07-20 iPhone diagnostic):
      // "metadata" told iOS Safari to fetch just enough for duration and go
      // idle — confirmed on-device it then never resumes loading on its own
      // when play() is called (play->waiting fires, networkState stays IDLE
      // forever, readyState stuck at HAVE_METADATA). "auto" makes it start
      // eagerly buffering the moment the element exists, so by the time the
      // user taps play there's real data to play instead of nothing.
      S.audio=new Audio(); S.audio.preload="auto";
      // iOS inline playback + let the element own the audio session
      S.audio.playsInline=true; try{ S.audio.setAttribute("playsinline",""); S.audio.setAttribute("webkit-playsinline",""); }catch(e){}
      S.audio.src=S.audioUrl; S._audioSrc=S.audioUrl;
      S.audio.addEventListener("loadedmetadata",()=>{ if(S._timeLabel) S._timeLabel.textContent="0:00 / "+fmt(S.audio.duration); });

  // change for them.
  async function runFlow(req, title, sub, isMerge){
    if(S.reinfering) return false; S.reinfering=true;
    const ov=el("div",`position:absolute;inset:0;z-index:60;background:rgba(247,243,233,.92);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;animation:ap-fade .2s both;`);
    ov.appendChild(el("div",`width:36px;height:36px;border:3px solid ${T.line};border-top-color:${T.accent};border-radius:50%;animation:ap-spin .8s linear infinite;`));
    ov.appendChild(el("div",`font:600 15px ${UI};color:${T.ink};`,title));
    ov.appendChild(el("div",`font:italic 12px ${SERIF};color:${T.faint};text-align:center;padding:0 30px;line-height:1.5;`,sub));
    // A re-infer is TWO full decodes of the whole track (constrained, and the
    // unconstrained baseline it diffs against) — ~20s for a 7-minute song, not
    // the ~2s the design mock implied. Show the clock rather than pretend.
    const clock=el("div",`font:600 12px ${UI};color:${T.faint};`,"0s");
    ov.appendChild(clock);
    const t0=Date.now();
    const tick=setInterval(()=>{ clock.textContent=Math.round((Date.now()-t0)/1000)+"s"; },500);
    root.appendChild(ov);
    let resp=null, err=null;
    try{ resp=await api.post("/api/reinfer/"+S.model.file, req); }
    catch(e){ err=String(e); }
    clearInterval(tick);
    ov.remove(); S.reinfering=false;
    if(err||!resp||resp.error){ toast(resp&&resp.error?resp.error:"Re-infer failed"); return false; }
    // The pipeline can decline a constraint and still return a decode. Never
    // report a merge/fix that the decoder actually threw away.
    if(resp.rejected && resp.rejected.length){
      S.spans=[]; go("chart");
      toast(isMerge?"The decoder refused that pool — the two passes aren’t the same musical length":"That correction couldn’t be applied");
      return false;
    }
    applyResp(resp,isMerge);
    return true;
  }
  // The response's diff is applied by TIME OVERLAP, not by index: the decoder
  // re-segments, so its chord i is not our chord i. Confirmed chords are never
  // overwritten — that is what "hard clamp" means.
  function applyResp(resp,isMerge){
    const diff=(resp&&resp.diff)||[]; const changed=[];
    diff.forEach(d=>{
      const nl=parseLabel(d.new_label);
      S.chords.forEach((ch,j)=>{
        if(ch.confirmed) return;
        const hit=ch.spans.some(sp=>overlaps(sp[0],sp[1],d.start_s,d.end_s));
        if(!hit) return;
        if(ch.root===nl.root && ch.q===nl.q) return;
        ch.root=nl.root; ch.q=nl.q;
        if(d.new_confidence!=null) ch.c=d.new_confidence;
        changed.push({j,d});
      });
    });
    S.pending=[]; S.spans=[]; S.mergeMode=false;
    saveAnnotations();
    go("chart");
    if(!changed.length){ toast(isMerge?"Merged — the reading didn't change":"Locked in — nothing else moved"); return; }
    showPropagation(changed.slice(0,6), changed.length, isMerge);
  }
  function showPropagation(changed,total,isMerge){
    const banner=el("div",`position:absolute;left:14px;right:14px;bottom:calc(20px + env(safe-area-inset-bottom));z-index:55;background:${T.card};border:1.5px solid ${T.green};border-radius:16px;padding:15px 17px;box-shadow:0 18px 44px -18px rgba(31,138,91,.55);animation:ap-in .35s both;max-width:520px;margin:0 auto;`);
    const top=el("div","display:flex;align-items:center;gap:10px;margin-bottom:10px;");
    top.innerHTML='<span style="width:26px;height:26px;border-radius:50%;background:'+T.green+';color:#fff;display:flex;align-items:center;justify-content:center;font:700 14px '+UI+';flex:0 0 auto;">✓</span>';
    top.appendChild(el("div",`font:700 14px ${UI};color:${T.ink};`, isMerge?("Merged — one shared reading ("+total+" chord"+(total>1?"s":"")+" moved)"):("Your fix sharpened "+total+" nearby chord"+(total>1?"s":""))));
    banner.appendChild(top);
    changed.forEach(ch=>{ const d=ch.d; const o=parseLabel(d.old_label), nw=parseLabel(d.new_label);
      const row=el("div","display:flex;align-items:center;gap:9px;padding:5px 0;");
      const from=glyph(o.root,o.q,17,"exact",confColor(d.old_confidence!=null?d.old_confidence:.3)); from.style.opacity=".7";
      row.appendChild(from);
      row.appendChild(el("span",`color:${T.faint};font:600 13px ${UI};`,"→"));
      row.appendChild(glyph(nw.root,nw.q,19,"exact",T.ink));
      row.appendChild(el("span",`margin-left:auto;font:600 11px ${UI};color:${T.green};`, Math.round((d.old_confidence||0)*100)+"% → "+Math.round((d.new_confidence||0)*100)+"%"));
      banner.appendChild(row); });
    const done=el("button",`width:100%;margin-top:10px;border:none;background:${T.deep};color:#fff;border-radius:10px;padding:11px;font:600 13px ${UI};cursor:pointer;`,"Nice — keep going");
    done.onclick=()=>banner.remove(); banner.appendChild(done);
    root.appendChild(banner);
  }

  // ── persistence (annotation sidecar; keyed on (bar,beat) per its schema) ──
  async function saveAnnotations(){
    if(!S.model) return;
    const chords=S.chords.filter(c=>c.confirmed).map(c=>({bar:c.bar, beat:c.beat, root:c.root, bass:-1, q:c.q}));
    const merges=S.model.merges||[];
    try{ await api.post("/api/annotations/"+S.model.file, {annotator:"", chords, merges}); }catch(e){}
  }

  // ── overlay + toast ─────────────────────────────────────────────────────
  function overlay(){ const b=el("div",`position:absolute;inset:0;z-index:50;background:rgba(28,24,20,.32);display:flex;align-items:flex-end;justify-content:center;animation:ap-fade .2s both;`); b.onclick=e=>{ if(e.target===b) closeOverlay(b); }; return b; }
  function sheetBox(){ return el("div",`width:100%;max-width:520px;background:${T.card};border-top-left-radius:22px;border-top-right-radius:22px;padding:16px 20px calc(24px + env(safe-area-inset-bottom));box-shadow:0 -14px 36px -16px rgba(50,35,20,.5);animation:ap-sheet .3s cubic-bezier(.32,.9,.35,1);max-height:88%;overflow-y:auto;`); }
  // A sheet whose ACTION never scrolls away: header + tabs pinned at the top,
  // the pane scrolls, Lock/Cancel pinned at the bottom. The compass is ~290px
  // tall and pushed the Lock button off a 844px screen entirely.
  function sheetCol(){ const s=sheetBox(); s.style.display="flex"; s.style.flexDirection="column"; s.style.overflow="hidden"; s.style.maxHeight="92%"; return s; }
  function handle(){ return el("div",`width:38px;height:4px;border-radius:2px;background:${T.rule};margin:0 auto 14px;`); }
  function closeOverlay(b){ b.style.animation="ap-fade .18s reverse both"; setTimeout(()=>b.remove(),160); }
  function toast(msg){ const t=el("div",`position:absolute;left:50%;bottom:calc(100px + env(safe-area-inset-bottom));transform:translateX(-50%);z-index:70;background:${T.deep};color:#fff;font:600 12.5px ${UI};padding:10px 16px;border-radius:22px;box-shadow:0 10px 26px -10px rgba(0,0,0,.5);animation:ap-in .25s both;max-width:80%;text-align:center;`,msg); root.appendChild(t); setTimeout(()=>{ t.style.opacity="0"; t.style.transition="opacity .3s"; setTimeout(()=>t.remove(),300); },1800); }

  return API;
})();
window.APP.build(document.getElementById("app"));
</script>
</body>
