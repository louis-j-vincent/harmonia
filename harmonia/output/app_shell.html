<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Harmonia</title>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; height: 100%; background: #e7e0d0; overscroll-behavior-y: none; }
  body { -webkit-overflow-scrolling: touch; }
  a { color: #8a2b2b; }
  @keyframes ap-in { from { opacity:0; transform:translateY(10px);} to { opacity:1; transform:translateY(0);} }
  @keyframes ap-fade { from { opacity:0;} to { opacity:1;} }
  @keyframes ap-spin { to { transform: rotate(360deg); } }
  @keyframes ap-sheet { from { transform:translateY(100%);} to { transform:translateY(0);} }
  @keyframes ap-pulse { 0%,100%{transform:scale(1);opacity:1;} 50%{transform:scale(1.06);opacity:.85;} }
  @keyframes ap-orb { from { opacity:0; transform:scale(.4);} to { opacity:1; transform:scale(1);} }
  .ap-scroll::-webkit-scrollbar{width:7px;height:7px;} .ap-scroll::-webkit-scrollbar-thumb{background:#cdc4ad;border-radius:4px;}
  /* the cylinder's columns scroll but must show no bar (iOS picker look) */
  .ap-nobar::-webkit-scrollbar{display:none;width:0;height:0;}
  #app { height: 100dvh; }
</style>
</head>
<body>
<div id="app"></div>
<script>
/* Harmonia app shell — the design-handoff engine (window.APP), wired to the
   live server. Demo data and the mock re-infer are gone: every screen reads
   real endpoints (/api/library, /api/chart-model, /api/yt-search, /api/analyze,
   /api/reinfer, /api/annotations). The one clean shape the UI consumes is the
   ChartModel from harmonia/output/chart_model.py — see that module's docstring.

   Deliberate deviation from the handoff: playback is the LOCAL cached audio
   (/audio/<slug>.m4a), not a YouTube iframe. The server already keeps the
   audio it downloaded for inference, and local playback is what the shipped
   chart uses — it sidesteps the iframe's origin/playsinline/embedding-disabled
   failures on iOS (see harmonia_server.py's _yt_audio_meta rationale). */
window.APP = (function(){
  "use strict";
  const UI="-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif";
  const SERIF="Georgia,'Times New Roman',serif";
  const T={ bg:"#e7e0d0", paper:"#f7f3e9", card:"#fffdf6", ink:"#1c1c1c", rule:"#b9b09a", faint:"#8a8371", accent:"#8a2b2b", line:"#e5dcc6", deep:"#2a2622", green:"#1f8a5b", amber:"#c58a2e", blue:"#2a6fb0" };
  const FLAT=["C","D♭","D","E♭","E","F","G♭","G","A♭","A","B♭","B"];
  const SHARP=["C","C♯","D","D♯","E","F","F♯","G","G♯","A","A♯","B"];
  // Key-aware enharmonic spelling (2026-07-19, user report: "G♭m7" shown in E
  // major — must be F♯m7). Same rule as chart_interactive.preferFlats: flat
  // majors are C D♭ E♭ F G♭ A♭ B♭; sharp majors G D A E B. Minor keys follow
  // their relative major. NOTES is set on model load; flats until then (the
  // library list shows key tonics, which are conventionally flat-spelled).
  const FLAT_MAJ=new Set([0,1,3,5,6,8,10]);
  const mod=(n,m)=>((n%m)+m)%m;
  let NOTES=FLAT;
  function setSpelling(tonic,mode){ const maj=(mode==="minor")?mod(tonic+3,12):mod(tonic,12); NOTES=FLAT_MAJ.has(maj)?FLAT:SHARP; }
  const note=pc=>NOTES[mod(pc,12)];
  const el=(t,c,x)=>{const e=document.createElement(t); if(c)e.style.cssText=c; if(x!=null)e.textContent=x; return e;};
  const clear=n=>{ while(n.firstChild) n.removeChild(n.firstChild); };

  // iReal quality tails as parse_token emits them. Half-diminished arrives as
  // "h7" (iReal's own spelling), not "-7b5" — it must typeset as ø7 and behave
  // as half-dim everywhere, or it renders as a literal "h7" and gets classed
  // as a dominant.
  const TOK={"":"","6":"6","^7":"maj7","^":"maj7","7":"7","-":"m","-7":"m7","-^7":"mMaj7","-6":"m6",
             "o":"dim","o7":"dim7","-7b5":"m7♭5","h7":"ø7","h":"ø","9":"9","-9":"m9","^9":"maj9",
             "13":"13","7b9":"7♭9","7#9":"7♯9","7b5":"7♭5","7#11":"7♯11","sus":"sus","7sus":"7sus",
             "sus4":"sus4","7sus4":"7sus4","+":"+","+7":"+7","69":"6/9"};
  const isHalfDim=q=>q.indexOf("-7b5")===0||q.indexOf("h")===0;
  const isDim=q=>q.indexOf("o")===0||q.indexOf("dim")===0;
  function seventhOf(q){ if(q==="6"||q.indexOf("^")===0)return "^7"; if(isHalfDim(q))return "h7"; if(isDim(q))return (q==="o7"?"o7":"o"); if(q.indexOf("-")===0)return "-7"; if(q==="")return ""; return "7"; }
  function famSuffix(q){ if(isHalfDim(q)||isDim(q))return "°"; if(q.indexOf("-")===0)return "m"; if(q.indexOf("+")===0)return "+"; return ""; }
  function confColor(c){ if(c>=.82)return T.ink; if(c>=.66)return "#5c4a30"; if(c>=.5)return "#9a6a1e"; if(c>=.38)return "#bd6a22"; return "#a8281f"; }
  function depthOf(c){ return c>=.66?"exact":(c>=.42?"seventh":"family"); }
  function glyph(root,q,size,depth,color){
    const w=el("span",`font-family:${SERIF};font-style:italic;line-height:1;white-space:nowrap;color:${color};display:inline-flex;align-items:baseline;`);
    w.appendChild(el("span",`font-size:${size}px;font-weight:600;`,note(root)));
    let suf; if(depth==="family") suf=famSuffix(q); else if(depth==="seventh") suf=TOK[seventhOf(q)]||""; else suf=(TOK[q]!=null?TOK[q]:q);
    if(suf) w.appendChild(el("sup",`font-size:${Math.round(size*0.44)}px;font-weight:600;`,suf));
    return w;
  }
  const fifthsIndex=pc=>mod(pc*7,12);
  const keyHue=pc=>fifthsIndex(pc)/12*360;
  const keyFill=pc=>`hsl(${keyHue(pc)} 42% 62%)`;
  function fnColor(root,keyTonic){ const d=mod(root-keyTonic,12);
    if(d===0||d===9) return T.green;         // I / vi  (home)
    if(d===5||d===2) return T.blue;          // IV / ii (setting up)
    if(d===7||d===11) return T.accent;       // V / vii (pulling)
    return "#8a7d5a"; }
  const rootHue=pc=>Math.round(fifthsIndex(pc)/12*360);
  function petalFill(pc,conf){ return `hsl(${rootHue(pc)} ${Math.round(46+conf*26)}% ${Math.round(84-conf*34)}%)`; }
  function petalEdge(pc,conf){ return `hsl(${rootHue(pc)} ${Math.round(50+conf*26)}% ${Math.round(60-conf*22)}%)`; }
  function keyTint(pc){ return `hsl(${rootHue(pc)} 52% 90%)`; }
  const SVGNS="http://www.w3.org/2000/svg";
  function sv(t,a){ const e=document.createElementNS(SVGNS,t); for(const k in a) e.setAttribute(k,a[k]); return e; }

  function qClass(q){ if(q===""||q.startsWith("^")||q.startsWith("6")) return "maj"; if(isHalfDim(q)) return "m7b5"; if(isDim(q)) return "dim"; if(q.startsWith("-")) return "min"; if(q.startsWith("sus")) return (q.indexOf("7")>=0)?"dom":"sus"; if(q.startsWith("+")) return q.indexOf("7")>=0?"dom":"aug"; return "dom"; }
  const ROMAN=["I","♭II","II","♭III","III","IV","♭V","V","♭VI","VI","♭VII","VII"];
  function romanFor(deg,cls){ let n=ROMAN[deg]; if(cls==="min"||cls==="m7b5"||cls==="dim") n=n.toLowerCase(); if(cls==="m7b5") n+="ø"; else if(cls==="dim") n+="°"; else if(cls==="dom") n+="⁷"; return n; }
  function roleOf(home,root,q,next){ const cls=qClass(q); const deg=mod(root-home,12); const num=romanFor(deg,cls); const nRoot=next?next.root:null, nCls=next?qClass(next.q):null; const resolvesTo=t=>nRoot!==null&&nRoot===t; let text;
    if(cls==="dom"){ const target=mod(root+5,12), tdeg=mod(target-home,12); if(deg===1) text="Tritone sub of V⁷ — slides down a half-step to I"; else if(deg===7) text="V⁷ — the dominant, pulls home to I"+(resolvesTo(target)?" (resolves)":""); else if(target===home) text="V⁷ — dominant, resolves home"; else text="V⁷ of "+ROMAN[tdeg]+" — secondary dominant"+(resolvesTo(target)?" (resolves down a 5th)":""); }
    else if(cls==="min"||cls==="m7b5"){ const v=mod(root+5,12); if(nCls==="dom"&&resolvesTo(v)) text=(cls==="m7b5"?"iiø":"ii")+" — sets up the V into "+note(mod(v+5,12)); else if(deg===2) text=(cls==="m7b5"?"iiø":"ii")+" — pre-dominant, leads to the V"; else if(deg===9) text="vi — the relative minor"; else if(deg===5) text="iv — borrowed minor subdominant, strong pull"; else if(deg===0) text="i — the tonic (minor)"; else text=num+" — minor colour"; }
    else if(cls==="maj"){ if(deg===0) text="I — home, the tonic"; else if(deg===5) text="IV — subdominant"; else if(deg===7) text="V — dominant degree"; else if(deg===9) text="VI — submediant"; else if(deg===2) text="II — supertonic"; else if(deg===10) text="♭VII — borrowed from Mixolydian"; else if(deg===8) text="♭VI — modal-interchange borrow"; else if(deg===3) text="♭III — modal-interchange borrow"; else text=num+" — chromatic colour"; }
    else if(cls==="dim"){ text="° — passing / leading-tone diminished"; }
    else if(cls==="sus"){ text="sus — suspended, the 3rd held open"; }
    else { text="augmented — raised 5th, unstable"; }
    return { num, text }; }

  const CE_IV={ "":[0,4,7],"6":[0,4,7,9],"^7":[0,4,7,11],"^":[0,4,7,11],"7":[0,4,7,10],"-":[0,3,7],"-7":[0,3,7,10],"-^7":[0,3,7,11],"-6":[0,3,7,9],
                "-7b5":[0,3,6,10],"h7":[0,3,6,10],"h":[0,3,6,10],"o":[0,3,6],"o7":[0,3,6,9],
                "+":[0,4,8],"+7":[0,4,8,10],"sus":[0,5,7],"sus4":[0,5,7],"7sus":[0,5,7,10],"7sus4":[0,5,7,10],"sus2":[0,2,7],
                "9":[0,4,7,10,14],"-9":[0,3,7,10,14],"^9":[0,4,7,11,14],"13":[0,4,7,10,14],"7b9":[0,4,7,10,13],"69":[0,4,7,9,14] };
  let actx=null;
  function play(root,q){ try{ if(!actx) actx=new (window.AudioContext||window.webkitAudioContext)(); if(actx.state==="suspended") actx.resume(); const ivs=CE_IV[q]||CE_IV[""]; const base=233.08*Math.pow(2,root/12); ivs.forEach((iv,i)=>{ const f=base*Math.pow(2,iv/12), t0=actx.currentTime+i*0.075; const o=actx.createOscillator(), o2=actx.createOscillator(), g=actx.createGain(); o.type="triangle"; o2.type="sine"; o.frequency.value=f; o2.frequency.value=f*2; g.gain.setValueAtTime(0,t0); g.gain.linearRampToValueAtTime(0.16,t0+0.012); g.gain.exponentialRampToValueAtTime(0.0001,t0+0.55); o.connect(g); o2.connect(g); g.connect(actx.destination); o.start(t0); o2.start(t0); o.stop(t0+0.6); o2.stop(t0+0.6); }); }catch(e){} }
  function haptic(ms){ try{ if(navigator.vibrate) navigator.vibrate(ms||6); }catch(e){} }

  // ── Harte parsing — the /api/reinfer response is the ONE place labels are
  // Harte ("G:hdim7"), because that is the model's native tongue.
  const NOTE_PC={C:0,"C#":1,Db:1,D:2,"D#":3,Eb:3,E:4,F:5,"F#":6,Gb:6,G:7,"G#":8,Ab:8,A:9,"A#":10,Bb:10,B:11};
  const HARTE_Q={maj:"",maj7:"^7",min:"-",min7:"-7","7":"7",hdim7:"-7b5",dim:"o",dim7:"o7","6":"6",min6:"-6",maj6:"6","9":"9","min9":"-7"};
  function parseLabel(l){ if(!l) return {root:0,q:""}; const p=String(l).split(":"); return { root: NOTE_PC[p[0]]!=null?NOTE_PC[p[0]]:0, q: HARTE_Q[p[1]]!=null?HARTE_Q[p[1]]:(p[1]||"") }; }
  function overlaps(a0,a1,b0,b1){ return Math.min(a1,b1)-Math.max(a0,b0) > 1e-6; }

  // ── Training-mode ground truth (McGill Billboard hand annotations) ──────
  // Only present on model.gt for songs from the training corpus (see
  // scripts/harmonia_server.py:_gt_chords_for_video) — pasted YouTube links
  // have no model.gt and render nothing here. Labels arrive in raw Harte
  // notation ("C:min7", "N"); parseLabel() is the same parser the reinfer
  // diff view uses, so GT typesets with the exact glyph vocabulary (TOK) the
  // inferred chords already use.
  function gtForSpan(t0,t1){
    if(!S.model || !S.model.gt || !S.model.gt.length) return null;
    const hits=S.model.gt.filter(g=>overlaps(t0,t1,g.t0,g.t1));
    if(!hits.length) return null;
    // dominant overlap first — boundary mismatches are expected (independent
    // beat grids), so just show the GT chord that covers most of this span.
    hits.sort((a,b)=>(Math.min(t1,b.t1)-Math.max(t0,b.t0))-(Math.min(t1,a.t1)-Math.max(t0,a.t0)));
    const main=hits[0];
    // "N" = no chord (silence/intro); "X" = McGill Billboard's own "can't
    // tell" marker — neither is a real root+quality, so both render as N.C.
    // rather than mis-parsing as a bogus C major (parseLabel would otherwise
    // silently default an unrecognised note letter to root 0).
    if(main.label==="N"||main.label==="X"){
      return {parsed:null, text:"N.C.", extra:hits.length>1};
    }
    const parsed=parseLabel(main.label);
    const text=note(parsed.root)+(TOK[parsed.q]!=null?TOK[parsed.q]:parsed.q);
    return {parsed, text, extra:hits.length>1};
  }
  // A GT hit "matches" the inferred chord at the family level (root + maj/
  // min/dom/dim/m7b5 class) — partial credit, not exact-voicing equality;
  // per project convention a maj7 vs maj GT disagreement isn't worth flagging.
  function gtMatches(gt,ch){
    if(!gt || !gt.parsed) return false;
    return gt.parsed.root===ch.root && qClass(gt.parsed.q)===qClass(ch.q);
  }
  function fmt(s){ s=Math.max(0,Math.floor(s||0)); return Math.floor(s/60)+":"+String(s%60).padStart(2,"0"); }

  const api={
    async get(u){ const r=await fetch(u,{headers:{"Accept":"application/json"}}); if(!r.ok) throw new Error(await r.text()); return r.json(); },
    async post(u,b){ const r=await fetch(u,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(b)}); if(!r.ok) throw new Error(await r.text()); return r.json(); },
  };

  // ══════════════════════════════════════════════════════════════
  const API={};
  let root, S;

  API.build=function(host){
    root=host;
    root.style.cssText="position:relative;height:100%;background:"+T.bg+";overflow:hidden;font-family:"+UI+";color:"+T.ink+";";
    S={ screen:null, mode:"read", colorMode:"function", model:null, chords:[], sections:[],
        key:0, pending:[], spans:[], mergeMode:false, playing:false, playBar:-1, reinfering:false,
        library:[], results:[], searching:false, job:null, audio:null, rafId:null, _cells:[],
        billboard:[], billboardLoading:false, billboardLoaded:false,
        // 2026-07-18: bar-merge SUGGESTIONS overlay (ported from the baked
        // chart_interactive.py template's #suggest-mode-btn — see loadModel()
        // and paintSuggestions() below for the full port notes).
        // suggHighlightFamily: 2026-07-18 later same day, user request — a
        // tapped bar's whole "family" (its connected component in the
        // candidate-pair graph: a pairs with b, b pairs with c => a/b/c are
        // one family) highlights together so all mutually-similar bars are
        // visible at a glance, not just the one pair the badge names.
        suggMode:false, suggCandidates:null, suggDismissed:new Set(), suggConfirmed:new Set(),
        suggHighlightFamily:null,
        // 2026-07-18, later same day: SECTION-level (8-bar) suggestions —
        // see paintSectionSuggestions() below for the full rationale. Kept
        // as separate state from the bar-level suggMode fields above (not
        // reused) since the two tools have different data shapes (block
        // pairs of 8-bar RANGES vs single bar indices) and different
        // confidence semantics that must never be conflated.
        sectSuggMode:false, sectSuggCandidates:null, sectSuggMeta:{},
        sectSuggDismissed:new Set(), sectSuggConfirmed:new Set() };
    // 2026-07-18: deep-link support — /chart/<file> (serve_chart) now
    // redirects here as /?open=<file> for any chart that doesn't carry a
    // baked-HTML-only feature (see harmonia_server.py's serve_chart), so a
    // bookmark/link/swipe-nav landing on an old-style chart URL opens
    // straight into this SPA's own chart view instead of stopping on the
    // plain server-rendered library list. Falls back to the library on any
    // failure (openChart's own catch already does this).
    const openFile = new URLSearchParams(location.search).get("open");
    if(openFile){ openChart(openFile); } else { go("library"); }
    loadLibrary();
  };

  function screenWrap(){ return el("div","position:absolute;inset:0;display:flex;flex-direction:column;animation:ap-fade .28s ease both;"); }
  function go(screen){
    if(S.screen==="chart" && screen!=="chart") stopPlayback();
    S.screen=screen;
    [...root.children].forEach(c=>{ if(c!==S._np) root.removeChild(c); });
    let elS;
    if(screen==="library") elS=renderLibrary();
    else if(screen==="billboard") elS=renderBillboard();
    else if(screen==="analysing") elS=renderAnalysing();
    else elS=renderChart();
    S._screenEl=elS; root.appendChild(elS);
    syncTransport(screen);
  }

  function appBar(title, sub, backTo){
    const bar=el("div",`flex:0 0 auto;display:flex;align-items:center;gap:12px;padding:calc(14px + env(safe-area-inset-top)) 18px 14px;border-bottom:1px solid ${T.line};background:${T.paper};`);
    if(backTo){
      const b=el("button",`flex:0 0 auto;width:34px;height:34px;border-radius:50%;border:1px solid ${T.line};background:${T.card};color:${T.ink};font:600 17px ${UI};cursor:pointer;display:flex;align-items:center;justify-content:center;`,"‹");
      b.onclick=()=>go(backTo); bar.appendChild(b);
    }
    const tw=el("div","flex:1;min-width:0;");
    const wm=el("div",`font:italic 600 17px ${SERIF};color:${T.ink};overflow:hidden;text-overflow:ellipsis;white-space:nowrap;`);
    if(title) wm.textContent=title; else wm.innerHTML='harmon<span style="color:'+T.accent+'">ia</span>';
    tw.appendChild(wm);
    if(sub) tw.appendChild(el("div",`font:500 12px ${UI};color:${T.faint};margin-top:1px;`,sub));
    bar.appendChild(tw);
    return bar;
  }

  // ── 1. LIBRARY / SEARCH ─────────────────────────────────────────────────
  async function loadLibrary(){
    try{ const r=await api.get("/api/library"); S.library=r.charts||[]; if(S.screen==="library") go("library"); }
    catch(e){ S.library=[]; }
  }
  function renderLibrary(){
    NOTES=FLAT;   // library rows show key tonics — conventionally flat-spelled
    const w=screenWrap();
    w.appendChild(appBar(null,"Read the harmony of any song",null));
    const body=el("div","flex:1;overflow-y:auto;padding:18px 18px calc(24px + env(safe-area-inset-bottom));"); body.className="ap-scroll";
    const inner=el("div","max-width:640px;margin:0 auto;");

    const field=el("div",`display:flex;align-items:center;gap:10px;background:${T.card};border:1.5px solid ${T.line};border-radius:14px;padding:11px 13px;box-shadow:0 6px 18px -12px rgba(50,35,20,.3);`);
    field.appendChild(el("span",`font:400 17px ${UI};color:${T.faint};`,"⚲"));
    const input=el("input",`flex:1;min-width:0;border:none;outline:none;background:transparent;font:500 16px ${UI};color:${T.ink};`);
    input.placeholder="Search a song, or paste a YouTube link";
    input.value=S.query||"";
    input.setAttribute("enterkeyhint","search");
    field.appendChild(input);
    const goBtn=el("button",`flex:0 0 auto;border:none;background:${T.accent};color:#fff;border-radius:10px;padding:9px 15px;font:600 13px ${UI};cursor:pointer;`, S.searching?"…":"Go");
    field.appendChild(goBtn);
    const submit=()=>{ S.query=input.value.trim(); if(S.query) doSearch(S.query); };
    goBtn.onclick=submit;
    input.addEventListener("keydown",e=>{ if(e.key==="Enter"){ e.preventDefault(); input.blur(); submit(); } });
    inner.appendChild(field);

    const trainBtn=el("button",`width:100%;display:flex;align-items:center;justify-content:space-between;gap:10px;background:${T.card};border:1px dashed ${T.accent};border-radius:12px;padding:11px 14px;margin-top:10px;cursor:pointer;text-align:left;`);
    const tbTx=el("div","flex:1;min-width:0;");
    tbTx.appendChild(el("div",`font:600 13.5px ${UI};color:${T.ink};`,"Training mode"));
    tbTx.appendChild(el("div",`font:italic 12px ${SERIF};color:${T.faint};margin-top:1px;`,"Browse & correct the Billboard corpus"));
    trainBtn.appendChild(tbTx);
    trainBtn.appendChild(el("span",`flex:0 0 auto;font:600 11px ${UI};color:${T.accent};border:1px solid ${T.accent};border-radius:20px;padding:5px 10px;`,"Open"));
    trainBtn.onclick=()=>go("billboard");
    inner.appendChild(trainBtn);

    if(S.searching){
      const sp=el("div","display:flex;align-items:center;gap:10px;padding:18px 4px;");
      sp.appendChild(el("div",`width:18px;height:18px;border:2px solid ${T.line};border-top-color:${T.accent};border-radius:50%;animation:ap-spin .8s linear infinite;`));
      sp.appendChild(el("div",`font:500 13px ${UI};color:${T.faint};`,"searching YouTube…"));
      inner.appendChild(sp);
    }
    if(S.results.length){
      inner.appendChild(sectionLabel("Results — tap to analyse"));
      S.results.forEach(r=>{
        const card=el("button",`width:100%;display:flex;align-items:center;gap:12px;background:${T.card};border:1px solid ${T.line};border-radius:14px;padding:10px 12px;margin-bottom:9px;cursor:pointer;text-align:left;`);
        const th=el("img",`flex:0 0 auto;width:64px;height:44px;border-radius:8px;object-fit:cover;background:${T.line};`);
        th.src=r.thumb; th.loading="lazy"; card.appendChild(th);
        const tx=el("div","flex:1;min-width:0;");
        tx.appendChild(el("div",`font:600 14px ${UI};color:${T.ink};overflow:hidden;text-overflow:ellipsis;white-space:nowrap;`,r.title));
        tx.appendChild(el("div",`font:500 12px ${UI};color:${T.faint};margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;`, r.uploader+(r.duration?" · "+fmt(r.duration):"")));
        card.appendChild(tx);
        card.appendChild(el("span",`flex:0 0 auto;font:600 11px ${UI};color:${T.accent};border:1px solid ${T.accent};border-radius:20px;padding:5px 10px;`,"Analyse"));
        card.onclick=()=>startAnalysis("https://www.youtube.com/watch?v="+r.id, r.title);
        inner.appendChild(card);
      });
    }

    inner.appendChild(sectionLabel(S.library.length?"Your charts":""));
    if(!S.library.length && !S.searching && !S.results.length){
      inner.appendChild(el("div",`font:italic 13px ${SERIF};color:${T.faint};padding:6px 4px;line-height:1.6;`,"No charts yet — search for a song above and Harmonia will listen to it."));
    }
    S.library.forEach(r=>{
      const card=el("button",`width:100%;display:flex;align-items:center;gap:14px;background:${T.card};border:1px solid ${T.line};border-radius:14px;padding:14px 16px;margin-bottom:10px;cursor:pointer;text-align:left;transition:transform .12s,box-shadow .12s;`);
      const disc=el("div",`flex:0 0 auto;width:44px;height:44px;border-radius:10px;background:${keyFill(r.key.tonic)};display:flex;align-items:center;justify-content:center;color:#fff;font:italic 700 18px ${SERIF};`, note(r.key.tonic));
      card.appendChild(disc);
      const tx=el("div","flex:1;min-width:0;");
      tx.appendChild(el("div",`font:600 15px ${UI};color:${T.ink};overflow:hidden;text-overflow:ellipsis;white-space:nowrap;`,r.title));
      tx.appendChild(el("div",`font:500 12.5px ${UI};color:${T.faint};margin-top:2px;`, note(r.key.tonic)+" "+r.key.mode+" · "+r.bars+" bars"+(r.hasAudio?"":" · no audio")));
      card.appendChild(tx);
      card.appendChild(el("span",`flex:0 0 auto;font:400 18px ${UI};color:${T.rule};`,"›"));
      card.onclick=()=>openChart(r.file);
      inner.appendChild(card);
    });
    body.appendChild(inner); w.appendChild(body);
    return w;
  }
  function sectionLabel(t){ return el("div",`font:600 10px ${UI};letter-spacing:.08em;text-transform:uppercase;color:${T.faint};margin:22px 4px 10px;`,t); }

  // ── 1b. TRAINING MODE (Billboard corpus) ───────────────────────────────
  // Lists the ~58-60 songs infer_chords_billboard_v1 was trained on (see
  // scripts/harmonia_server.py:_load_billboard_corpus) — each already has a
  // duration-verified YouTube match, so a tap goes straight into the same
  // /api/analyze flow a pasted link uses. This is the browse surface for the
  // human-correction loop: analyze → Annotate tab → Compass/Wheel → Save.
  async function loadBillboardCorpus(){
    if(S.billboardLoaded || S.billboardLoading) return;
    S.billboardLoading=true;
    try{ const r=await api.get("/api/billboard-corpus"); S.billboard=r.songs||[]; }
    catch(e){ S.billboard=[]; }
    S.billboardLoading=false; S.billboardLoaded=true;
    if(S.screen==="billboard") go("billboard");
  }
  const STATUS_LABEL={corrected:"corrected",analyzed:"analysed",new:"not started"};
  const STATUS_COLOR=k=>({corrected:T.green,analyzed:T.accent,new:T.faint}[k]||T.faint);
  function renderBillboard(){
    const w=screenWrap();
    w.appendChild(appBar("Training mode","Billboard corpus · tap a song to analyse & correct","library"));
    const body=el("div","flex:1;overflow-y:auto;padding:18px 18px calc(24px + env(safe-area-inset-bottom));"); body.className="ap-scroll";
    const inner=el("div","max-width:640px;margin:0 auto;");
    if(!S.billboardLoaded){ loadBillboardCorpus(); }
    if(S.billboardLoading || !S.billboardLoaded){
      const sp=el("div","display:flex;align-items:center;gap:10px;padding:18px 4px;");
      sp.appendChild(el("div",`width:18px;height:18px;border:2px solid ${T.line};border-top-color:${T.accent};border-radius:50%;animation:ap-spin .8s linear infinite;`));
      sp.appendChild(el("div",`font:500 13px ${UI};color:${T.faint};`,"loading corpus…"));
      inner.appendChild(sp);
    } else {
      inner.appendChild(sectionLabel(S.billboard.length+" songs — the exact corpus the live model was trained on"));
      if(!S.billboard.length){
        inner.appendChild(el("div",`font:italic 13px ${SERIF};color:${T.faint};padding:6px 4px;line-height:1.6;`,"Corpus list unavailable (scratchpad/billboard_search_results*.json missing)."));
      }
      S.billboard.forEach(r=>{
        const card=el("button",`width:100%;display:flex;align-items:center;gap:12px;background:${T.card};border:1px solid ${T.line};border-radius:14px;padding:12px 14px;margin-bottom:9px;cursor:pointer;text-align:left;`);
        const tx=el("div","flex:1;min-width:0;");
        tx.appendChild(el("div",`font:600 14px ${UI};color:${T.ink};overflow:hidden;text-overflow:ellipsis;white-space:nowrap;`,r.title||"(untitled)"));
        tx.appendChild(el("div",`font:500 12px ${UI};color:${T.faint};margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;`,r.artist||""));
        card.appendChild(tx);
        card.appendChild(el("span",`flex:0 0 auto;font:600 10.5px ${UI};color:${STATUS_COLOR(r.status)};border:1px solid ${STATUS_COLOR(r.status)};border-radius:20px;padding:4px 9px;white-space:nowrap;`,STATUS_LABEL[r.status]||r.status));
        if(r.file){
          // Play the real audio with the McGill Billboard GT's own chord
          // boundaries tracked live — separate from the read-only GT chip
          // under each inferred chord in the chart, which snaps GT to the
          // model's segmentation and can't show a GT boundary that's early/
          // late relative to the model's own cell edges.
          const gtBtn=el("a",`flex:0 0 auto;font:600 10.5px ${UI};color:${T.accent};border:1px solid ${T.accent};border-radius:20px;padding:4px 9px;white-space:nowrap;text-decoration:none;`,"♪ GT");
          gtBtn.href="/gt-playalong-training?song="+encodeURIComponent(r.file);

  async function doSearch(q){
    if(/youtu\.?be/.test(q)){ startAnalysis(q, "your link"); return; }   // pasted link → straight to analysis
    S.searching=true; S.results=[]; go("library");
    try{ const r=await api.post("/api/yt-search",{q}); S.results=r.results||[]; }
    catch(e){ toast("Search failed"); }
    S.searching=false; go("library");
  }

  // ── 2. ANALYSING ────────────────────────────────────────────────────────
  // The stages below are the pipeline's REAL steps, reported by the server's
  // job record (`stage`), not a scripted animation: the long middle stage is
  // one call into infer_chords_v1 (Basic Pitch → beats → sections → key →
  // chord HMM), so it stays lit until the decode actually returns, and its
  // result chip is filled from the chart the run produced.
  // Progressive-analysis screen (2026-07-20): music-x-lab (the accurate
  // root/quality pass, ~10-30s) is one blocking call and can't stream
  // chord-by-chord — but the fast NNLS heads finish a rough pass in a few
  // seconds, before music-x-lab even starts (see docs/inference_pipeline_
  // timing_and_animation_scope.md). infer_chords_v1's progress_cb surfaces
  // tempo/key/draft-chords/final-chords into the job record as they land
  // (scripts/harmonia_server.py::on_progress); this screen renders each as
  // it arrives instead of sitting on one opaque "Listening" spinner for the
  // whole wait. Fields are ADDITIVE — if the Billboard/BP48 fallback path
  // runs instead (no progress_cb support), none of them ever populate and
  // this degrades gracefully to "stage 1 pending, then done", same as before.
  const STAGES=[
    {k:"Fetching the audio",              field:null},
    {k:"Finding the beat",                field:"tempo_bpm"},
    {k:"Hearing the harmony",             field:"key_name"},
    {k:"Sketching the chords",            field:"draft_chords"},
    {k:"Naming the chords — music-x-lab", field:"final_chords"},
    {k:"Drawing the chart",               field:null},
  ];
  function fineStage(job){
    // How many of the 6 STAGES rows count as "reached" — coarse server
    // stage (0..3) gates the outer fetch/decode/done envelope; the new
    // fields refine stage "1" (decoding) into 4 sub-steps.
    if(job.stage>=3 || job.status==="done") return 6;
    if(job.stage<1) return 0;
    let n=1;
    if(job.tempo_bpm!=null) n=2;
    if(job.key_name) n=3;
    if(job.draft_chords) n=4;
    // Stays "in progress" (spinner) through every music-x-lab fold — only
    // counts as done once the true final result lands (musx_fold back to
    // null after the last fold's callback, 2026-07-20).
    if(job.final_chords && job.musx_fold==null) n=5;
    return n;
  }
  function stageSub(job, i){
    if(i===0) return job.duration_s
      ? `${job.title||"your song"} · ${(job.duration_s/60|0)}:${String(Math.round(job.duration_s%60)).padStart(2,"0")}`
      : "downloading from YouTube";
    if(i===1) return job.tempo_bpm!=null ? `${Math.round(job.tempo_bpm)} BPM · ${job.time_signature||"4/4"}` : "—";
    if(i===2) return job.key_name ? `Key: ${job.key_name}` : "—";
    if(i===3) return job.draft_chords ? `rough pass — ${job.draft_chords.length} chords` : "—";
    if(i===4){
      if(!job.final_chords) return "the long step, worth the wait";
      // musx_fold present = an intermediate ensemble fold still refining;
      // absent = the true final result has landed (2026-07-20).
      return job.musx_fold!=null
        ? `fold ${job.musx_fold}/${job.musx_n_folds} — ${job.final_chords.length} chords, refining…`
        : `${job.final_chords.length} chords, corrected`;
    }
    return job.n_sections!=null ? `${job.n_sections} sections · ready to play` : "laying out the lead sheet";
  }
  async function startAnalysis(url, title){
    S.job={title:title||"", stage:0, error:null, file:null};
    go("analysing");
    try{
      // 2026-07-17: boundary-segmentation A/B override, carried on the page
      // URL (?seg=musx or ?seg=nnls) so re-analyzing the same song from an
      // iPhone home-screen bookmark can force either mode without a server
      // restart. No UI toggle yet — URL param only.
      const _seg=new URLSearchParams(location.search).get("seg");
      const _body=(_seg==="musx"||_seg==="nnls") ? {url, seg_source:_seg} : {url};
      const r=await api.post("/api/analyze",_body);
      if(r.error){ S.job.error=r.error; go("analysing"); return; }
      pollJob(r.job_id);
    }catch(e){ S.job.error=String(e); go("analysing"); }
  }
  async function pollJob(id){
    try{
      const j=await api.get("/api/job/"+id);
      if(!S.job) return;
      Object.assign(S.job, j);  // stage, duration_s, tempo_bpm, key_name,
                                 // draft_chords, final_chords, n_sections, …
      if(j.title) S.job.title=j.title;
      if(j.status==="error"){ S.job.error=j.error||"Analysis failed"; paintAnalysing(); return; }
      if(j.status==="done"){
        S.job.stage=3; S.job.file=(j.url||"").replace("/chart/","");
        paintAnalysing();
        setTimeout(()=>openChart(S.job.file), 700);
        return;
      }
      paintAnalysing();
      setTimeout(()=>pollJob(id), 1200);
    }catch(e){ setTimeout(()=>pollJob(id), 2000); }
  }
  function renderAnalysing(){
    const w=screenWrap();
    w.appendChild(appBar(null,"Analysing","library"));
    const body=el("div","flex:1;overflow-y:auto;display:flex;flex-direction:column;align-items:center;padding:24px;"); body.className="ap-scroll";
    const card=el("div",`width:100%;max-width:420px;background:${T.card};border:1px solid ${T.line};border-radius:18px;padding:22px;box-shadow:0 16px 40px -22px rgba(50,35,20,.4);`);
    S._jobCard=card; body.appendChild(card); w.appendChild(body);
    paintAnalysing();
    return w;
  }
  function paintAnalysing(){
    const card=S._jobCard; if(!card||!S.job) return;
    clear(card);
    const fine=fineStage(S.job);
    card.appendChild(el("div",`font:600 16px ${UI};color:${T.ink};overflow:hidden;text-overflow:ellipsis;white-space:nowrap;`, S.job.title||"your song"));
    card.appendChild(el("div",`font:italic 12.5px ${SERIF};color:${T.faint};margin:3px 0 18px;`, S.job.error?"something went wrong":"this takes a minute — here's what it's doing"));
    STAGES.forEach((s,i)=>{
      const done=fine>i, cur=fine===i && !S.job.error;
      const row=el("div","display:flex;align-items:center;gap:12px;padding:9px 0;");
      const dot=el("div",`flex:0 0 auto;width:20px;height:20px;border-radius:50%;border:2px solid ${done?T.green:(cur?T.accent:T.line)};background:${done?T.green:"transparent"};display:flex;align-items:center;justify-content:center;`);
      if(done) dot.innerHTML='<span style="color:#fff;font:700 11px '+UI+';">✓</span>';
      else if(cur) dot.innerHTML='<div style="width:100%;height:100%;border-radius:50%;border:2px solid transparent;border-top-color:'+T.accent+';animation:ap-spin .7s linear infinite;"></div>';
      row.appendChild(dot);
      const tx=el("div","flex:1;min-width:0;");
      tx.appendChild(el("div",`font:600 13.5px ${UI};color:${(done||cur)?T.ink:T.faint};`,s.k));
      tx.appendChild(el("div",`font:500 11.5px ${UI};color:${T.rule};margin-top:1px;`,stageSub(S.job,i)));
      row.appendChild(tx); card.appendChild(row);
    });
    if(S.job.error){
      card.appendChild(el("div",`margin-top:14px;font:500 12.5px ${UI};color:${T.accent};line-height:1.5;`, S.job.error));
      const b=el("button",`width:100%;margin-top:12px;border:none;background:${T.deep};color:#fff;border-radius:11px;padding:12px;font:600 13px ${UI};cursor:pointer;`,"Back");
      b.onclick=()=>{ S.job=null; go("library"); }; card.appendChild(b);
    } else if(fine>=6){
      card.appendChild(el("div",`margin-top:14px;font:600 13px ${UI};color:${T.green};`,"Chart ready — opening…"));
    } else if(S.job.draft_chords || S.job.final_chords){
      card.appendChild(renderChordPreview(S.job));
    }
  }

  // Root:quality[/bass] (the pipeline's raw label format, e.g. "G:min7",
  // "A#:maj7/D#", or "N" for no-chord) -> a small HTML glyph. Not the full
  // iReal-token pipeline (render_youtube_chart.label_to_ireal) — this is a
  // live PREVIEW only; the real chart re-derives its display tokens properly
  // once opened.
  function prettyChordLabel(label){
    if(!label || label==="N") return {isNC:true, html:"N.C."};
    const [head, bass]=label.split("/");
    const [root, sev]=head.split(":");
    const SEV={maj:"",min:"m",7:"7",maj7:"maj7",min7:"m7",dim:"dim",dim7:"dim7",
      hdim7:"ø7",aug:"aug",sus4:"sus4",sus2:"sus2","9":"9",min9:"m9",maj9:"maj9",
      dom11:"11",dom13:"13",minmaj7:"m/maj7",aug7:"aug7",augmaj7:"augM7","7sus4":"7sus4"};
    const disp=(sev in SEV)?SEV[sev]:sev;
    let html=root+(disp?`<sup style="font-size:.62em">${disp}</sup>`:"");
    if(bass) html+=`<span style="font-size:.62em;opacity:.7">/${bass}</span>`;
    return {isNC:false, html};
  }
  function chordAtTime(chords, t){
    let cur=chords[0]||null;
    for(const c of chords){ if(c.start_s<=t) cur=c; else break; }
    return cur;
  }
  // Live bar-grid preview: same idea as the standalone demo (scratchpad/
  // progressive_analysis_demo.html) — fills with the draft (NNLS-only) pass
  // in amber the moment it's ready, then the same cells flip to the
  // music-x-lab-corrected final pass in ink once that returns. Bar timing
  // here is a coarse tempo/4 estimate (no beat grid available client-side);
  // the real chart (opened after "done") uses the actual beat-locked grid.
  function renderChordPreview(job){
    const wrap=el("div",`margin-top:16px;border:1px solid ${T.line};border-radius:10px;overflow:hidden;background:${T.paper};`);
    const grid=el("div","display:grid;grid-template-columns:repeat(4,1fr);");
    wrap.appendChild(grid);
    const tempo=job.tempo_bpm||120, barDur=4*60/tempo;
    const dur=job.duration_s||((job.final_chords||job.draft_chords).slice(-1)[0]?.end_s)||barDur;
    const nBars=Math.max(1, Math.ceil(dur/barDur));
    const draft=job.draft_chords, final=job.final_chords;
    // Three states, not two (2026-07-20): NNLS draft (amber) -> music-x-lab
    // still refining fold-by-fold (blue — job.musx_fold set) -> the true
    // final result (ink, musx_fold back to null). Same three-tier idea as
    // the standalone demo, now with an intermediate "still converging" tier
    // instead of jumping straight from draft to final.
    const refining = final && job.musx_fold!=null;
    const isFinal = final && job.musx_fold==null;
    for(let i=0;i<nBars;i++){
      const t=i*barDur;
      const cell=el("div",`position:relative;min-height:44px;display:flex;align-items:center;justify-content:center;border-right:1px solid ${T.line};border-bottom:1px solid ${T.line};`);
      const src = final ? chordAtTime(final,t) : (draft ? chordAtTime(draft,t) : null);
      if(src){
        const d=prettyChordLabel(src.label);
        const color = d.isNC ? T.faint : (isFinal ? T.ink : (refining ? T.blue : T.amber));
        cell.innerHTML=`<div style="font:700 15px ${SERIF};color:${color};${d.isNC?'font-style:italic;font-size:12px;':''}">${d.html}</div>`;
        if(!isFinal){
          const tag = refining ? `fold ${job.musx_fold}/${job.musx_n_folds}` : "draft";
          const tagColor = refining ? T.blue : T.amber;
          cell.appendChild(el("div",`position:absolute;top:2px;right:3px;font:700 7px ${UI};letter-spacing:.04em;color:${tagColor};text-transform:uppercase;opacity:.85;`,tag));
        }
      }
      grid.appendChild(cell);
    }
    return wrap;
  }

  // ── 3. CHART ────────────────────────────────────────────────────────────
  async function openChart(file){
    if(!file) return;
    try{
      const m=await api.get("/api/chart-model/"+file);
      loadModel(m);
      go("chart");
    }catch(e){ toast("Could not open that chart"); go("library"); }
  }
  // Flatten the ChartModel's sections→bars→chords into the working list the
  // renderer walks, and give every chord its time span in EACH pass of a
  // folded section (a ×2 section renders once but sounds twice — the playhead
  // and any re-infer still have to address both).
  function loadModel(m){
    S.model=m; S.key=m.key.tonic; S.mode="read"; S.pending=[]; S.playBar=-1;
    setSpelling(m.key.tonic, m.key.mode);   // F♯m7 in E major, B♭7 in F major
    S.sections=m.sections.map((s,i)=>({ id:s.id, label:s.label, tag:s.tag, reps:s.reps, spans:s.spans, barRanges:s.barRanges, idx:i }));
    const chords=[];
    // Build S.bars in the SAME walk, one entry PER model bar — crucially
    // INCLUDING held (empty) bars. A held bar carries no chord (the previous
    // chord sounds through it), but it must still occupy a grid cell: the
    // model's per-section `bars` array already keeps an empty [] slot for each
    // held bar (chart_model gives every bar 0..n_bars-1 a slot). The old code
    // rebuilt S.bars from the flat chord list via `barFirst`, so every held
    // bar — having no chord — produced no cell and silently vanished. That
    // collapsed a 2-bar held chord into 1 cell and shifted every following bar
    // left by one, desyncing the whole form (2026-07-17 "Yesterday" bug).
    const barsList=[];
    m.sections.forEach((s,si)=>{
      const base=s.spans[0][0];
      s.bars.forEach((bar,bi)=>{
        const cur={idxs:[], t0:null, t1:null, sec:s.label, secId:s.id,
                   secFirst: bi===0, reps:s.reps, held: bar.length===0};
        bar.forEach((c,ci)=>{
          const spans=s.spans.map(sp=>[c.t0 + (sp[0]-base), c.t1 + (sp[0]-base)]);
          const idx=chords.length;
          chords.push({ root:c.root, q:c.q, c:c.c, confirmed:!!c.confirmed, nc:!!c.nc,
            bar:c.bar, beat:c.beat, sug:c.sug||null,
            sec:s.label, secId:s.id, secIdx:si, reps:s.reps,
            barFirst: ci===0, secFirst: bi===0&&ci===0,
            t0:c.t0, t1:c.t1, spans });
          cur.idxs.push(idx);
          if(cur.t0===null) cur.t0=c.t0;
          cur.t1=(cur.t1===null)?c.t1:Math.max(cur.t1, c.t1);
        });
        barsList.push(cur);
      });
    });
    S.chords=chords;
    S.bars=barsList;
    // Held bars have no chord and thus no intrinsic time. Give each the span
    // between its neighbours (prev bar's end → next chorded bar's start) so the
    // playhead and swipe-merge (spanTime) stay monotonic across the held gap.
    for(let i=0;i<S.bars.length;i++){
      if(S.bars[i].t0!==null) continue;
      const prevT1=(i>0 && S.bars[i-1].t1!=null)?S.bars[i-1].t1:0;
      let nextT0=null;
      for(let j=i+1;j<S.bars.length;j++){ if(S.bars[j].t0!=null){ nextT0=S.bars[j].t0; break; } }
      S.bars[i].t0=prevT1;
      S.bars[i].t1=(nextT0!=null)?nextT0:prevT1;
    }
    S.mergeMode=false; S.spans=[];
    // New song → old song's candidates/dismissals/confirmations don't apply.
    S.suggMode=false; S.suggCandidates=null;
    S.suggDismissed=new Set(); S.suggConfirmed=new Set();
    S.sectSuggMode=false; S.sectSuggCandidates=null; S.sectSuggMeta={};
    S.sectSuggDismissed=new Set(); S.sectSuggConfirmed=new Set();
    S.audioUrl=m.audio_url||"";
    S.timeIndex=[];   // [{i, t0, t1, rep}] over every pass, in time order
    chords.forEach((ch,i)=>ch.spans.forEach((sp,rep)=>S.timeIndex.push({i,t0:sp[0],t1:sp[1],rep})));
    S.timeIndex.sort((a,b)=>a.t0-b.t0);
    // ── per-BAR time spans → the playhead tracks TIME against BARS, not chord
    // index, so held ("%") bars, N.C. bars and the intro row all highlight while
    // they sound (user report 2026-07-19). A chorded bar's per-pass span = the
    // envelope of its chords' passes; a held bar inherits the single neighbour-
    // filled span above. Within a folded ×k section every pass maps back to the
    // SAME rendered bar, so one rendered bar lights once per pass.
    for(let bi=0;bi<S.bars.length;bi++){
      const b=S.bars[bi];
      if(b.idxs.length){
        const nrep=Math.max(1,...b.idxs.map(i=>(S.chords[i].spans||[]).length||1));
        b.tspans=[];
        for(let r=0;r<nrep;r++){
          let t0=Infinity,t1=-Infinity;
          b.idxs.forEach(i=>{ const sp=(S.chords[i].spans&&(S.chords[i].spans[r]||S.chords[i].spans[0]))||[S.chords[i].t0,S.chords[i].t1]; t0=Math.min(t0,sp[0]); t1=Math.max(t1,sp[1]); });
          b.tspans.push([t0,t1]);
        }
      } else {
        b.tspans=[[b.t0,b.t1]];   // held bar: neighbour-filled single span
      }
    }
    S.barTimeIndex=[];   // [{bi, t0, t1, rep}] over every bar × pass, time order
    S.bars.forEach((b,bi)=>b.tspans.forEach((sp,rep)=>S.barTimeIndex.push({bi,t0:sp[0],t1:sp[1],rep})));
    S.barTimeIndex.sort((a,b)=>a.t0-b.t0);
  }

  function renderChart(){
    const w=screenWrap();
    const m=S.model;
    const bar=appBar(m?m.title:"", null, "library");
    const keyPill=el("button",`flex:0 0 auto;display:flex;align-items:center;gap:6px;border:1.5px solid ${T.line};background:${T.card};border-radius:20px;padding:7px 12px;font:600 13px ${UI};color:${T.ink};cursor:pointer;`);
    keyPill.innerHTML='<span style="color:'+T.faint+';font-weight:500;">Key</span> '+note(S.key)

    const modeBar=el("div",`flex:0 0 auto;display:flex;gap:0;padding:12px 18px 0;background:${T.paper};flex-wrap:wrap;align-items:center;`);
    const seg=el("div",`display:inline-flex;background:${T.line};border-radius:11px;padding:3px;gap:2px;`);

        const on=S.colorMode===k;

        b.onclick=()=>{ S.colorMode=k; go("chart"); };

      // that the old tool uniquely offered has no on-brand replacement yet,
      // but whole-timeline phase/offset correction (the actual recurring
      // need) is covered by "Set bar 1" below and /gt-offset-fix.
      // The bar grid's STEP size (chords/bar) was fixed 2026-07-15 by threading
      // the real detected-beat index through; this fixes its PHASE — which
      // beat counts as bar 1 — via a dedicated linear waveform+slider tool
      // (mirrors /gt-offset-fix's pattern, applied to the chart's own bar
      // grid instead of GT chords). Opens in a new tab: this view's own state
      // (annotate mode, pending corrections) shouldn't be lost by navigating.
      const b1=el("button",`display:inline-flex;align-items:center;gap:6px;margin-left:8px;border:1.5px solid ${T.rule};background:${T.card};color:${T.faint};border-radius:9px;padding:7px 12px;font:600 12px ${UI};cursor:pointer;`,"◎ Set bar 1");
      b1.onclick=()=>{ window.open("/bar1-offset-fix?song="+encodeURIComponent(m.file), "_blank"); };

    w.appendChild(modeBar);

    const cap=el("div",`flex:0 0 auto;padding:10px 18px 0;background:${T.paper};`);

    w.appendChild(cap);

    const body=el("div",`flex:1;overflow-y:auto;padding:14px 18px calc(130px + env(safe-area-inset-bottom));background:${T.paper};`); body.className="ap-scroll";
    const sheet=el("div","max-width:720px;margin:0 auto;");
    // 2026-07-18, later same day: buildRibbon() (the "Pool two passes" /
    // "Bar suggestions" tools) used to render AFTER buildIReal()'s full
    // chord grid — on a long song (Autumn Leaves, 330 bars) that pushed it
    // far below the fold, so the suggestions feature was practically
    // undiscoverable (verified live with a real headless-browser pass: the
    // button only became visible after scrolling to the very bottom of the
    // grid). Moved ABOVE the grid so entering Annotate mode surfaces these
    // tools immediately, no scrolling required. buildRibbon() doesn't read
    // anything buildIReal()/paintSuggestions() sets up (S._cells etc.), so
    // this reorder is safe — paintSuggestions() still runs at the end of
    // buildIReal() and paints onto the (already-built) cells regardless of
    // DOM order.
    if(S.mode==="annotate") sheet.appendChild(buildRibbon());
    sheet.appendChild(buildIReal());
    body.appendChild(sheet);
    w.appendChild(body);

    const ra=renderReinferAction(); if(ra) w.appendChild(ra);
    return w;
  }
  function renderReinferAction(){
    if(!(S.mode==="annotate" && S.pending.length)) return null;
    const act=el("div",`position:absolute;left:0;right:0;bottom:calc(84px + env(safe-area-inset-bottom));z-index:25;padding:0 14px;`);

    const tx=el("div",""); tx.appendChild(el("div",`font:600 13px ${UI};`,"Re-infer"));
    tx.appendChild(el("div",`font:500 11px ${UI};color:rgba(247,243,233,.7);margin-top:2px;`, "your "+S.pending.length+" locked chord"+(S.pending.length>1?"s":"")+" will re-decode the song"));
    inner.appendChild(tx);

    go2.onclick=runReinfer; inner.appendChild(go2);
